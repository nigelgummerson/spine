// --- Language detection (same logic as main app) ---
function detectLang() {
    const stored = localStorage.getItem('spine_planner_lang');
    if (stored && T[stored]) return stored;
    const nav = (navigator.language || 'en').split('-')[0].toLowerCase();
    const mapped = LANG_ALIASES[nav] || nav;
    if (T[mapped]) return mapped;
    return 'en';
}

let currentLang = detectLang();

function t(key) {
    return (T[currentLang] && T[currentLang][key]) ?? T.en[key] ?? key;
}

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1">
                ${['feat_screws','feat_cages','feat_osteotomies','feat_forces','feat_companies','feat_bonegraft','feat_rods','feat_inventory','feat_themes','feat_export','feat_dualwindow','feat_ghost'].map(k =>
                    `<p class="text-sm text-slate-700 py-0.5 border-b border-slate-100">${t(k)}</p>`
                ).join('')}
            </div>
        </section>

        <section class="print-break">
            <h2 class="text-base font-bold text-[#005EB8] uppercase tracking-wide mb-2">${t('workflow_title')}</h2>
            <ol class="list-decimal list-inside space-y-1 text-sm text-slate-700">
                ${['step1','step2','step3','step4','step5','step6','step7','step8'].map(k =>
                    `<li>${t(k)}</li>`
                ).join('')}
            </ol>
        </section>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <section class="print-break">
                <h2 class="text-base font-bold text-[#005EB8] uppercase tracking-wide mb-2">${t('shortcuts_title')}</h2>
                <table class="w-full text-sm">
                    <tbody>
                        <tr class="border-b border-slate-100"><td class="py-1 font-mono font-bold text-slate-900 w-20">Enter</td><td class="py-1 text-slate-700">${t('key_enter')}</td></tr>
                        <tr class="border-b border-slate-100"><td class="py-1 font-mono font-bold text-slate-900">Escape</td><td class="py-1 text-slate-700">${t('key_escape')}</td></tr>
                        <tr class="border-b border-slate-100"><td class="py-1 font-mono font-bold text-slate-900">Delete</td><td class="py-1 text-slate-700">${t('key_delete')}</td></tr>
                    </tbody>
                </table>
            </section>

            <section class="print-break">
                <h2 class="text-base font-bold text-[#005EB8] uppercase tracking-wide mb-2">${t('privacy_title')}</h2>
                <ul class="list-disc list-inside space-y-1 text-sm text-slate-700">
                    <li>${t('privacy_1')}</li>
                    <li>${t('privacy_2')}</li>
                    <li>${t('privacy_3')}</li>
                </ul>
            </section>
        </div>

        <section class="print-break">
            <h2 class="text-base font-bold text-[#005EB8] uppercase tracking-wide mb-2">${t('dual_title')}</h2>
            <p class="text-sm text-slate-700">${t('dual_p1')}</p>
        </section>

    </main>

    <footer class="border-t border-slate-200 mt-8 no-print">
        <div class="max-w-4xl mx-auto px-6 py-4 flex flex-wrap items-center justify-between gap-2 text-xs text-slate-500">
            <div>${t('footer_origin')}</div>
            <div class="flex items-center gap-4">
                <span>${t('footer_license')}</span>
                <a href="https://plan.skeletalsurgery.com/spine/" class="text-[#005EB8] hover:underline font-medium">${t('footer_open_app')}</a>
            </div>
        </div>
        ${!isEn ? `<div class="max-w-4xl mx-auto px-6 pb-4"><p class="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-3 py-2">${t('disclaimer')}</p></div>` : ''}
    </footer>
    `;

    // Re-attach language selector event
    document.getElementById('lang-select').addEventListener('change', function(e) {
        currentLang = e.target.value;
        localStorage.setItem('spine_planner_lang', currentLang);
        render();
    });
}

render();
</script>

</body>
