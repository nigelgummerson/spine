<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i18n Completeness Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-5xl mx-auto py-8 px-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">i18n Completeness Test</h1>
        <p class="text-gray-500 mb-6 text-sm">Layer 1 — Checks every language has all keys, no empty strings, no untranslated values.</p>
        <div id="banner" class="rounded-lg p-4 mb-6 bg-gray-200 text-gray-600 font-medium">Loading...</div>
        <div id="results"></div>
    </div>

    <script>
    async function extractObject(html, marker) {
        const startIdx = html.indexOf(marker);
        if (startIdx === -1) throw new Error(marker + ' not found in index.html');

        let braceCount = 0;
        const opener = marker.includes('[') ? null : '{';
        const isArray = marker.trimEnd().endsWith('[');
        const openChar = isArray ? '[' : '{';
        const closeChar = isArray ? ']' : '}';

        let objStart = html.indexOf(openChar, startIdx);
        let i = objStart;
        let inString = false;
        let stringChar = '';
        let escaped = false;

        for (; i < html.length; i++) {
            const ch = html[i];
            if (escaped) { escaped = false; continue; }
            if (ch === '\\') { escaped = true; continue; }
            if (inString) {
                if (ch === stringChar) inString = false;
                continue;
            }
            if (ch === "'" || ch === '"' || ch === '`') {
                inString = true;
                stringChar = ch;
                continue;
            }
            if (ch === openChar) braceCount++;
            if (ch === closeChar) {
                braceCount--;
                if (braceCount === 0) break;
            }
        }

        const objText = html.substring(objStart, i + 1);
        return new Function('return ' + objText)();
    }

    async function loadAllowlist() {
        try {
            const resp = await fetch('translation-glossary.json');
            if (!resp.ok) return [];
            const data = await resp.json();
            return data.allowlist || [];
        } catch {
            return [];
        }
    }

    async function run() {
        const banner = document.getElementById('banner');
        const resultsDiv = document.getElementById('results');

        try {
            const resp = await fetch('../index.html');
            if (!resp.ok) throw new Error('Failed to fetch index.html: ' + resp.status);
            const html = await resp.text();

            const translations = await extractObject(html, 'const TRANSLATIONS = {');
            const supportedLangs = await extractObject(html, 'const SUPPORTED_LANGUAGES = [');
            const allowlist = await loadAllowlist();

            const langCodes = supportedLangs.map(l => l.code);
            const enKeys = Object.keys(translations.en || {});
            const allTransLangs = Object.keys(translations);

            let allPass = true;
            const rows = [];

            // Check every SUPPORTED_LANGUAGES code has a TRANSLATIONS entry
            const missingLangs = langCodes.filter(c => !translations[c]);
            if (missingLangs.length > 0) allPass = false;

            // Per-language checks
            for (const code of langCodes) {
                const langName = supportedLangs.find(l => l.code === code)?.name || code;
                const t = translations[code];

                if (!t) {
                    rows.push({
                        code, name: langName,
                        total: 0, missing: enKeys.length, empty: 0, untranslated: 0,
                        missingKeys: enKeys, emptyKeys: [], untranslatedKeys: [],
                        pass: false
                    });
                    continue;
                }

                const tKeys = Object.keys(t);
                const missing = enKeys.filter(k => !(k in t));
                const empty = enKeys.filter(k => k in t && t[k] === '');
                const untranslated = code === 'en' ? [] : enKeys.filter(k =>
                    k in t && t[k] !== '' && t[k] === (translations.en || {})[k] && !allowlist.includes(k)
                );

                const pass = missing.length === 0 && empty.length === 0 && untranslated.length === 0;
                if (!pass) allPass = false;

                rows.push({
                    code, name: langName,
                    total: tKeys.length, missing: missing.length, empty: empty.length,
                    untranslated: untranslated.length,
                    missingKeys: missing, emptyKeys: empty, untranslatedKeys: untranslated,
                    pass
                });
            }

            // Banner
            if (allPass && missingLangs.length === 0) {
                banner.className = 'rounded-lg p-4 mb-6 bg-green-100 text-green-800 font-medium';
                banner.textContent = 'All languages pass completeness checks.';
            } else {
                const issues = [];
                if (missingLangs.length > 0) issues.push('Missing language(s) in TRANSLATIONS: ' + missingLangs.join(', '));
                const failCount = rows.filter(r => !r.pass).length;
                if (failCount > 0) issues.push(failCount + ' language(s) have issues.');
                banner.className = 'rounded-lg p-4 mb-6 bg-red-100 text-red-800 font-medium';
                banner.innerHTML = issues.join('<br>');
            }

            // Summary table
            let tableHTML = `
                <table class="w-full border-collapse bg-white rounded-lg shadow-sm overflow-hidden mb-6">
                    <thead>
                        <tr class="bg-gray-100 text-left text-xs uppercase tracking-wider text-gray-500">
                            <th class="px-4 py-3">Language</th>
                            <th class="px-4 py-3">Code</th>
                            <th class="px-4 py-3 text-right">Total Keys</th>
                            <th class="px-4 py-3 text-right">Missing</th>
                            <th class="px-4 py-3 text-right">Empty</th>
                            <th class="px-4 py-3 text-right">Untranslated</th>
                            <th class="px-4 py-3 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody>`;

            for (const r of rows) {
                const statusClass = r.pass ? 'text-green-600' : 'text-red-600 font-semibold';
                const statusText = r.pass ? 'PASS' : 'FAIL';
                const rowBg = r.pass ? '' : 'bg-red-50';
                tableHTML += `
                    <tr class="border-t border-gray-100 ${rowBg}">
                        <td class="px-4 py-2 text-sm">${r.name}</td>
                        <td class="px-4 py-2 text-sm font-mono">${r.code}</td>
                        <td class="px-4 py-2 text-sm text-right">${r.total}</td>
                        <td class="px-4 py-2 text-sm text-right ${r.missing > 0 ? 'text-red-600 font-semibold' : ''}">${r.missing}</td>
                        <td class="px-4 py-2 text-sm text-right ${r.empty > 0 ? 'text-red-600 font-semibold' : ''}">${r.empty}</td>
                        <td class="px-4 py-2 text-sm text-right ${r.untranslated > 0 ? 'text-amber-600 font-semibold' : ''}">${r.untranslated}</td>
                        <td class="px-4 py-2 text-sm text-center ${statusClass}">${statusText}</td>
                    </tr>`;
            }

            tableHTML += '</tbody></table>';
            resultsDiv.innerHTML = tableHTML;

            // Detail sections for failures
            for (const r of rows) {
                if (r.pass) continue;
                let detailHTML = `<div class="mb-4 p-4 bg-white rounded-lg shadow-sm border border-red-200">
                    <h3 class="font-semibold text-gray-800 mb-2">${r.name} (${r.code})</h3>`;

                if (r.missingKeys.length > 0) {
                    detailHTML += `<p class="text-xs text-red-600 font-medium mb-1">Missing keys (${r.missingKeys.length}):</p>
                        <pre class="text-xs bg-gray-50 p-2 rounded mb-2 max-h-40 overflow-auto">${r.missingKeys.join('\n')}</pre>`;
                }
                if (r.emptyKeys.length > 0) {
                    detailHTML += `<p class="text-xs text-red-600 font-medium mb-1">Empty strings (${r.emptyKeys.length}):</p>
                        <pre class="text-xs bg-gray-50 p-2 rounded mb-2 max-h-40 overflow-auto">${r.emptyKeys.join('\n')}</pre>`;
                }
                if (r.untranslatedKeys.length > 0) {
                    detailHTML += `<p class="text-xs text-amber-600 font-medium mb-1">Untranslated — identical to English (${r.untranslatedKeys.length}):</p>
                        <pre class="text-xs bg-gray-50 p-2 rounded mb-2 max-h-40 overflow-auto">${r.untranslatedKeys.join('\n')}</pre>`;
                }

                detailHTML += '</div>';
                resultsDiv.innerHTML += detailHTML;
            }

            // Missing languages detail
            if (missingLangs.length > 0) {
                resultsDiv.innerHTML += `<div class="mb-4 p-4 bg-white rounded-lg shadow-sm border border-red-200">
                    <h3 class="font-semibold text-red-700 mb-2">Languages in SUPPORTED_LANGUAGES but missing from TRANSLATIONS</h3>
                    <pre class="text-xs bg-gray-50 p-2 rounded">${missingLangs.join('\n')}</pre>
                </div>`;
            }

            // Info: keys present in TRANSLATIONS but not in SUPPORTED_LANGUAGES
            const extraLangs = allTransLangs.filter(c => !langCodes.includes(c));
            if (extraLangs.length > 0) {
                resultsDiv.innerHTML += `<div class="mb-4 p-4 bg-white rounded-lg shadow-sm border border-blue-200">
                    <h3 class="font-semibold text-blue-700 mb-2">Languages in TRANSLATIONS but not in SUPPORTED_LANGUAGES (info only)</h3>
                    <pre class="text-xs bg-gray-50 p-2 rounded">${extraLangs.join('\n')}</pre>
                </div>`;
            }

        } catch (err) {
            banner.className = 'rounded-lg p-4 mb-6 bg-red-100 text-red-800 font-medium';
            banner.textContent = 'Error: ' + err.message;
            console.error(err);
        }
    }

    run();
    </script>
</body>
</html>
