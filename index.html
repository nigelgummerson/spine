                                })}
                            </div>
                        </div>

                        <div className={`flex-1 overflow-visible min-w-0 ${!readOnly ? 'hover:bg-blue-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'right')}><ZoneContent zone="right" align="right"/></div>
                        {showForces && <div className={`w-10 border-l border-slate-100/50 bg-emerald-50/20 ${!readOnly ? 'hover:bg-emerald-50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'force_right')}><ZoneContent zone="force_right" align="center"/></div>}
                    </div>

                    {/* INTERBODY DISC ZONE (Except after Pelvis or C1) */}
                    {level.type !== 'Pelvis' && level.type !== 'S' && level.id !== 'Oc' && level.id !== 'C1' && (
                        <div className="w-full flex justify-center relative z-10">
                            <div style={{ width: `${scaledWidth}px`, height: `${Math.max(DISC_MIN_PX, getDiscHeight(level) * heightScale)}px` }} className={`flex items-center justify-center cursor-pointer transition-all ${!readOnly ? 'hover:bg-sky-100/50' : ''}`} onClick={() => !readOnly && onDiscClick(level.id)}>
                                {cageBelow ? (
                                    viewMode === 'whole' && level.type === 'C' ? (
                                        <div className="relative w-full h-full flex items-center justify-center">
                                            <span className="text-amber-600 italic whitespace-nowrap" style={{ fontSize: Math.max(9, cageLabelPx - 1) + 'px' }}>Cervical cage — use Cervical view</span>
                                        </div>
                                    ) : (
                                    <div className="relative group w-full h-full flex justify-center">
                                        <svg viewBox="0 0 160 20" preserveAspectRatio="none" className="w-full h-full overflow-visible"><CageVisualization cageType={cageBelow.tool} heightScale={1} levelId={level.id} /></svg>
                                        <span className="absolute font-bold text-sky-700 bg-white/80 px-0.5 rounded whitespace-nowrap z-20" style={{ left: 'calc(75% + 2em)', top: '50%', transform: 'translateY(-50%)', fontSize: cageLabelPx + 'px' }}>{cageBelow.tool.toUpperCase()} {getDiscLabel(level.id, levels)} {cageBelow.data.height}H {cageBelow.data.lordosis}°{cageBelow.data.side && cageBelow.data.side !== 'bilateral' && cageBelow.data.side !== 'midline' ? ` (${cageBelow.data.side.charAt(0).toUpperCase()})` : ''}</span>
                                    </div>)
                                ) : (
                                    !readOnly && <div className="h-2 w-full bg-slate-200/0 hover:bg-sky-200/50 rounded-full"></div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChartPaper = ({ title, placements, onZoneClick, onPlacementClick, tools, readOnly, levels, showForces, heightScale, cages, onDiscClick, connectors, onConnectorUpdate, onConnectorRemove, rodHeader, viewMode, notes, onNoteUpdate, onNoteRemove, onNoteClick }) => {
            const contentRef = useRef(null);
            const [draggingId, setDraggingId] = useState(null);
            const dragStartRef = useRef(null);
            const [draggingNoteId, setDraggingNoteId] = useState(null);
            const noteDragStartRef = useRef(null);
            const scaledWidth = 160 * heightScale;
            const iconScale = Math.max(0.65, Math.min(1.3, heightScale));
            const connW = Math.round(80 * iconScale);
            const connH = Math.round(24 * iconScale);

            // Convert connector {levelId, fraction} to rendered Y pixel position
            const connectorToRenderedY = (conn) => {
                const viewMap = buildHeightMap(levels, heightScale);
                const entry = viewMap.map.find(e => e.levelId === conn.levelId);
                if (!entry) return null;
                return entry.startY + conn.fraction * (entry.vertEnd - entry.startY);
            };

            // Convert rendered Y to {levelId, fraction}, snapping to nearest level
            const renderedYToConnector = (localY) => {
                const viewMap = buildHeightMap(levels, heightScale);
                // Use <= endY to include the exact boundary pixel; also handles gap pixels between levels
                let entry = viewMap.map.find(e => localY >= e.startY && localY <= e.endY);
                if (!entry) {
                    // Find nearest level by distance to midpoint (handles border gaps)
                    let best = viewMap.map[0], bestDist = Infinity;
                    viewMap.map.forEach(e => {
                        const mid = (e.startY + e.endY) / 2;
                        const dist = Math.abs(localY - mid);
                        if (dist < bestDist) { bestDist = dist; best = e; }
                    });
                    entry = best;
                }
                const segLen = entry.vertEnd - entry.startY;
                const fraction = segLen > 0 ? Math.max(0, Math.min(1, (localY - entry.startY) / segLen)) : 0.5;
                return { levelId: entry.levelId, fraction };
            };

            useEffect(() => {
                if (!draggingId || readOnly) return;
                const handleMouseMove = (e) => {
                    if (!contentRef.current) return;
                    const rect = contentRef.current.getBoundingClientRect();
                    const localY = e.clientY - rect.top;
                    const { levelId, fraction } = renderedYToConnector(localY);
                    onConnectorUpdate(draggingId, { levelId, fraction });
                };
                const handleMouseUp = () => setDraggingId(null);
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
                return () => { document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); };
            }, [draggingId, levels, heightScale, readOnly, onConnectorUpdate]);

            // Note position: convert note to pixel coords within contentRef
            const getNotePixelPos = (note) => {
                const viewMap = buildHeightMap(levels, heightScale);
                const entry = viewMap.map.find(e => e.levelId === note.levelId);
                if (!entry) return null;
                const anchorY = (entry.startY + entry.vertEnd) / 2;
                const x = note.offsetX || 80;
                const y = anchorY + (note.offsetY || 0);
                return { x, y, anchorY };
            };

            // Note drag handler
            useEffect(() => {
                if (!draggingNoteId || readOnly) return;
                const handleMouseMove = (e) => {
                    if (!contentRef.current || !noteDragStartRef.current) return;
                    const dx = e.clientX - noteDragStartRef.current.clientX;
                    const dy = e.clientY - noteDragStartRef.current.clientY;
                    const startOX = noteDragStartRef.current.offsetX;
                    const startOY = noteDragStartRef.current.offsetY;
                    onNoteUpdate(draggingNoteId, { offsetX: startOX + dx, offsetY: startOY + dy });
                };
                const handleMouseUp = () => setDraggingNoteId(null);
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
                return () => { document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); };
            }, [draggingNoteId, readOnly, onNoteUpdate]);


            return (
            <div className="flex-1 flex flex-col h-full border-l border-slate-200 bg-white relative"><div className="p-2 bg-slate-50 border-b border-slate-200 text-center font-bold text-sm text-slate-800 uppercase tracking-wider">{title}</div><div className="flex-1 relative flex flex-col pt-8 px-2 justify-center">
                <div className="flex w-full absolute top-1 left-0 right-0 px-2 text-[11px] font-bold uppercase tracking-tighter text-center pointer-events-none z-10">
                    {showForces && <div className="w-10 text-emerald-600/50">Force</div>}
                    <div className="flex-1 text-right pr-4 text-slate-400">Left</div>
                    <div style={{ width: `${scaledWidth}px` }}></div>
                    <div className="flex-1 text-left pl-4 text-slate-400">Right</div>
                    {showForces && <div className="w-10 text-emerald-600/50">Force</div>}
                </div>
                {rodHeader && <div className="flex w-full absolute top-4 left-0 right-0 px-2 z-10">
                    {showForces && <div className="w-10"></div>}
                    <div className="flex-1 flex justify-end pr-1">{React.Children.toArray(rodHeader.props.children)[0]}</div>
                    <div style={{ width: `${scaledWidth * 0.5}px` }}></div>
                    <div className="flex-1 flex justify-start pl-0">{React.Children.toArray(rodHeader.props.children)[1]}</div>
                    {showForces && <div className="w-10"></div>}
                </div>}
                <div ref={contentRef} className="flex flex-col w-full relative">
                    {levels.map(lvl => <LevelRow key={lvl.id} level={lvl} placements={placements} onZoneClick={onZoneClick} onPlacementClick={onPlacementClick} tools={tools} readOnly={readOnly} showForces={showForces} heightScale={heightScale} cages={cages} onDiscClick={onDiscClick} levels={levels} viewMode={viewMode} />)}
                    {/* Connector overlay */}
                    {connectors && connectors.length > 0 && (
                        <div className="absolute inset-0 pointer-events-none z-30">
                            {connectors.map(conn => {
                                const y = connectorToRenderedY(conn);
                                if (y === null) return null;
                                return (
                                    <div key={conn.id}
                                        className={`absolute pointer-events-auto group ${!readOnly ? 'cursor-grab' : ''} ${draggingId === conn.id ? 'cursor-grabbing z-40' : ''}`}
                                        style={{ top: `${y - connH / 2}px`, left: '50%', transform: 'translateX(-50%)', width: `${scaledWidth}px`, height: `${connH}px` }}
                                        onMouseDown={(e) => { if (!readOnly) { e.preventDefault(); dragStartRef.current = { y: e.clientY }; setDraggingId(conn.id); } }}>
                                        <InstrumentIcon type="connector" className="w-full h-full drop-shadow-md text-slate-900" />
                                        {!readOnly && <button
                                            className="hidden group-hover:flex absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 items-center justify-center text-[8px] font-bold shadow hover:bg-red-600 z-50"
                                            onClick={(e) => { e.stopPropagation(); onConnectorRemove(conn.id); }}
                                            onMouseDown={(e) => e.stopPropagation()}>x</button>}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                    {/* Notes overlay */}
                    {notes && notes.length > 0 && (
                        <React.Fragment>
                            {/* Arrow SVG layer */}
                            <svg className="absolute inset-0 pointer-events-none z-31 w-full h-full" style={{ overflow: 'visible' }}>
                                <defs>
                                    <marker id={`arrowhead-${title.replace(/\s+/g,'')}`} markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                                        <polygon points="0 0, 8 3, 0 6" fill="#7c3aed" />
                                    </marker>
                                </defs>
                                {notes.filter(n => n.showArrow).map(n => {
                                    const pos = getNotePixelPos(n);
                                    if (!pos) return null;
                                    const contentW = contentRef.current?.clientWidth || 600;
                                    const noteX = contentW / 2 + pos.x;
                                    const noteY = pos.y;
                                    const anchorX = contentW / 2;
                                    const anchorY = pos.anchorY;
                                    // Arrow from note label toward anchor, shortened so it doesn't overlap the label
                                    const dx = anchorX - noteX;
                                    const dy = anchorY - noteY;
                                    const dist = Math.sqrt(dx * dx + dy * dy);
                                    if (dist < 10) return null;
                                    const startX = noteX + (dx / dist) * 8;
                                    const startY = noteY + (dy / dist) * 8;
                                    const endX = anchorX - (dx / dist) * 4;
                                    const endY = anchorY - (dy / dist) * 4;
                                    return <line key={n.id} x1={startX} y1={startY} x2={endX} y2={endY} stroke="#7c3aed" strokeWidth="1" markerEnd={`url(#arrowhead-${title.replace(/\s+/g,'')})`} />;
                                })}
                            </svg>
                            {/* Note label layer */}
                            <div className="absolute inset-0 pointer-events-none" style={{ zIndex: 32 }}>
                                {notes.map(n => {
                                    const pos = getNotePixelPos(n);
                                    if (!pos) return null;
                                    return (
                                        <div key={n.id} data-note-click="true"
                                            className={`absolute pointer-events-auto group select-none ${!readOnly ? 'cursor-grab' : ''} ${draggingNoteId === n.id ? 'cursor-grabbing' : ''}`}
                                            style={{ left: `calc(50% + ${pos.x}px)`, top: `${pos.y}px`, transform: 'translate(-50%, -50%)' }}
                                            onMouseDown={(e) => {
                                                if (readOnly) return;
                                                e.preventDefault();
                                                e.stopPropagation();
                                                noteDragStartRef.current = { clientX: e.clientX, clientY: e.clientY, offsetX: n.offsetX || 80, offsetY: n.offsetY || 0 };
                                                setDraggingNoteId(n.id);
                                            }}
                                            onClick={(e) => { e.stopPropagation(); if (!readOnly && !draggingNoteId) onNoteClick(n); }}
                                        >
                                            <span className="text-[10px] font-bold text-violet-700 bg-white/90 border border-violet-200 px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap">{n.text}</span>
                                            {!readOnly && <button
                                                className="hidden group-hover:flex absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 items-center justify-center text-[8px] font-bold shadow hover:bg-red-600 z-50"
                                                onClick={(e) => { e.stopPropagation(); onNoteRemove(n.id); }}
                                                onMouseDown={(e) => e.stopPropagation()}>x</button>}
                                        </div>
                                    );
                                })}
                            </div>
                        </React.Fragment>
                    )}
                </div></div></div>
            );
        };

        // ==========================================
        // SECTION 4: MAIN APP CONTROLLER
        // ==========================================
        const App = () => {
            const [selectedTool, setSelectedTool] = useState('implant');
            const [lastUsedScrewType, setLastUsedScrewType] = useState('polyaxial');
            const [activeChart, setActiveChart] = useState('planned'); 
            const [plannedPlacements, setPlannedPlacements] = useState([]);
            const [completedPlacements, setCompletedPlacements] = useState([]);
            const [plannedCages, setPlannedCages] = useState([]);
            const [completedCages, setCompletedCages] = useState([]);
            const [plannedConnectors, setPlannedConnectors] = useState([]);
            const [completedConnectors, setCompletedConnectors] = useState([]);
            const [plannedNotes, setPlannedNotes] = useState([]);
            const [completedNotes, setCompletedNotes] = useState([]);
            const [colourScheme, setColourScheme] = useState('default');
            const [themeOpen, setThemeOpen] = useState(false);
            const [patientData, setPatientData] = useState({ name: '', id: '', surgeon: '', location: '', date: new Date().toISOString().split('T')[0], company: '', screwSystem: '', leftRod: '', rightRod: '', boneGraft: { types: [], notes: '' } });
            const [viewMode, setViewMode] = useState('thoracolumbar'); 
            const [scale, setScale] = useState(1);
            const [incognitoMode, setIncognitoMode] = useState(false);
            const [isEditingDate, setIsEditingDate] = useState(false);
            const [hasLoaded, setHasLoaded] = useState(false);
            
            // MODALS
            const [screwModalOpen, setScrewModalOpen] = useState(false);
            const [osteoModalOpen, setOsteoModalOpen] = useState(false);
            const [cageModalOpen, setCageModalOpen] = useState(false);
            const [forceModalOpen, setForceModalOpen] = useState(false);
            const [helpModalOpen, setHelpModalOpen] = useState(false);
            const [changeLogOpen, setChangeLogOpen] = useState(false);
            const [noteModalOpen, setNoteModalOpen] = useState(false);
            const [pendingNoteTool, setPendingNoteTool] = useState(null); // { tool: 'note', levelId, offsetX, offsetY }
            const [editingNote, setEditingNote] = useState(null); // full note object when editing
            
            // EDITING STATE
            const [pendingPlacement, setPendingPlacement] = useState(null);
            const [editingPlacementId, setEditingPlacementId] = useState(null);
            const [editingData, setEditingData] = useState(null);
            const [editingTool, setEditingTool] = useState(null);
            const [editingCageLevel, setEditingCageLevel] = useState(null);
            const [editingAnnotation, setEditingAnnotation] = useState('');

            const [defaultDiameter, setDefaultDiameter] = useState('6.5');
            const [defaultLength, setDefaultLength] = useState('45');
            const [defaultScrewMode, setDefaultScrewMode] = useState('standard');
            const [defaultCustomText, setDefaultCustomText] = useState('');
            const [defaultOsteoType, setDefaultOsteoType] = useState('PSO');
            const [defaultOsteoAngle, setDefaultOsteoAngle] = useState('25');
            const [pendingForceZone, setPendingForceZone] = useState(null);
            
            const exportRef = useRef(null);
            const containerWrapperRef = useRef(null);
            const fileInputRef = useRef(null);

            const levels = useMemo(() => {
                const lvls = [];
                // VIEW LOGIC
                if (viewMode === 'whole' || viewMode === 'cervical') { lvls.push({ id: 'Oc', type: 'Oc' }); ['C1','C2','C3','C4','C5','C6','C7'].forEach(l => lvls.push({ id:l, type:'C' })); }
                
                if (viewMode === 'cervical') { ['T1','T2','T3','T4'].forEach(l => lvls.push({ id:l, type:'T' })); }
                else if (viewMode === 't10_pelvis') { ['T10','T11','T12'].forEach(l => lvls.push({ id:l, type:'T' })); }
                else { ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'].forEach(l => lvls.push({ id:l, type:'T' })); }

                if (viewMode !== 'cervical') { ['L1','L2','L3','L4','L5'].forEach(l => lvls.push({ id:l, type:'L' })); lvls.push({ id:'S1', type:'S' }); lvls.push({ id:'Pelvis', type:'Pelvis' }); }
                return lvls;
            }, [viewMode]);

            const scheme = COLOUR_SCHEMES.find(s => s.id === colourScheme) || COLOUR_SCHEMES[0];

            // SERIALISE / DESERIALISE (single source of truth for save/load)
            const serializeState = () => ({
                formatVersion: 3,
                appVersion: CURRENT_VERSION,
                timestamp: new Date().toISOString(),
                patient: patientData,
                preferences: { viewMode, colourScheme },
                plan: { implants: plannedPlacements, cages: plannedCages, connectors: plannedConnectors, notes: plannedNotes },
                construct: { implants: completedPlacements, cages: completedCages, connectors: completedConnectors, notes: completedNotes },
            });
            // Migrate old yNorm connectors to {levelId, fraction} format
            const migrateConnectors = (conns) => {
                if (!conns) return conns;
                return conns.map(c => {
                    if (c.levelId) return c; // already migrated
                    if (c.yNorm === undefined) return c;
                    const anatomicalY = (c.yNorm / 1000) * WHOLE_SPINE_MAP.totalHeight;
                    const entry = WHOLE_SPINE_MAP.map.find(e => anatomicalY >= e.startY && anatomicalY < e.endY)
                        || WHOLE_SPINE_MAP.map[WHOLE_SPINE_MAP.map.length - 1];
                    const segLen = entry.vertEnd - entry.startY;
                    const fraction = segLen > 0 ? Math.max(0, Math.min(1, (anatomicalY - entry.startY) / segLen)) : 0.5;
                    return { id: c.id, levelId: entry.levelId, fraction, tool: 'connector' };
                });
            };
            const deserializeState = (json) => {
                if (json.patient) setPatientData(json.patient);
                if (json.plan) {
                    if (json.plan.implants) setPlannedPlacements(json.plan.implants);
                    if (json.plan.cages) setPlannedCages(json.plan.cages);
                    if (json.plan.connectors) setPlannedConnectors(migrateConnectors(json.plan.connectors));
                    if (json.plan.notes) setPlannedNotes(json.plan.notes);
                }
                if (json.construct) {
                    if (json.construct.implants) setCompletedPlacements(json.construct.implants);
                    if (json.construct.cages) setCompletedCages(json.construct.cages);
                    if (json.construct.connectors) setCompletedConnectors(migrateConnectors(json.construct.connectors));
                    if (json.construct.notes) setCompletedNotes(json.construct.notes);
                }
                if (json.preferences?.viewMode) setViewMode(json.preferences.viewMode);
                if (json.preferences?.colourScheme) setColourScheme(json.preferences.colourScheme);
            };

            // AUTO-LOAD
            useEffect(() => {
                const saved = localStorage.getItem('spine_planner_v2');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.formatVersion >= 2) deserializeState(parsed);
                    } catch (e) { console.error("Data load error"); }
                }
                setHasLoaded(true);
            }, []);

            // AUTO-SAVE
            useEffect(() => {
                if (hasLoaded && !incognitoMode) {
                    localStorage.setItem('spine_planner_v2', JSON.stringify(serializeState()));
                }
                if (incognitoMode) localStorage.removeItem('spine_planner_v2');
            }, [plannedPlacements, completedPlacements, plannedCages, completedCages, plannedConnectors, completedConnectors, plannedNotes, completedNotes, patientData, viewMode, colourScheme, hasLoaded, incognitoMode]);

            // RESIZE OBSERVER
            useEffect(() => {
                if (!containerWrapperRef.current) return;
                const observer = new ResizeObserver(() => {
                    if (containerWrapperRef.current && exportRef.current) {
                        const wrapperH = containerWrapperRef.current.clientHeight;
                        const wrapperW = containerWrapperRef.current.clientWidth;
                        setScale(Math.min((wrapperW - 40) / 1485, (wrapperH - 40) / 1050));
                    }
                });
                observer.observe(containerWrapperRef.current);
                return () => observer.disconnect();
            }, []);

            // ALL TOOL DEFINITIONS (for rendering and lookup)
            const allTools = [
                { id: 'monoaxial', label: 'Monoaxial', icon: 'monoaxial', needsSize: true, type: 'implant' },
                { id: 'polyaxial', label: 'Polyaxial', icon: 'polyaxial', needsSize: true, type: 'implant' },
                { id: 'uniplanar', label: 'Uniplanar', icon: 'uniplanar', needsSize: true, type: 'implant' },
                { id: 'pedicle_hook', label: 'Pedicle', icon: 'pedicle_hook', type: 'implant' },
                { id: 'tp_hook', label: 'TP Hook', icon: 'tp_hook', type: 'implant' },
                { id: 'tp_hook_up', label: 'TP Hook (Up)', icon: 'tp_hook_up', type: 'implant' },
                { id: 'sl_hook', label: 'Supra-laminar', icon: 'sl_hook', type: 'implant' },
                { id: 'il_hook', label: 'Infra-laminar', icon: 'il_hook', type: 'implant' },
                { id: 'band', label: 'Band', icon: 'band', type: 'implant' },
                { id: 'wire', label: 'Wire', icon: 'wire', type: 'implant' },
                { id: 'cable', label: 'Cable', icon: 'cable', type: 'implant' },
                { id: 'implant', label: 'Implant', icon: 'implant', type: 'mode' },
                { id: 'connector', label: 'Crosslink', icon: 'connector', type: 'mid' },
                { id: 'unstable', label: 'Unstable', icon: 'unstable', type: 'mid' },
                { id: 'osteotomy', label: 'Osteotomy', icon: 'osteotomy', isOsteotomy: true, type: 'mid' },
                { id: 'Corpectomy', label: 'Corpectomy', icon: 'cage', isOsteotomy: true, type: 'mid' },
                { id: 'translate_left', label: 'Trans Left', icon: 'translate_left', type: 'force' },
                { id: 'translate_right', label: 'Trans Right', icon: 'translate_right', type: 'force' },
                { id: 'compression', label: 'Compress', icon: 'compression', type: 'force' },
                { id: 'distraction', label: 'Distract', icon: 'distraction', type: 'force' },
                { id: 'derotate_cw', label: 'Derotate', icon: 'derotate_cw', type: 'force' },
                { id: 'derotate_ccw', label: 'Derotate', icon: 'derotate_ccw', type: 'force' },
                { id: 'note', label: 'Note', icon: 'note', type: 'annotation' },
            ];

            // SIDEBAR PALETTE
            const tools = [
                { category: 'Implants', items: allTools.filter(t => ['implant','connector'].includes(t.id)) },
                { category: 'Annotations', items: allTools.filter(t => ['unstable','osteotomy','Corpectomy','note'].includes(t.id)) },
            ];

            // LOGIC HANDLERS — zone determines behaviour
            const handleZoneClick = (levelId, zone) => {
                // ANNOTATION MODE: when note/pin selected, ALL clicks place notes
                if (selectedTool === 'note') {
                    const hs = calculateAutoScale(levels);
                    const levelObj = levels.find(l => l.id === levelId);
                    const vertH = levelObj ? getLevelHeight(levelObj) * hs : 30;
                    setPendingNoteTool({ tool: selectedTool, levelId, offsetX: -100, offsetY: Math.round(vertH / 2) });
                    setEditingNote(null);
                    setNoteModalOpen(true);
                    return;
                }

                const isForceZone = zone.startsWith('force');

                // Force zones → always open ForceModal
                if (isForceZone) {
                    setPendingForceZone({ levelId, zone });
                    setForceModalOpen(true);
                    return;
                }

                // Left/right zones → always open ScrewModal with last-used type
                if (zone === 'left' || zone === 'right') {
                    setPendingPlacement({ levelId, zone, tool: lastUsedScrewType });
                    setEditingPlacementId(null);
                    setEditingData(undefined);
                    setEditingTool(lastUsedScrewType);
                    setEditingAnnotation('');
                    setScrewModalOpen(true);
                    return;
                }

                // Mid zone → use currently selected palette tool
                const tool = allTools.find(t => t.id === selectedTool);
                if (!tool || tool.type === 'mode') return;
                if (tool.isOsteotomy) {
                    setPendingPlacement({ levelId, zone, tool: selectedTool });
                    setEditingPlacementId(null);
                    setEditingData(undefined);
                    if (selectedTool === 'Corpectomy') { setDefaultOsteoType('Corpectomy'); setDefaultOsteoAngle('0'); }
                    setOsteoModalOpen(true);
                } else if (selectedTool === 'connector') {
                    addConnector(levelId);
                } else {
                    addPlacement(levelId, zone, selectedTool, null);
                }
            };

            const handleForceConfirm = (forceType) => {
                if (pendingForceZone) {
                    addPlacement(pendingForceZone.levelId, pendingForceZone.zone, forceType, null);
                    setPendingForceZone(null);
                }
            };

            const handleDiscClick = (levelId) => {
                if (levelId === 'Oc' || levelId === 'C1' || levelId === 'S1' || levelId === 'Pelvis') return alert("No disc space below this level.");

                // Check if ANY cage type is permitted here
                const anyPermitted = Object.values(CAGE_PERMISSIBILITY).some(arr => arr.includes(levelId));
                if (!anyPermitted) return alert(`No interbody cage types are available at ${getDiscLabel(levelId, levels)}.`);

                const currentCages = activeChart === 'planned' ? plannedCages : completedCages;
                const existing = currentCages.find(c => c.levelId === levelId);
                setEditingCageLevel(levelId);
                setEditingData(existing);
                setCageModalOpen(true);
            };

            const handleCageConfirm = (data) => {
                const lvl = editingCageLevel;
                const permitted = CAGE_PERMISSIBILITY[data.type] || [];
                if (!permitted.includes(lvl)) {
                    const cageType = CAGE_TYPES.find(t => t.id === data.type);
                    return alert(`${cageType?.label || data.type.toUpperCase()} is not permitted at ${getDiscLabel(lvl, levels)}.`);
                }

                const newCage = { levelId: editingCageLevel, tool: data.type, data: { height: data.height, width: data.width, length: data.length, lordosis: data.lordosis, side: data.side } };
                const setter = activeChart === 'planned' ? setPlannedCages : setCompletedCages;
                setter(prev => {
                    const filtered = prev.filter(c => c.levelId !== editingCageLevel);
                    return [...filtered, newCage];
                });
            };

            const handleDeleteCage = () => {
                const setter = activeChart === 'planned' ? setPlannedCages : setCompletedCages;
                setter(prev => prev.filter(c => c.levelId !== editingCageLevel));
                setCageModalOpen(false);
            };

            const handlePlacementClick = (p) => {
                const tool = allTools.find(t => t.id === p.tool);
                const isHookType = NO_SIZE_TYPES.includes(p.tool);
                if (tool.needsSize || isHookType) { setEditingPlacementId(p.id); setEditingData(p.data); setEditingTool(p.tool); setEditingAnnotation(p.annotation || ''); setScrewModalOpen(true); }
                else if (tool.isOsteotomy) { setEditingPlacementId(p.id); setEditingData(p.data); setOsteoModalOpen(true); }
                else { removePlacement(p.id); }
            };

            const handleScrewConfirm = (sizeData, components, finalType, annotation) => {
                if (components) { setDefaultDiameter(components.diameter); setDefaultLength(components.length); setDefaultScrewMode(components.mode); setDefaultCustomText(components.customText || ''); }
                setLastUsedScrewType(finalType);
                if (editingPlacementId) { updatePlacement(editingPlacementId, finalType, sizeData, annotation); setEditingPlacementId(null); }
                else if (pendingPlacement) { addPlacement(pendingPlacement.levelId, pendingPlacement.zone, finalType, sizeData, annotation); setPendingPlacement(null); }
            };

            const handleOsteoConfirm = (data) => {
                setDefaultOsteoType(data.type); setDefaultOsteoAngle(data.angle);
                if (editingPlacementId) { updatePlacement(editingPlacementId, 'osteotomy', data); setEditingPlacementId(null); } 
                else if (pendingPlacement) { addPlacement(pendingPlacement.levelId, pendingPlacement.zone, 'osteotomy', data); setPendingPlacement(null); }
            };

            const addPlacement = (levelId, zone, tool, data, annotation) => {
                const newP = { id: genId(), levelId, zone, tool, data, annotation: annotation || '' };
                const setter = activeChart === 'planned' ? setPlannedPlacements : setCompletedPlacements;
                setter(prev => [...prev, newP]);
            };
            const updatePlacement = (id, tool, data, annotation) => {
                const updater = (prev) => prev.map(p =>
                    p.id === id ? { ...p, tool, data, annotation: annotation !== undefined ? annotation : (p.annotation || '') } : p
                );
                if (activeChart === 'planned') setPlannedPlacements(updater);
                else setCompletedPlacements(updater);
            };
            const removePlacement = (id) => {
                const filter = prev => prev.filter(p => p.id !== id);
                if (activeChart === 'planned') setPlannedPlacements(filter);
                else setCompletedPlacements(filter);
                setScrewModalOpen(false);
                setOsteoModalOpen(false);
            };

            // CONNECTOR HANDLERS
            const addConnector = (levelId) => {
                const newConn = { id: genId(), levelId, fraction: 0.5, tool: 'connector' };
                const setter = activeChart === 'planned' ? setPlannedConnectors : setCompletedConnectors;
                setter(prev => [...prev, newConn]);
            };
            const updateConnector = (connId, { levelId, fraction }) => {
                const updater = prev => prev.map(c => c.id === connId ? { ...c, levelId, fraction } : c);
                if (activeChart === 'planned') setPlannedConnectors(updater); else setCompletedConnectors(updater);
            };
            const removeConnector = (connId) => {
                const filter = prev => prev.filter(c => c.id !== connId);
                if (activeChart === 'planned') setPlannedConnectors(filter); else setCompletedConnectors(filter);
            };

            // NOTE HANDLERS
            const handleNoteConfirm = (text, showArrow) => {
                if (editingNote) {
                    // Update existing note
                    const updater = prev => prev.map(n => n.id === editingNote.id ? { ...n, text, showArrow } : n);
                    if (activeChart === 'planned') setPlannedNotes(updater); else setCompletedNotes(updater);
                    setEditingNote(null);
                } else if (pendingNoteTool) {
                    // Create new note
                    const newNote = { id: genId(), tool: pendingNoteTool.tool, levelId: pendingNoteTool.levelId, text, offsetX: pendingNoteTool.offsetX, offsetY: pendingNoteTool.offsetY, showArrow };
                    const setter = activeChart === 'planned' ? setPlannedNotes : setCompletedNotes;
                    setter(prev => [...prev, newNote]);
                    setPendingNoteTool(null);
                }
            };
            const handleNoteDelete = () => {
                if (editingNote) {
                    const filter = prev => prev.filter(n => n.id !== editingNote.id);
                    if (activeChart === 'planned') setPlannedNotes(filter); else setCompletedNotes(filter);
                    setEditingNote(null);
                    setNoteModalOpen(false);
                }
            };
            const handleNoteClick = (note) => {
                setEditingNote(note);
                setPendingNoteTool(null);
                setNoteModalOpen(true);
            };
            const updateNotePosition = (noteId, { offsetX, offsetY }) => {
                const updater = prev => prev.map(n => n.id === noteId ? { ...n, offsetX, offsetY } : n);
                if (activeChart === 'planned') setPlannedNotes(updater); else setCompletedNotes(updater);
            };
            const removeNote = (noteId) => {
                const filter = prev => prev.filter(n => n.id !== noteId);
                if (activeChart === 'planned') setPlannedNotes(filter); else setCompletedNotes(filter);
            };

            // EXPORT
            const prepareExportCanvas = async () => {
                await document.fonts.ready;
                const element = exportRef.current;
                // Sync DOM properties to attributes so cloneNode preserves them
                element.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    if (cb.checked) cb.setAttribute('checked', 'checked');
                    else cb.removeAttribute('checked');
                });
                element.querySelectorAll('select').forEach(sel => {
                    Array.from(sel.options).forEach((opt, i) => {
                        if (i === sel.selectedIndex) opt.setAttribute('selected', 'selected');
                        else opt.removeAttribute('selected');
                    });
                });
                const canvas = await htmlToImage.toCanvas(element, {
                    pixelRatio: 2,
                    backgroundColor: '#ffffff',
                    width: 1485,
                    height: 1050
                });
                return canvas;
            };
            const runExportJPG = async () => {
                const canvas = await prepareExportCanvas();
                const link = document.createElement('a');
                link.download = `SpinePlan_${patientData.name || 'Patient'}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
                if (incognitoMode) localStorage.removeItem('spine_planner_v2');
            };
            const runExportPDF = async () => {
                const canvas = await prepareExportCanvas();
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [1485, 1050] });
                pdf.addImage(imgData, 'JPEG', 0, 0, 1485, 1050);
                pdf.save(`SpinePlan_${patientData.name || 'Patient'}.pdf`);
                if (incognitoMode) localStorage.removeItem('spine_planner_v2');
            };
            const saveProjectJSON = () => {
                const data = serializeState();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `SpineProject_${patientData.name || 'Unnamed'}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                if (incognitoMode) localStorage.removeItem('spine_planner_v2');
            };
            const loadProjectJSON = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const json = JSON.parse(ev.target.result);
                        if (json.formatVersion >= 2) {
                            deserializeState(json);
                        } else {
                            alert("Unsupported file format. Please use a file saved by this application.");
                            return;
                        }
                        alert("Project Loaded Successfully.");
                    } catch(err) { alert("Invalid File"); }
                };
                reader.readAsText(file); e.target.value = null;
            };

            const copyPlanToCompleted = () => {
                if (plannedPlacements.length === 0 && plannedConnectors.length === 0 && plannedNotes.length === 0) return alert("No plan to copy.");
                if ((completedPlacements.length > 0 || completedConnectors.length > 0 || completedNotes.length > 0) && !confirm("Overwrite existing construct?")) return;
                setCompletedPlacements(plannedPlacements.map(p => ({...p, id: genId()})));
                setCompletedCages(plannedCages.map(c => ({...c})));
                setCompletedConnectors(plannedConnectors.map(c => ({...c, id: genId()})));
                setCompletedNotes(plannedNotes.map(n => ({...n, id: genId()})));
                setActiveChart('completed');
            };

            return (
                <div className="h-full flex flex-col overflow-hidden">
                    <ScrewModal isOpen={screwModalOpen} onClose={() => setScrewModalOpen(false)} onConfirm={handleScrewConfirm} onDelete={() => removePlacement(editingPlacementId)} initialData={editingData} initialTool={editingTool} defaultDiameter={defaultDiameter} defaultLength={defaultLength} defaultMode={defaultScrewMode} defaultCustomText={defaultCustomText} initialAnnotation={editingAnnotation} />
                    <OsteotomyModal isOpen={osteoModalOpen} onClose={() => setOsteoModalOpen(false)} onConfirm={handleOsteoConfirm} onDelete={() => removePlacement(editingPlacementId)} initialData={editingData} defaultType={defaultOsteoType} defaultAngle={defaultOsteoAngle} />
                    <CageModal isOpen={cageModalOpen} onClose={() => setCageModalOpen(false)} onConfirm={handleCageConfirm} onDelete={handleDeleteCage} initialData={editingData} levelId={editingCageLevel} levels={levels} />
                    <ForceModal isOpen={forceModalOpen} onClose={() => setForceModalOpen(false)} onConfirm={handleForceConfirm} />
                    <HelpModal isOpen={helpModalOpen} onClose={() => setHelpModalOpen(false)} />
                    <ChangeLogModal isOpen={changeLogOpen} onClose={() => setChangeLogOpen(false)} />
                    <NoteModal isOpen={noteModalOpen} onClose={() => { setNoteModalOpen(false); setEditingNote(null); setPendingNoteTool(null); }} onConfirm={handleNoteConfirm} onDelete={handleNoteDelete} initialText={editingNote?.text || ''} initialShowArrow={editingNote?.showArrow || false} isEditing={!!editingNote} />

                    <div className="flex-1 overflow-hidden bg-slate-200 flex relative">
                        <aside className="w-64 text-white flex flex-col z-20 overflow-y-auto no-print shadow-xl" style={{ backgroundColor: scheme.sidebarBg, borderRight: `1px solid ${scheme.sidebarBorder}` }}>
                            {/* App Title */}
                            <div className="px-3 py-2" style={{ backgroundColor: scheme.sidebarTitleBg, borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                <h1 className="font-bold text-lg text-white leading-tight">Spinal Instrumentation</h1>
                                <button onClick={() => setChangeLogOpen(true)} className="text-[10px] text-white/40 font-mono hover:text-white">{CURRENT_VERSION}</button>
                            </div>

                            {/* Region View */}
                            <div className="p-3" style={{ borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                <h3 className="text-[10px] uppercase font-bold text-white/40 mb-1.5 tracking-widest">Region View</h3>
                                <div className="grid grid-cols-2 gap-1">
                                    {['cervical','thoracolumbar','t10_pelvis','whole'].map(vm => {
                                        const labels = { cervical: 'Cervical (Occ-T4)', thoracolumbar: 'Thoracic (T1-Pelvis)', t10_pelvis: 'Lumbar (T10-Pelvis)', whole: 'Whole Spine' };
                                        const active = viewMode === vm;
                                        return <button key={vm} onClick={() => setViewMode(vm)} className={`py-1.5 px-1 text-[10px] rounded border font-bold transition-all ${active ? 'border-transparent' : 'text-white/70 hover:text-white'}`} style={active ? { backgroundColor: scheme.activeBg, color: scheme.activeText, borderColor: scheme.activeBorder } : { backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}>{labels[vm]}</button>;
                                    })}
                                </div>
                            </div>

                            {/* Theme */}
                            <div className="p-3" style={{ borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                <div className="relative">
                                    <button onClick={() => setThemeOpen(!themeOpen)} className="w-full flex items-center gap-2 text-xs text-white/70 hover:text-white py-1 rounded transition-colors">
                                        <div className="w-4 h-4 rounded-full border border-white/30 shrink-0" style={{ backgroundColor: scheme.swatch }}></div>
                                        <span className="font-bold text-[10px] uppercase tracking-widest text-white/40">Theme</span>
                                        <span className="text-white/30 ml-auto text-[10px]">{scheme.label}</span>
                                    </button>
                                    {themeOpen && (
                                        <div className="absolute left-0 right-0 top-full mt-1 rounded-lg shadow-xl border p-1.5 z-50" style={{ backgroundColor: scheme.sidebarTitleBg, borderColor: scheme.sidebarBorder }}>
                                            {COLOUR_SCHEMES.map(s => (
                                                <button key={s.id} onClick={() => { setColourScheme(s.id); setThemeOpen(false); }}
                                                    className={`w-full flex items-center gap-2 px-2 py-1.5 rounded text-xs transition-all ${colourScheme === s.id ? 'text-white font-bold' : 'text-white/60 hover:text-white'}`}
                                                    style={colourScheme === s.id ? { backgroundColor: s.activeBg, color: s.activeText } : undefined}>
                                                    <div className="w-4 h-4 rounded-full border border-white/20 shrink-0" style={{ backgroundColor: s.swatch }}></div>
                                                    {s.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Plan / Construct Toggle */}
                            <div className="p-3" style={{ borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                <div className="flex rounded p-1 border" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}>
                                    <button onClick={() => setActiveChart('planned')} className={`flex-1 px-3 py-1.5 rounded transition-all text-xs ${activeChart==='planned'?'font-bold':'text-white/50 hover:text-white'}`} style={activeChart==='planned' ? { backgroundColor: scheme.activeBg, color: scheme.activeText } : undefined}>Plan</button>
                                    <button onClick={() => setActiveChart('completed')} className={`flex-1 px-3 py-1.5 rounded transition-all text-xs ${activeChart==='completed'?'font-bold':'text-white/50 hover:text-white'}`} style={activeChart==='completed' ? { backgroundColor: scheme.activeBg, color: scheme.activeText } : undefined}>Construct</button>
                                </div>
                            </div>

                            {/* Tool Palette */}
                            <div className="p-3 space-y-3" style={{ borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                {tools.map((g,i) => (
                                    <div key={i}>
                                        <h3 className="text-[10px] uppercase font-bold text-white/40 mb-1.5 tracking-widest">{g.category}</h3>
                                        <div className="grid grid-cols-2 gap-1">
                                            {g.items.map(t => {
                                                const active = selectedTool === t.id;
                                                return <button key={t.id} onClick={() => setSelectedTool(t.id)} className={`p-1 h-10 rounded border flex flex-col items-center justify-center gap-0.5 transition-all text-xs ${active ? 'font-bold' : 'text-white/80 hover:text-white'}`} style={active ? { backgroundColor: scheme.activeBg, color: scheme.activeText, borderColor: scheme.activeBorder } : { backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}>
                                                    <InstrumentIcon type={t.icon} className="w-3.5 h-3.5" color={active ? scheme.activeText : 'white'} />
                                                    <span className="text-center text-[9px] leading-tight">{t.label}</span>
                                                </button>;
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Actions */}
                            <div className="p-3 space-y-2">
                                <h3 className="text-[10px] uppercase font-bold text-white/40 mb-2 tracking-widest">Actions</h3>
                                <button onClick={copyPlanToCompleted} className="w-full flex items-center justify-center gap-2 text-white px-3 py-2 rounded text-xs font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconCopy /> Copy Plan to Construct</button>
                                <div className="pt-2 mt-2" style={{ borderTop: `1px solid ${scheme.sidebarBorder}` }}>
                                    <input type="file" ref={fileInputRef} onChange={loadProjectJSON} className="hidden" accept=".json" />
                                    <div className="grid grid-cols-2 gap-1">
                                        <button onClick={() => fileInputRef.current.click()} className="flex items-center justify-center gap-1 text-white/70 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconUpload /> Load</button>
                                        <button onClick={saveProjectJSON} className="flex items-center justify-center gap-1 text-white/70 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconSave /> Save</button>
                                        <button onClick={runExportJPG} className="flex items-center justify-center gap-1 text-white/70 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconImage /> JPG</button>
                                        <button onClick={runExportPDF} className="flex items-center justify-center gap-1 text-white/70 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconPDF /> PDF</button>
                                    </div>
                                </div>
                                <div className="pt-2 mt-2" style={{ borderTop: `1px solid ${scheme.sidebarBorder}` }}>
                                    <div className={`flex items-center gap-2 px-2 py-2 rounded border cursor-pointer transition-colors ${incognitoMode ? 'bg-red-900/30 border-red-500/50' : 'bg-transparent border-transparent hover:bg-white/5'}`} onClick={() => setIncognitoMode(!incognitoMode)}>
                                        <div className="relative inline-block w-10 h-5 align-middle select-none shrink-0"><input type="checkbox" className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300" style={{ top: 0, left: 0 }} checked={incognitoMode} onChange={(e) => setIncognitoMode(e.target.checked)}/><label className={`toggle-label block overflow-hidden h-5 rounded-full cursor-pointer border ${incognitoMode ? 'bg-red-600 border-red-600' : 'bg-slate-600 border-slate-600'}`}></label></div>
                                        <span className={`text-[10px] font-bold uppercase tracking-wider ${incognitoMode ? 'text-red-400' : 'text-white/40'}`}>Session Privacy</span>
                                    </div>
                                </div>
                                <div className="pt-2 mt-2 flex gap-1" style={{ borderTop: `1px solid ${scheme.sidebarBorder}` }}>
                                    <button onClick={() => setHelpModalOpen(true)} className="flex-1 flex items-center justify-center gap-1 text-white/50 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold hover:bg-white/10"><IconHelp /> Help</button>
                                    <button onClick={() => {
                                        if (confirm("Start New Patient? This will clear the current plan.")) {
                                            setPlannedPlacements([]);
                                            setCompletedPlacements([]);
                                            setPlannedCages([]);
                                            setCompletedCages([]);
                                            setPlannedConnectors([]);
                                            setCompletedConnectors([]);
                                            setPlannedNotes([]);
                                            setCompletedNotes([]);
                                            setPatientData({
                                                name: '', id: '', surgeon: '', location: '',
                                                date: new Date().toISOString().split('T')[0],
                                                company: '', screwSystem: '', leftRod: '', rightRod: '',
                                                boneGraft: { types: [], notes: '' }
                                            });
                                            setActiveChart('planned');
                                        }
                                    }} className="flex-1 flex items-center justify-center gap-1 text-red-400 hover:text-red-200 px-2 py-1.5 rounded text-[10px] font-bold hover:bg-white/10">
                                        <IconTrash /> New Patient
                                    </button>
                                </div>
                            </div>

                            <CreditsFooter />
                        </aside>

                        <div ref={containerWrapperRef} id="print-wrapper" className="flex-1 flex items-center justify-center p-8 bg-slate-300 overflow-hidden relative">
                            <div style={{ transform: `scale(${scale})` }}>
                                <div id="export-container" ref={exportRef}>
                                    <div className="w-[340px] bg-white border-r border-slate-300 flex flex-col p-8">
                                        <h2 className="font-bold text-2xl text-slate-900 mb-4 border-b-4 border-slate-900 pb-2">Spinal Instrumentation</h2>
                                        <div className="flex-1 flex flex-col overflow-y-auto min-h-0">
                                            <div className="space-y-1 shrink-0">
                                                <div><label className="block text-[9px] font-bold text-slate-500 uppercase mb-0">Patient Name</label><div className="editable-field w-full text-xs font-semibold" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, name: e.target.innerText})} placeholder="Click to enter...">{patientData.name}</div></div>
                                                <div><label className="block text-[9px] font-bold text-slate-500 uppercase mb-0">Patient ID</label><div className="editable-field w-full text-xs font-mono" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, id: e.target.innerText})} placeholder="Click to enter...">{patientData.id}</div></div>
                                                <div><label className="block text-[9px] font-bold text-slate-500 uppercase mb-0">Surgeon</label><div className="editable-field w-full text-xs" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, surgeon: e.target.innerText})} placeholder="Click to enter...">{patientData.surgeon}</div></div>
                                                <div><label className="block text-[9px] font-bold text-slate-500 uppercase mb-0">Date</label><div className="editable-field w-full text-xs cursor-pointer" onClick={() => setIsEditingDate(true)}>{isEditingDate ? <input type="date" className="w-full text-xs border-b border-slate-800 bg-transparent outline-none py-0" value={patientData.date} autoFocus onBlur={()=>setIsEditingDate(false)} onChange={e=>setPatientData({...patientData, date:e.target.value})} /> : formatDate(patientData.date)}</div></div>
                                            </div>
                                            <div className="border-t border-slate-200 my-3"></div>
                                            <div className="space-y-1 shrink-0">
                                                <div><label className="block text-[9px] font-bold text-slate-500 uppercase mb-0">Implant Supplier</label><select className="editable-field w-full text-xs bg-white cursor-pointer" value={patientData.company} onChange={e => { const v = e.target.value; setPatientData({...patientData, company: v}); if (AUTO_THEME_FROM_COMPANY && COMPANY_THEME_MAP[v]) { setColourScheme(COMPANY_THEME_MAP[v]); } }}><option value="">Select supplier...</option>{IMPLANT_COMPANIES.map(c => <option key={c} value={c}>{c}</option>)}<option value="__other">Other</option></select>{patientData.company === '__other' && <div className="editable-field w-full text-xs mt-0.5" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, company: e.target.innerText})} placeholder="Enter company name..."></div>}</div>
                                                <div><label className="block text-[9px] font-bold text-slate-500 uppercase mb-0">Screw System</label><ScrewSystemCombo value={patientData.screwSystem} onChange={v => setPatientData({...patientData, screwSystem: v})} company={patientData.company} placeholder="e.g. Expedium, Solera, Xia" /></div>
                                            </div>
                                            <div className="border-t border-slate-200 my-2"></div>
                                            <div className="shrink-0">
                                                <h3 className="text-[9px] font-bold text-slate-500 uppercase mb-1">Bone Graft</h3>
                                                <div className="grid grid-cols-3 gap-x-1 gap-y-0.5">
                                                    {BONE_GRAFT_OPTIONS.map(opt => (
                                                        <label key={opt} className="flex items-center gap-1 text-[10px] text-slate-700 cursor-pointer hover:text-slate-900 leading-tight">
                                                            <input type="checkbox" className="w-3 h-3 rounded border-slate-300 text-amber-500 focus:ring-amber-500 shrink-0" checked={(patientData.boneGraft?.types || []).includes(opt)} onChange={e => { const types = patientData.boneGraft?.types || []; setPatientData({...patientData, boneGraft: { ...patientData.boneGraft, types: e.target.checked ? [...types, opt] : types.filter(t => t !== opt) }}); }} />
                                                            <span className="truncate">{opt}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                                <div className="editable-field w-full text-[10px] mt-1" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, boneGraft: { ...(patientData.boneGraft || {}), notes: e.target.innerText }})} placeholder="Additional details...">{patientData.boneGraft?.notes || ''}</div>
                                            </div>
                                            <ImplantInventory placements={[...(activeChart === 'planned' ? plannedPlacements : completedPlacements), ...(activeChart === 'planned' ? plannedCages : completedCages).map(c => ({...c, tool: c.tool})), ...(activeChart === 'planned' ? plannedConnectors : completedConnectors).map(c => ({...c, levelId: levels[0]?.id || 'T1', zone: 'mid'}))]} tools={[...allTools, {id: 'tlif', label: 'TLIF Cage'}, {id: 'plif', label: 'PLIF Cage'}, {id: 'acdf', label: 'ACDF Cage'}, {id: 'xlif', label: 'XLIF/LLIF Cage'}, {id: 'olif', label: 'OLIF Cage'}, {id: 'alif', label: 'ALIF Cage'}]} title={activeChart === 'planned' ? 'Plan' : 'Construct'} visibleLevelIds={levels.map(l => l.id)} levels={levels} />
                                        </div>
                                        <CreditsFooter />
                                    </div>
                                    <div className="flex-[4] flex flex-col h-full"><ChartPaper title="Plan" placements={plannedPlacements} onZoneClick={handleZoneClick} onPlacementClick={handlePlacementClick} tools={allTools} readOnly={activeChart !== 'planned'} levels={levels} showForces={true} heightScale={calculateAutoScale(levels)} cages={plannedCages} onDiscClick={handleDiscClick} connectors={plannedConnectors} onConnectorUpdate={updateConnector} onConnectorRemove={removeConnector} viewMode={viewMode} notes={plannedNotes} onNoteUpdate={updateNotePosition} onNoteRemove={removeNote} onNoteClick={handleNoteClick} /></div>
                                    <div className="flex-[3] flex flex-col h-full"><ChartPaper title="Final Surgical Construct" placements={completedPlacements} onZoneClick={handleZoneClick} onPlacementClick={handlePlacementClick} tools={allTools} readOnly={activeChart !== 'completed'} levels={levels} showForces={false} heightScale={calculateAutoScale(levels)} cages={completedCages} onDiscClick={handleDiscClick} connectors={completedConnectors} onConnectorUpdate={updateConnector} onConnectorRemove={removeConnector} viewMode={viewMode} notes={completedNotes} onNoteUpdate={updateNotePosition} onNoteRemove={removeNote} onNoteClick={handleNoteClick} rodHeader={<React.Fragment><div className="flex items-center justify-end gap-1"><span className="text-[8px] font-bold text-slate-400 uppercase shrink-0">Rod:</span><div className="editable-field text-[9px] py-0.5 px-1 text-right" style={{ minWidth: '60px' }} contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, leftRod: e.target.innerText})} placeholder="e.g. 5.5mm CoCr Rod">{patientData.leftRod}</div></div><div className="flex items-center justify-start gap-1"><span className="text-[8px] font-bold text-slate-400 uppercase shrink-0">Rod:</span><div className="editable-field text-[9px] py-0.5 px-1 text-left" style={{ minWidth: '60px' }} contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, rightRod: e.target.innerText})} placeholder="e.g. 5.5mm TiAlV Rail">{patientData.rightRod}</div></div></React.Fragment>} /></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
