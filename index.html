<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinal Instrumentation Planner</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        body { font-family: 'Inter', sans-serif; font-feature-settings: "tnum"; overflow: hidden; background-color: #f1f5f9; }
        .serif { font-family: 'Source Serif 4', serif; }
        .font-heading { font-family: 'Source Serif 4', serif; }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        /* EXPORT CONTAINER */
        #export-container {
            width: 1485px; 
            height: 1050px; 
            background: white;
            margin: 0 auto;
            display: flex;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            flex-shrink: 0;
            transform-origin: top center; 
        }

        /* EDITABLE FIELDS */
        .editable-field {
            border-bottom: 1px dashed #cbd5e1;
            min-width: 100px;
            display: inline-block;
            color: #334155;
            padding: 2px 0; 
            outline: none;
            cursor: text;
            line-height: 1.4;
        }
        .editable-field:focus {
            border-bottom: 1px solid #0f172a;
            background-color: #f8fafc;
        }
        .editable-field:empty:before {
            content: attr(placeholder);
            color: #94a3b8;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Incognito Toggle Animation */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #ef4444;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #ef4444;
        }

        /* Modal Overlay */
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(2px);
        }
        
        /* Hide scrollbar inside export container */
        #export-container ::-webkit-scrollbar { display: none; }
        #export-container * { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="root" class="h-screen w-screen flex flex-col"></div>

        ];

          { label: 'Anterior', desc: 'Separate anterior exposure', types: ['acdf','alif'] },

        const getDiscLabel = (levelId, levels) => {
          const idx = levels.findIndex(l => l.id === levelId);
          const nextLevel = idx >= 0 && idx < levels.length - 1 ? levels[idx + 1] : null;
          if (!nextLevel) return levelId;
          const nextNum = nextLevel.id.replace(/^[A-Z]+/, '');
          return `${levelId}/${nextNum}`;
        };

                            <div className="flex gap-4">
                                <div className="min-w-[40px] pt-1"><IconSave /></div>
                                <div><h4 className="font-bold text-slate-800 text-sm mb-1">Save / Load</h4><p className="text-xs text-slate-600 leading-relaxed">Save exports a .json project file. Load re-imports it. JPG and PDF export the visible plan for clinical records.</p></div>
                            </div>
                            <div className="border-t border-slate-200 pt-4 mt-2">
                                <p className="text-[11px] text-slate-700 leading-relaxed">
                                    <span className="font-bold text-slate-900">Spinal Instrumentation Planner</span> {CURRENT_VERSION}<br/>
                                    Developed by <span className="font-bold">Nigel Gummerson FRCS (Tr & Orth)</span><br/>
                                    Developed in Leeds, UK
                                </p>
                                <div className="flex items-start gap-1 text-[10px] text-slate-400 leading-tight mt-2">
                                    <div className="mt-0.5 shrink-0"><IconCC /></div>
                                    <span>Licensed under the <a href="https://www.gnu.org/licenses/gpl-3.0.en.html" target="_blank" rel="noopener noreferrer" className="underline hover:text-slate-600">GNU GPLv3 License</a>. For commercial distribution enquiries, contact the developer.</span>
                                </div>
                            </div>
                        </div>
                        <div className="bg-slate-50 px-4 py-3 text-right border-t border-slate-200">
                            <button onClick={onClose} className="px-4 py-2 rounded bg-slate-800 text-white hover:bg-slate-700 text-sm font-bold">Close</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ScrewModal = ({ isOpen, onClose, onConfirm, onDelete, initialData, initialTool, defaultDiameter, defaultLength, defaultMode, defaultCustomText }) => {
            if (!isOpen) return null;
            const [mode, setMode] = useState(defaultMode || 'standard');
            const [diameter, setDiameter] = useState(defaultDiameter);
            const [length, setLength] = useState(defaultLength);
            const [customText, setCustomText] = useState(defaultCustomText || '');
            const [selectedType, setSelectedType] = useState(initialTool || 'polyaxial');
            const isHook = ['pedicle_hook','tp_hook','sl_hook','il_hook'].includes(selectedType);

            useEffect(() => {
                if (isOpen) {
                    if (initialTool) setSelectedType(initialTool);
                    if (initialData && typeof initialData === 'string') {
                         if (initialData === "Custom") { setMode('custom'); setCustomText(defaultCustomText || ''); }
                         else if (initialData.includes('x')) { const parts = initialData.split('x'); if (parts.length === 2) { setMode('standard'); setDiameter(parts[0]); setLength(parts[1]); } else { setMode('custom'); setCustomText(initialData); } }
                         else { setMode(defaultMode || 'standard'); }
                    } else if (initialData === null && initialData !== undefined) { setMode('none'); }
                    else { setMode(defaultMode || 'standard'); setDiameter(defaultDiameter); setLength(defaultLength); setCustomText(defaultCustomText || ''); }
                }
            }, [isOpen, initialData, initialTool, defaultDiameter, defaultLength, defaultMode, defaultCustomText]);

            const handleSubmit = () => { let finalSize = null; if (isHook) { finalSize = null; } else if (mode === 'custom') finalSize = customText || "Custom"; else if (mode === 'standard') finalSize = `${diameter}x${length}`; onConfirm(finalSize, isHook ? null : { diameter, length, mode, customText }, selectedType); onClose(); };
            const isEditing = initialData !== undefined;
            const hookLabels = { pedicle_hook: 'Pedicle', tp_hook: 'TP', sl_hook: 'Supra-lam', il_hook: 'Infra-lam' };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-[fadeIn_0.2s_ease-out]">
                    <div className="bg-white rounded-lg shadow-2xl w-full max-w-sm overflow-hidden">
                        <div className="bg-slate-900 text-white px-4 py-3 flex justify-between items-center"><h3 className="font-bold text-sm">{isEditing ? 'Edit Implant' : 'Select Implant'}</h3><button onClick={onClose} className="hover:text-red-400"><IconX /></button></div>
                        <div className="p-6">
                            <div className="bg-slate-100 p-1 rounded mb-2">
                                <div className="grid grid-cols-3 gap-1">{['monoaxial', 'polyaxial', 'uniplanar'].map(t => (<button key={t} onClick={() => setSelectedType(t)} className={`py-2 px-1 text-[10px] font-bold uppercase rounded transition-all flex flex-col items-center gap-1 ${selectedType === t ? 'bg-white shadow text-slate-900' : 'text-slate-400 hover:text-slate-600'}`}><InstrumentIcon type={t} className="w-5 h-5" color={selectedType === t ? '#0f172a' : '#94a3b8'} />{t.replace('axial','')}</button>))}</div>
                            </div>
                            <div className="bg-slate-100 p-1 rounded mb-6">
                                <div className="grid grid-cols-4 gap-1">{['pedicle_hook', 'tp_hook', 'sl_hook', 'il_hook'].map(t => (<button key={t} onClick={() => setSelectedType(t)} className={`py-2 px-1 text-[10px] font-bold uppercase rounded transition-all flex flex-col items-center gap-1 ${selectedType === t ? 'bg-white shadow text-slate-900' : 'text-slate-400 hover:text-slate-600'}`}><InstrumentIcon type={t} className="w-5 h-5" color={selectedType === t ? '#0f172a' : '#94a3b8'} />{hookLabels[t]}</button>))}</div>
                            </div>
                            {isHook ? (
                                <div className="text-center py-6 text-slate-400 text-sm italic">Hook placement — no sizing.</div>
                            ) : (<>
                                <div className="flex gap-2 mb-4">{['standard','custom','none'].map(m => { const labels = { standard: 'Standard', custom: 'Custom', none: 'No Size' }; const active = mode === m; return <button key={m} onClick={() => setMode(m)} className={`flex-1 py-1 text-xs font-bold rounded border transition-all ${active ? 'bg-amber-500 text-slate-900 border-amber-600' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>{labels[m]}</button>; })}</div>
                                {mode === 'standard' && (<div className="space-y-4"><div className="grid grid-cols-4 gap-2"><select value={diameter} onChange={(e) => setDiameter(e.target.value)} className="col-span-4 w-full p-2 border border-slate-300 rounded bg-slate-50 text-lg font-mono focus:border-amber-500 outline-none">{DIAMETER_OPTIONS.map(d => <option key={d} value={d}>{d} mm</option>)}</select></div><select value={length} onChange={(e) => setLength(e.target.value)} className="w-full p-2 border border-slate-300 rounded bg-slate-50 text-lg font-mono focus:border-amber-500 outline-none">{LENGTH_OPTIONS.map(l => <option key={l} value={l}>{l} mm</option>)}</select></div>)}
                                {mode === 'custom' && <input type="text" value={customText} onChange={(e) => setCustomText(e.target.value)} placeholder="e.g. 8.0x110" className="w-full p-2 border border-slate-300 rounded bg-slate-50 text-lg focus:border-amber-500 outline-none" autoFocus />}
                                {mode === 'none' && <div className="text-center py-6 text-slate-400 text-sm italic">Icon only. No label.</div>}
                            </>)}
                        </div>
                        <div className="bg-slate-50 px-4 py-3 flex justify-between border-t border-slate-100">{isEditing ? <button onClick={onDelete} className="text-red-500 hover:bg-red-50 px-3 py-1 rounded text-sm font-bold flex gap-1 items-center" title="Shortcut: Delete"><IconTrash/> Remove</button> : <div></div>}<div className="flex gap-2"><button onClick={onClose} className="px-4 py-2 rounded text-slate-500 hover:bg-slate-200 text-sm font-bold" title="Shortcut: Esc">Cancel</button><button onClick={handleSubmit} className="px-6 py-2 rounded bg-slate-800 text-white hover:bg-slate-700 text-sm font-bold shadow-lg" title="Shortcut: Enter">Confirm</button></div></div>
                    </div>
                </div>
            );
        };

        // --- CAGE MODAL (with approach grouping, permissibility, side selector) ---
        const CageModal = ({ isOpen, onClose, onConfirm, onDelete, initialData, levelId, levels }) => {
            if (!isOpen) return null;

            // Determine smart default type for this level
            const getDefaultType = (lvl) => {
                if (!lvl) return 'tlif';
                if (lvl.startsWith('C')) return 'acdf';
                if (lvl === 'T11' || lvl === 'T12') return 'xlif';
                if (lvl === 'L1' || lvl === 'L2' || lvl === 'L3') return 'xlif';
                if (lvl === 'L4') return 'tlif';
                if (lvl === 'L5') return 'alif';
                return 'tlif';
            };

            const permittedTypes = CAGE_TYPES.filter(ct => (CAGE_PERMISSIBILITY[ct.id] || []).includes(levelId));

            const initType = initialData ? initialData.tool : getDefaultType(levelId);
            // If initType isn't permitted, fall back to first permitted
            const safeInitType = permittedTypes.find(t => t.id === initType) ? initType : (permittedTypes[0]?.id || 'tlif');
            const initDef = CAGE_TYPES.find(t => t.id === safeInitType);

            const [type, setType] = useState(safeInitType);
            const [height, setHeight] = useState(initialData?.data?.height || initDef?.defaults?.height || '10');
            const [width, setWidth] = useState(initialData?.data?.width || initDef?.defaults?.width || '10');
            const [length, setLength] = useState(initialData?.data?.length || initDef?.defaults?.length || '25');
            const [lordosis, setLordosis] = useState(initialData?.data?.lordosis || initDef?.defaults?.lordosis || '0');
            const [side, setSide] = useState(initialData?.data?.side || initDef?.defaultSide || 'left');

            useEffect(() => {
                if (isOpen) {
                    if (initialData) {
                        setType(initialData.tool);
                        setHeight(initialData.data.height || '10');
                        setWidth(initialData.data.width || '10');
                        setLength(initialData.data.length || '25');
                        setLordosis(initialData.data.lordosis || '0');
                        setSide(initialData.data.side || CAGE_TYPES.find(t => t.id === initialData.tool)?.defaultSide || 'left');
                    } else {
                        const def = CAGE_TYPES.find(t => t.id === safeInitType);
                        setType(safeInitType);
                        if (def) {
                            setHeight(def.defaults.height);
                            setWidth(def.defaults.width);
                            setLength(def.defaults.length);
                            setLordosis(def.defaults.lordosis);
                            setSide(def.defaultSide);
                        }
                    }
                }
            }, [isOpen, initialData]);

            const handleTypeChange = (newType) => {
                setType(newType);
                const def = CAGE_TYPES.find(t => t.id === newType);
                if (def) {
                    setHeight(def.defaults.height);
                    setWidth(def.defaults.width);
                    setLength(def.defaults.length);
                    setLordosis(def.defaults.lordosis);
                    setSide(def.defaultSide);
                }
            };

            const selectedDef = CAGE_TYPES.find(t => t.id === type);
            const discLabel = levels ? getDiscLabel(levelId, levels) : levelId;

            const handleSubmit = () => { onConfirm({ type, height, width, length, lordosis, side }); onClose(); };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-[fadeIn_0.2s_ease-out]">
                    <div className="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden">
                        <div className="bg-sky-800 text-white px-4 py-3 flex justify-between items-center">
                            <h3 className="font-bold text-sm">{initialData ? 'Edit Cage' : 'Interbody Cage'} — {discLabel}</h3>
                            <button onClick={onClose} className="hover:text-sky-200"><IconX /></button>
                        </div>
                        <div className="p-5 space-y-4">
                            {/* Approach groups */}
                            {APPROACH_GROUPS.map(group => {
                                const permittedInGroup = group.types
                                    .map(id => CAGE_TYPES.find(t => t.id === id))
                                    .filter(ct => ct && (CAGE_PERMISSIBILITY[ct.id] || []).includes(levelId));
                                if (permittedInGroup.length === 0) return null;
                                return (
                                    <div key={group.label}>
                                        <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">{group.label} <span className="font-normal normal-case">— {group.desc}</span></div>
                                        <div className="flex gap-1.5">
                                            {permittedInGroup.map(ct => (
                                                <button key={ct.id} onClick={() => handleTypeChange(ct.id)}
                                                    className={`flex-1 py-2 px-2 rounded border text-xs font-bold transition-all ${
                                                        type === ct.id ? 'bg-sky-700 text-white border-sky-800 shadow' :
                                                        'bg-slate-50 text-slate-700 border-slate-200 hover:bg-sky-50 hover:border-sky-300'
                                                    }`}>
                                                    <div>{ct.label}</div>
                                                    <div className={`text-[9px] font-normal mt-0.5 ${type === ct.id ? 'text-sky-200' : 'text-slate-400'}`}>{ct.desc.split(' ').slice(0,2).join(' ')}</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}

                            {/* Side selector (for types with sideOptions) */}
                            {selectedDef?.sideOptions && (
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Side</label>
                                    <div className="flex gap-1">
                                        {selectedDef.sideOptions.map(s => (
                                            <button key={s} onClick={() => setSide(s)}
                                                className={`flex-1 py-1.5 rounded border text-xs font-bold transition-all ${
                                                    side === s ? 'bg-sky-700 text-white border-sky-800' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-sky-50'
                                                }`}>{s.charAt(0).toUpperCase() + s.slice(1)}</button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Dimensions */}
                            <div className="grid grid-cols-2 gap-3">
                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Height (mm)</label><input type="number" value={height} onChange={e => setHeight(e.target.value)} className="w-full p-1.5 border border-slate-300 rounded bg-slate-50 font-mono text-center focus:border-sky-500 outline-none"/></div>
                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Lordosis (°)</label><input type="number" value={lordosis} onChange={e => setLordosis(e.target.value)} className="w-full p-1.5 border border-slate-300 rounded bg-slate-50 font-mono text-center focus:border-sky-500 outline-none"/></div>
                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Length (A-P)</label><input type="number" value={length} onChange={e => setLength(e.target.value)} className="w-full p-1.5 border border-slate-300 rounded bg-slate-50 font-mono text-center focus:border-sky-500 outline-none"/></div>
                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Width (M-L)</label><input type="number" value={width} onChange={e => setWidth(e.target.value)} className="w-full p-1.5 border border-slate-300 rounded bg-slate-50 font-mono text-center focus:border-sky-500 outline-none"/></div>
                            </div>
                        </div>
                        <div className="bg-slate-50 px-4 py-3 flex justify-between border-t border-slate-100">{initialData ? <button onClick={onDelete} className="text-red-500 hover:bg-red-50 px-3 py-1 rounded text-sm font-bold flex gap-1 items-center"><IconTrash/> Remove</button> : <div></div>}<div className="flex gap-2"><button onClick={onClose} className="px-4 py-2 rounded text-slate-500 hover:bg-slate-200 text-sm font-bold">Cancel</button><button onClick={handleSubmit} className="px-6 py-2 rounded bg-sky-800 text-white hover:bg-sky-700 text-sm font-bold shadow-lg">Confirm</button></div></div>
                    </div>
                </div>
            );
        };

        const OsteotomyModal = ({ isOpen, onClose, onConfirm, onDelete, initialData, defaultType, defaultAngle }) => {
            if (!isOpen) return null;
            const [type, setType] = useState(defaultType || 'PSO');
            const [angle, setAngle] = useState(defaultAngle || '25');
            
            const OSTEOTOMY_TYPES = [
                { id: 'Facet', label: 'Facet Joint release', shortLabel: 'Facet', schwab: 'Schwab Grade 1', desc: 'Inferior facet resection; joint capsule removal.', defaultAngle: '5' },
                { id: 'Ponte', label: 'Ponte / Smith Petersen', shortLabel: 'Ponte', schwab: 'Schwab Grade 2', desc: 'Complete facetectomy; ligamentum flavum + lamina.', defaultAngle: '10' },
                { id: 'PSO', label: 'Standard PSO', shortLabel: 'PSO', schwab: 'Schwab Grade 3', desc: 'Pedicle subtraction; partial body wedge.', defaultAngle: '25' },
                { id: 'ExtPSO', label: 'Extended PSO', shortLabel: 'Ext PSO', schwab: 'Schwab Grade 4', desc: 'PSO + resection of adjacent disc.', defaultAngle: '35' },
                { id: 'VCR', label: 'VCR', shortLabel: 'VCR', schwab: 'Schwab Grade 5', desc: 'Complete vertebral column resection.', defaultAngle: '40' },
                { id: 'ML-VCR', label: 'Multi-level VCR', shortLabel: 'ML VCR', schwab: 'Schwab Grade 6', desc: 'Resection of multiple vertebrae and discs.', defaultAngle: '0' },
                { id: 'Corpectomy', label: 'Corpectomy (Anterior)', shortLabel: 'Corpectomy', schwab: 'Anterior', desc: 'Vertebral body removal.', defaultAngle: '0' }
            ];

            useEffect(() => { if (isOpen) { if (initialData && typeof initialData === 'object') { setType(initialData.type); setAngle(initialData.angle); } else { setType(defaultType || 'PSO'); setAngle(defaultAngle || '25'); } } }, [isOpen, initialData, defaultType, defaultAngle]);
            
            const selectedDef = OSTEOTOMY_TYPES.find(t => t.id === type) || OSTEOTOMY_TYPES[0];
            const handleTypeChange = (e) => { const newTypeID = e.target.value; setType(newTypeID); const newDef = OSTEOTOMY_TYPES.find(t => t.id === newTypeID); if (newDef) setAngle(newDef.defaultAngle); };
            const handleSubmit = () => { onConfirm({ type, angle, shortLabel: selectedDef.shortLabel }); onClose(); };
            const isEditing = !!initialData;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-[fadeIn_0.2s_ease-out]"><div className="bg-white rounded-lg shadow-2xl w-full max-w-sm overflow-hidden"><div className="bg-red-800 text-white px-4 py-3 flex justify-between items-center"><h3 className="font-bold text-sm">{isEditing ? 'Edit Osteotomy' : 'Plan Osteotomy'}</h3><button onClick={onClose} className="hover:text-red-200"><IconX /></button></div><div className="p-6 space-y-4"><div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Osteotomy Type</label><select value={type} onChange={handleTypeChange} className="w-full p-2 border border-slate-300 rounded bg-slate-50 text-sm font-bold text-slate-800 focus:border-red-500 outline-none">{OSTEOTOMY_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}</select></div><div className="bg-red-50 border border-red-100 rounded p-3 text-xs"><div className="font-bold text-red-800 uppercase tracking-wider mb-1">{selectedDef.schwab}</div><div className="text-red-600 mb-2">{selectedDef.desc}</div></div><div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Correction Angle (°)</label><div className="flex items-center gap-2"><input type="number" value={angle} onChange={(e) => setAngle(e.target.value)} className="w-24 p-2 border border-slate-300 rounded bg-slate-50 text-lg font-mono focus:border-red-500 outline-none text-center" /><span className="italic text-slate-400 text-sm">degrees</span></div></div></div><div className="bg-slate-50 px-4 py-3 flex justify-between border-t border-slate-100">{isEditing ? <button onClick={onDelete} className="text-red-500 hover:bg-red-50 px-3 py-1 rounded text-sm font-bold flex gap-1 items-center"><IconTrash/> Remove</button> : <div></div>}<div className="flex gap-2"><button onClick={onClose} className="px-4 py-2 rounded text-slate-500 hover:bg-slate-200 text-sm font-bold">Cancel</button><button onClick={handleSubmit} className="px-6 py-2 rounded bg-red-800 text-white hover:bg-red-700 text-sm font-bold shadow-lg">Confirm</button></div></div></div></div>
            );
        };

        const FORCE_TYPES = [
            { id: 'translate_left', label: 'Translate Left', icon: 'translate_left' },
            { id: 'translate_right', label: 'Translate Right', icon: 'translate_right' },
            { id: 'compression', label: 'Compression', icon: 'compression' },
            { id: 'distraction', label: 'Distraction', icon: 'distraction' },
            { id: 'derotate_cw', label: 'Derotate CW', icon: 'derotate_cw' },
            { id: 'derotate_ccw', label: 'Derotate CCW', icon: 'derotate_ccw' },
        ];

        const ScrewSystemCombo = ({ value, onChange, company, placeholder }) => {
            const [open, setOpen] = useState(false);
            const [filter, setFilter] = useState('');
            const ref = useRef(null);

            useEffect(() => {
                const handleClickOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const companySystems = company && SCREW_SYSTEMS[company] ? SCREW_SYSTEMS[company] : [];
            const otherSystems = Object.entries(SCREW_SYSTEMS).filter(([k]) => k !== company).flatMap(([k, v]) => v.map(s => ({ name: s, company: k })));
            const seen = new Set(companySystems);
            const uniqueOther = otherSystems.filter(s => { if (seen.has(s.name)) return false; seen.add(s.name); return true; });

            const q = filter.toLowerCase();
            const matchedCompany = companySystems.filter(s => s.toLowerCase().includes(q));
            const matchedOther = uniqueOther.filter(s => s.name.toLowerCase().includes(q) || s.company.toLowerCase().includes(q));

            return (
                <div ref={ref} className="relative">
                    <input type="text" className="editable-field w-full text-sm" value={value} placeholder={placeholder} onChange={e => { onChange(e.target.value); setFilter(e.target.value); setOpen(true); }} onFocus={() => setOpen(true)} />
                    {open && (matchedCompany.length > 0 || matchedOther.length > 0) && (
                        <div className="absolute z-50 left-0 right-0 top-full mt-0.5 bg-white border border-slate-300 rounded shadow-lg max-h-48 overflow-y-auto text-xs">
                            {matchedCompany.length > 0 && <div className="px-2 py-1 text-[9px] font-bold text-slate-400 uppercase bg-slate-50">{company}</div>}
                            {matchedCompany.map(s => <div key={s} className="px-2 py-1.5 cursor-pointer hover:bg-amber-50 font-semibold text-slate-800" onClick={() => { onChange(s); setFilter(''); setOpen(false); }}>{s}</div>)}
                            {matchedOther.length > 0 && <div className="px-2 py-1 text-[9px] font-bold text-slate-400 uppercase bg-slate-50 border-t border-slate-200">Other companies</div>}
                            {matchedOther.map(s => <div key={`${s.company}-${s.name}`} className="px-2 py-1.5 cursor-pointer hover:bg-slate-50 text-slate-600 flex justify-between" onClick={() => { onChange(s.name); setFilter(''); setOpen(false); }}><span>{s.name}</span><span className="text-slate-400 text-[9px]">{s.company}</span></div>)}
                        </div>
                    )}
                </div>
            );
        };

        const ForceModal = ({ isOpen, onClose, onConfirm }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-[fadeIn_0.2s_ease-out]">
                    <div className="bg-white rounded-lg shadow-2xl w-full max-w-xs overflow-hidden">
                        <div className="bg-emerald-800 text-white px-4 py-3 flex justify-between items-center">
                            <h3 className="font-bold text-sm">Select Force</h3>
                            <button onClick={onClose} className="hover:text-emerald-200"><IconX /></button>
                        </div>
                        <div className="p-4 grid grid-cols-2 gap-2">
                            {FORCE_TYPES.map(f => (
                                <button key={f.id} onClick={() => { onConfirm(f.id); onClose(); }}
                                    className="flex flex-col items-center gap-1 p-3 rounded border border-slate-200 bg-slate-50 hover:bg-emerald-50 hover:border-emerald-300 transition-all">
                                    <InstrumentIcon type={f.icon} className="w-8 h-8" color="#059669" />
                                    <span className="text-[10px] font-bold text-slate-700">{f.label}</span>
                                </button>
                            ))}
                        </div>
                        <div className="bg-slate-50 px-4 py-2 text-right border-t border-slate-100">
                            <button onClick={onClose} className="px-4 py-1.5 rounded text-slate-500 hover:bg-slate-200 text-sm font-bold">Cancel</button>
                        </div>
                    </div>
                </div>
            );
        };

        const CreditsFooter = () => (
            <div className="mt-auto pt-3 pb-4 border-t border-slate-200 shrink-0">
                <p className="text-[9px] text-slate-400 leading-tight text-center">
                    Spinal Instrumentation Planner
                </p>
                <p className="text-[8px] text-slate-300 leading-tight text-center mt-0.5">
                    Developed in Leeds, UK
                </p>
            </div>
        );

        // --- INVENTORY CATEGORIES ---
        const INVENTORY_CATEGORIES = [
            { key: 'screws', label: 'Screws', toolIds: ['monoaxial','polyaxial','uniplanar'] },
            { key: 'hooks', label: 'Hooks', toolIds: ['pedicle_hook','tp_hook','sl_hook','il_hook'] },
            { key: 'cages', label: 'Cages', toolIds: ['acdf','plif','tlif','xlif','olif','alif'] },
            { key: 'osteotomies', label: 'Osteotomies', toolIds: ['osteotomy','Corpectomy'] },
            { key: 'other', label: 'Other', toolIds: ['connector','unstable'] },
        ];

        const ImplantInventory = ({ placements, tools, title, visibleLevelIds, levels }) => {
            const grouped = useMemo(() => {
                const counts = {};
                placements.forEach(p => {
                    if (!visibleLevelIds.includes(p.levelId)) return;
                    const tool = tools.find(t => t.id === p.tool);
                    if (!tool || tool.type === 'force') return;
                    let key = tool.label;
                    if (p.data) {
                        if (typeof p.data === 'string' && tool.needsSize) { key = `${tool.label} (${p.data})`; }
                        else if (p.tool === 'osteotomy' && typeof p.data === 'object') { key = `${p.data.shortLabel} (${p.data.angle}°)`; }
                        else if (typeof p.data === 'object' && p.data.height) {
                            const discLbl = levels ? getDiscLabel(p.levelId, levels) : p.levelId;
                            const sideStr = p.data.side && p.data.side !== 'bilateral' && p.data.side !== 'midline' ? ` (${p.data.side.charAt(0).toUpperCase()})` : '';
                            key = `${tool.label} ${discLbl} ${p.data.height}H ${p.data.lordosis}°${sideStr}`;
                        }
                        else if (p.data !== 'Custom' && typeof p.data !== 'object') { key = `${tool.label} ${p.data}`; }
                    }
                    const catKey = INVENTORY_CATEGORIES.find(c => c.toolIds.includes(p.tool))?.key || 'other';
                    if (!counts[catKey]) counts[catKey] = {};
                    counts[catKey][key] = (counts[catKey][key] || 0) + 1;
                });
                return counts;
            }, [placements, tools, visibleLevelIds, levels]);

            const hasItems = Object.values(grouped).some(cat => Object.keys(cat).length > 0);
            if (!hasItems) return null;

            const totalItems = Object.values(grouped).reduce((sum, cat) => sum + Object.keys(cat).length, 0);
            const useColumns = totalItems > 6;

            return (
                <div className="mt-6 border-t border-slate-200 pt-3 shrink-0">
                    <h3 className="text-[10px] font-bold text-slate-900 uppercase tracking-widest mb-3 border-b border-slate-100 pb-1">{title} Inventory</h3>
                    <div style={useColumns ? { columns: 2, columnGap: '8px' } : undefined}>
                        {INVENTORY_CATEGORIES.map(cat => {
                            const items = grouped[cat.key];
                            if (!items || Object.keys(items).length === 0) return null;
                            return (
                                <div key={cat.key} className="mb-2" style={{ breakInside: 'avoid' }}>
                                    <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider border-b border-slate-200 pb-0.5 mb-0.5">{cat.label}</div>
                                    {Object.entries(items).sort().map(([name, count]) => (
                                        <div key={name} className="flex justify-between text-[10px] py-0.5 border-b border-slate-100">
                                            <span className="text-slate-700 font-medium">{name}</span>
                                            <span className="font-bold text-slate-900 ml-2">{count}</span>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ==========================================
        // SECTION 3: RENDERERS
        // ==========================================
        
        const REGIONS = {
            Oc: { height: 40, color: '#f8fafc' },
            C: { height: 28, color: '#f1f5f9' },
            T: { height: 36, color: '#e2e8f0' },
            L: { height: 46, color: '#cbd5e1' },
            S: { height: 52, color: '#94a3b8' },
            Pelvis: { height: 54, color: '#94a3b8' }
        };

        const ALL_LEVELS = [
            { id: 'Oc', type: 'Oc' },
            ...['C1','C2','C3','C4','C5','C6','C7'].map(id => ({ id, type: 'C' })),
            ...['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'].map(id => ({ id, type: 'T' })),
            ...['L1','L2','L3','L4','L5'].map(id => ({ id, type: 'L' })),
            { id: 'S1', type: 'S' },
            { id: 'Pelvis', type: 'Pelvis' },
        ];

        const DISC_HEIGHT = 12;

        const buildHeightMap = (lvls, hScale) => {
            let y = 0;
            const map = [];
            lvls.forEach(level => {
                const vertH = REGIONS[level.type].height * hScale;
                const hasDisc = level.type !== 'Pelvis' && level.id !== 'Oc' && level.id !== 'C1';
                const discH = hasDisc ? DISC_HEIGHT : 0;
                map.push({ levelId: level.id, startY: y, vertEnd: y + vertH, endY: y + vertH + discH });
                y += vertH + discH;
            });
            return { map, totalHeight: y };
        };

        const WHOLE_SPINE_MAP = buildHeightMap(ALL_LEVELS, 1);

        const levelToYNorm = (levelId) => {
            const entry = WHOLE_SPINE_MAP.map.find(e => e.levelId === levelId);
            if (!entry) return 500;
            const midY = (entry.startY + entry.vertEnd) / 2;
            return (midY / WHOLE_SPINE_MAP.totalHeight) * 1000;
        };

        const yNormToRenderedY = (yNorm, viewLevels, hScale) => {
            const anatomicalY = (yNorm / 1000) * WHOLE_SPINE_MAP.totalHeight;
            const allEntry = WHOLE_SPINE_MAP.map.find(e => anatomicalY >= e.startY && anatomicalY < e.endY);
            if (!allEntry) {
                // Check if it's at the very bottom
                const last = WHOLE_SPINE_MAP.map[WHOLE_SPINE_MAP.map.length - 1];
                if (anatomicalY >= last.startY && anatomicalY <= last.endY) {
                    const viewMap = buildHeightMap(viewLevels, hScale);
                    const viewEntry = viewMap.map.find(e => e.levelId === last.levelId);
                    if (!viewEntry) return null;
                    const fraction = (last.endY - last.startY) > 0 ? (anatomicalY - last.startY) / (last.endY - last.startY) : 0;
                    return viewEntry.startY + fraction * (viewEntry.endY - viewEntry.startY);
                }
                return null;
            }
            const viewMap = buildHeightMap(viewLevels, hScale);
            const viewEntry = viewMap.map.find(e => e.levelId === allEntry.levelId);
            if (!viewEntry) return null;
            const segLen = allEntry.endY - allEntry.startY;
            const fraction = segLen > 0 ? (anatomicalY - allEntry.startY) / segLen : 0;
            const viewSegLen = viewEntry.endY - viewEntry.startY;
            return viewEntry.startY + fraction * viewSegLen;
        };

        const renderedYToYNorm = (renderedY, viewLevels, hScale) => {
            const viewMap = buildHeightMap(viewLevels, hScale);
            let entry = viewMap.map.find(e => renderedY >= e.startY && renderedY < e.endY);
            if (!entry) {
                if (renderedY <= 0) entry = viewMap.map[0];
                else entry = viewMap.map[viewMap.map.length - 1];
            }
            const wholeEntry = WHOLE_SPINE_MAP.map.find(e => e.levelId === entry.levelId);
            if (!wholeEntry) return 500;
            const segLen = entry.endY - entry.startY;
            const fraction = segLen > 0 ? Math.max(0, Math.min(1, (renderedY - entry.startY) / segLen)) : 0;
            const wholeSegLen = wholeEntry.endY - wholeEntry.startY;
            const anatomicalY = wholeEntry.startY + fraction * wholeSegLen;
            return Math.max(0, Math.min(1000, (anatomicalY / WHOLE_SPINE_MAP.totalHeight) * 1000));
        };

        const CHART_CONTENT_HEIGHT = 920;
        const calculateAutoScale = (levels) => {
            let vertexHeight = 0;
            let discCount = 0;
            levels.forEach(level => {
                vertexHeight += REGIONS[level.type].height;
                if (level.type !== 'Pelvis' && level.id !== 'Oc' && level.id !== 'C1') {
                    discCount++;
                }
            });
            const fixedHeight = discCount * 12;
            const available = CHART_CONTENT_HEIGHT - fixedHeight;
            if (available <= 0 || vertexHeight <= 0) return 0.5;
            return Math.min(1.5, Math.max(0.5, available / vertexHeight));
        };
        
        const InstrumentIcon = ({ type, className = "w-5 h-5", color = "black" }) => {
            const strokeWidth = 2.5; const HookBase = ({ direction, label }) => (<svg viewBox="0 0 40 24" className="w-full h-full">{direction === 'up' ? <path d="M12 18V6m0 0l-4 4m4-4l4 4m-8 12h8" stroke={color} fill="none" strokeWidth={strokeWidth} /> : <path d="M12 6v12m0 0l-4-4m4 4l4-4m-8-12h8" stroke={color} fill="none" strokeWidth={strokeWidth} />}<text x="22" y="17" fontSize="14" fontWeight="bold" fontFamily="serif" fill={color}>{label}</text></svg>);
            switch (type) {
                // ... Implants ...
                case 'monoaxial': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /></svg>;
                case 'polyaxial': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /><path d="M7 7l10 10M17 7l-10 10" /></svg>;
                case 'uniplanar': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /><path d="M12 3v18" /></svg>;
                case 'pedicle_hook': return <div className={className}><HookBase direction="up" label="P" /></div>;
                case 'tp_hook': return <div className={className}><HookBase direction="down" label="TP" /></div>;
                case 'sl_hook': return <div className={className}><HookBase direction="down" label="SL" /></div>;
                case 'il_hook': return <div className={className}><HookBase direction="up" label="IL" /></div>;
                case 'connector': return <svg viewBox="0 0 40 10" className={className} stroke={color} fill="none" strokeWidth="2"><line x1="2" y1="5" x2="38" y2="5" strokeWidth="3" /><circle cx="2" cy="5" r="2" fill={color} /><circle cx="38" cy="5" r="2" fill={color} /></svg>;
                case 'unstable': return <svg viewBox="0 0 24 24" className={`${className} bg-white rounded border border-red-100 shadow-sm`} fill="none" stroke="#dc2626" strokeWidth="2.5"><path d="M2 12 L6 8 L10 16 L14 8 L18 16 L22 12" strokeLinecap="round" strokeLinejoin="round" /></svg>;
                case 'osteotomy': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><path d="M2 12h20M12 2l10 10-10 10L2 12z" fill="#dc2626" opacity="0.8" /></svg>;
                
                // --- Cages ---
                case 'cage': return <svg viewBox="0 0 24 24" className={className} fill="#0284c7" stroke="none"><rect x="4" y="8" width="16" height="8" rx="2" /></svg>;
                case 'acdf': return <svg viewBox="0 0 24 24" className={className} fill="#0284c7" stroke="none"><path d="M6 8h12v8H6z" /></svg>; 
                case 'plif': return <svg viewBox="0 0 24 24" className={className} fill="#0284c7" stroke="none"><rect x="3" y="8" width="7" height="8" /><rect x="14" y="8" width="7" height="8" /></svg>;
                case 'tlif': return <svg viewBox="0 0 24 24" className={className} fill="#0284c7" stroke="none"><path d="M4 12c0-4 8-8 8-8s8 4 8 8-8 8-8 8-8-4-8-8z" /></svg>;
                case 'xlif': return <svg viewBox="0 0 24 24" className={className} fill="#0284c7" stroke="none"><rect x="2" y="10" width="20" height="4" rx="1" /></svg>;
                case 'olif': return <svg viewBox="0 0 24 24" className={className} fill="#0284c7" stroke="none"><ellipse cx="12" cy="12" rx="10" ry="6" transform="rotate(-15 12 12)"/></svg>;
                case 'alif': return <svg viewBox="0 0 24 24" className={className} fill="#0284c7" stroke="none"><ellipse cx="12" cy="12" rx="10" ry="6" /></svg>;
                
                // --- Forces ---
                case 'translate_left': return <svg viewBox="0 0 24 24" className={className} fill="#059669" stroke="none"><path d="M20 12H4M4 12l8-8M4 12l8 8" stroke="#059669" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>; 
                case 'translate_right': return <svg viewBox="0 0 24 24" className={className} fill="#059669" stroke="none"><path d="M4 12h16M20 12l-8-8M20 12l-8 8" stroke="#059669" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>; 
                case 'derotate_cw': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /></svg>;
                case 'derotate_ccw': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></svg>;
                case 'compression': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M12 2v8m-4-4 4 4 4-4" /><path d="M12 22v-8m4 4-4-4-4 4" /></svg>; 
                case 'distraction': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M12 10V2m4 4-4-4-4 4" /><path d="M12 14v8m-4-4 4 4 4-4" /></svg>;
                default: return null;
            }
        };

        const SpineVertebra = ({ label, type, height, isCorpectomy }) => {
            const common = { fill: REGIONS[type].color, stroke: "#475569", strokeWidth: "1.5" };

            if (isCorpectomy) {
                return (
                    <svg viewBox={`0 0 160 ${height}`} className="w-full h-full block" overflow="visible">
                        <line x1="80" y1="0" x2="80" y2={height} stroke="#cbd5e1" strokeDasharray="3 3" />
                        <path d={`M40,5 L120,5 L120,${height-5} L40,${height-5} Z`} fill="none" stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4 4" />
                        <text x="80" y={height/2} dominantBaseline="middle" textAnchor="middle" fontSize="10" fill="#94a3b8" className="font-sans italic">Corpectomy</text>
                    </svg>
                );
            }

            return (
                <svg viewBox={`0 0 160 ${height}`} className="w-full h-full block" overflow="visible">
                    <line x1="80" y1="-2" x2="80" y2={height + 2} stroke="#cbd5e1" strokeDasharray="3 3" />
                    <g>
                        {type === 'Oc' && <path d="M30,2 Q80,45 130,2 L130,10 Q80,50 30,10 Z" transform={`scale(1, ${height/30})`} {...common} fill="#f1f5f9" />}

                        {type === 'C' && (
                            <g transform={`scale(1, ${height/24})`}>
                                <path d="M45,4 Q80,-2 115,4 L120,18 Q80,24 40,18 Z" {...common} /> {/* Body */}
                            </g>
                        )}

                        {type === 'T' && (
                            <g transform={`scale(1, ${height/32})`}>
                                <path d="M50,6 Q80,0 110,6 L115,26 Q80,32 45,26 Z" {...common} /> {/* Heart Shape Body */}
                                <circle cx="60" cy="12" r="3" fill="none" stroke="#94a3b8" strokeWidth="1"/> {/* L Pedicle */}
                                <circle cx="100" cy="12" r="3" fill="none" stroke="#94a3b8" strokeWidth="1"/> {/* R Pedicle */}
                            </g>
                        )}

                        {type === 'L' && (
                            <g transform={`scale(1, ${height/38})`}>
                                <path d="M45,5 Q80,-2 115,5 L120,30 Q80,38 40,30 Z" {...common} /> {/* Kidney Shape Body */}
                                <ellipse cx="60" cy="12" rx="4" ry="6" fill="none" stroke="#64748b" strokeWidth="1.5"/> {/* L Pedicle (Eye) */}
                                <ellipse cx="100" cy="12" rx="4" ry="6" fill="none" stroke="#64748b" strokeWidth="1.5"/> {/* R Pedicle (Eye) */}
                            </g>
                        )}

                        {type === 'S' && <path d="M40,5 Q80,-2 120,5 L100,45 Q80,55 60,45 Z" transform={`scale(1, ${height/48})`} {...common} />}
                        {type === 'Pelvis' && <path d="M20,5 Q80,25 140,5 L130,40 Q80,50 30,40 Z" transform={`scale(1, ${height/45})`} {...common} opacity="0.6" />}
                    </g>
                    <text x="80" y={height/2} dominantBaseline="middle" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#334155" className="font-sans pointer-events-none select-none">{label}</text>
                </svg>
            );
        };

        const CageVisualization = ({ cageType, heightScale }) => {
            const h = 12 * heightScale; // Approximate rendered height
            const color = "#0ea5e9";
            
            switch (cageType) {
                case 'plif': return <g><rect x="65" y="2" width="10" height={h} rx="1" fill={color} opacity="0.8" /><rect x="85" y="2" width="10" height={h} rx="1" fill={color} opacity="0.8" /></g>;
                case 'tlif': return <path d={`M60,2 Q80,${h+5} 100,2`} fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" />;
                case 'acdf': return <rect x="70" y="2" width="20" height={h} rx="2" fill={color} opacity="0.9" />;
                case 'xlif': return <rect x="50" y="2" width="60" height={h} rx="2" fill={color} opacity="0.6" />;
                case 'olif': return <rect x="55" y="2" width="50" height={h} rx="2" fill={color} opacity="0.7" transform="rotate(-5 80 8)" />;
                case 'alif': return <ellipse cx="80" cy={h/2 + 2} rx="25" ry={h/1.5} fill={color} opacity="0.7" />;
                default: return <rect x="70" y="2" width="20" height={h} fill={color} />;
            }
        };

        const LevelRow = ({ level, placements, onZoneClick, tools, onPlacementClick, readOnly, showForces, heightScale, onDiscClick, cages, levels }) => {
            const getItems = (z) => placements.filter(p => p.levelId === level.id && p.zone === z);
            const rowHeight = REGIONS[level.type].height * heightScale;
            const scaledWidth = 160 * heightScale;

            // Scaled instrument sizes
            const iconScale = Math.max(0.65, Math.min(1.3, heightScale));
            const screwPx = Math.round(24 * iconScale);
            const hookW = Math.round(30 * iconScale);
            const hookH = Math.round(20 * iconScale);
            const osteoPx = Math.round(32 * iconScale);
            const midPx = Math.round(36 * iconScale);
            const labelPx = Math.max(9, Math.min(16, Math.round(13 * iconScale)));
            const cageLabelPx = Math.max(9, Math.min(15, Math.round(12 * iconScale)));
            const cageMaxW = Math.round(120 / Math.max(1, iconScale));
            const osteoLabelPx = Math.max(10, Math.min(16, Math.round(14 * iconScale)));

            // Check if Corpectomy
            const isCorpectomy = placements.some(p => p.levelId === level.id && p.tool === 'Corpectomy');

            // Check for Cage below this level
            const cageBelow = cages.find(c => c.levelId === level.id);

            const GhostTarget = ({ type }) => {
                if (type === 'force') return <div className="flex items-center justify-center h-full w-full"><IconCardinal /></div>;
                return (<div style={{ width: screwPx, height: screwPx }} className="rounded-full border-2 border-slate-300 border-dashed flex items-center justify-center opacity-40 hover:opacity-100 hover:border-amber-400 hover:bg-amber-50 transition-all"><div className="w-1 h-1 bg-slate-300 rounded-full"></div></div>);
            };

            const ZoneContent = ({ zone, align }) => {
                const items = getItems(zone);
                const hasItems = items.length > 0;
                const justifyClass = align === 'right' ? 'justify-start pl-1' : (align === 'center' ? 'justify-center' : 'justify-end pr-1');
                const isForceZone = zone.startsWith('force');
                return (
                    <div className={`flex items-center gap-1 h-full ${justifyClass} relative`}>{!hasItems && !readOnly && (zone === 'left' || zone === 'right' || isForceZone) && <GhostTarget type={isForceZone ? 'force' : 'screw'} />}
                        {items.map(p => { const tool = tools.find(t => t.id === p.tool); const isHook = ['pedicle_hook','tp_hook','sl_hook','il_hook'].includes(p.tool); const isOsteo = p.tool === 'osteotomy'; let displayLabel = p.data; let angle = null; if (isOsteo && typeof p.data === 'object') { displayLabel = p.data.shortLabel || p.data.type; angle = p.data.angle; } const iW = isHook ? hookW : isOsteo ? osteoPx : screwPx; const iH = isHook ? hookH : isOsteo ? osteoPx : screwPx; return (<div key={p.id} className="relative group flex items-center gap-1">{align === 'left' && p.data && <span className="font-mono font-bold text-slate-700 bg-white/80 px-1 rounded whitespace-nowrap" style={{ fontSize: labelPx + 'px' }}>{isOsteo ? `${displayLabel} ${angle}°` : displayLabel}</span>}<div style={{ width: iW, height: iH }} className={`${!readOnly ? 'cursor-pointer hover:scale-110 transition-transform' : ''}`} onClick={(e) => { e.stopPropagation(); !readOnly && onPlacementClick(p); }}><InstrumentIcon type={tool?.icon} className="w-full h-full drop-shadow-sm text-slate-900" />{!readOnly && <div className="hidden group-hover:block absolute -top-1 -right-1 bg-amber-500 rounded-full w-2 h-2" />}</div>{align === 'right' && p.data && <span className="font-mono font-bold text-slate-700 bg-white/80 px-1 rounded whitespace-nowrap" style={{ fontSize: labelPx + 'px' }}>{isOsteo ? `${displayLabel} ${angle}°` : displayLabel}</span>}</div>); })}
                    </div>
                );
            };

            return (
                <div className="flex flex-col w-full relative">
                    <div className="flex w-full relative" style={{ height: `${rowHeight}px` }}>
                        <div className="absolute bottom-0 left-0 right-0 border-b border-slate-100 w-full z-0 pointer-events-none"></div>
                        {showForces && <div className={`w-10 border-r border-slate-100/50 bg-emerald-50/20 ${!readOnly ? 'hover:bg-emerald-50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'force_left')}><ZoneContent zone="force_left" align="center"/></div>}
                        <div className={`flex-1 overflow-hidden min-w-0 ${!readOnly ? 'hover:bg-blue-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'left')}><ZoneContent zone="left" align="left"/></div>

                        <div style={{ width: `${scaledWidth}px` }} className={`relative flex justify-center shrink-0 z-10 ${!readOnly ? 'hover:brightness-95 cursor-pointer' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'mid')}>
                            <SpineVertebra label={level.id} type={level.type} height={REGIONS[level.type].height} isCorpectomy={isCorpectomy} />
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">{getItems('mid').filter(p => p.tool !== 'connector').map(p => { const tool = tools.find(t => t.id === p.tool); let displayLabel = ''; let angle = ''; if (p.tool === 'osteotomy' && typeof p.data === 'object') { displayLabel = p.data.shortLabel || p.data.type; angle = p.data.angle; } return (<div key={p.id} className="pointer-events-auto relative group" onClick={(e) => { e.stopPropagation(); !readOnly && onPlacementClick(p); }}><div style={{ width: midPx, height: midPx }}><InstrumentIcon type={tool?.icon} className="w-full h-full drop-shadow-md text-slate-900" /></div>{p.tool === 'osteotomy' && p.data && (<div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white/90 border border-red-200 text-red-800 px-1 rounded shadow-sm whitespace-nowrap z-20" style={{ fontSize: osteoLabelPx + 'px' }}>{displayLabel} {angle}°</div>)}</div>); })}</div>
                        </div>

                        <div className={`flex-1 overflow-hidden min-w-0 ${!readOnly ? 'hover:bg-blue-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'right')}><ZoneContent zone="right" align="right"/></div>
                        {showForces && <div className={`w-10 border-l border-slate-100/50 bg-emerald-50/20 ${!readOnly ? 'hover:bg-emerald-50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'force_right')}><ZoneContent zone="force_right" align="center"/></div>}
                    </div>

                    {/* INTERBODY DISC ZONE (Except after Pelvis or C1) */}
                    {level.type !== 'Pelvis' && level.id !== 'Oc' && level.id !== 'C1' && (
                        <div className="w-full flex justify-center relative -mt-1 z-20">
                            <div style={{ width: `${scaledWidth}px` }} className={`h-4 flex items-center justify-center cursor-pointer transition-all ${!readOnly ? 'hover:bg-sky-100/50' : ''}`} onClick={() => !readOnly && onDiscClick(level.id)}>
                                {cageBelow ? (
                                    <div className="relative group w-full h-full flex justify-center">
                                        <svg viewBox="0 0 160 20" className="w-full h-full overflow-visible"><CageVisualization cageType={cageBelow.tool} heightScale={1} /></svg>
                                        <span className="absolute left-3/4 font-bold text-sky-700 bg-white/80 px-0.5 rounded -top-0.5 shadow-sm border border-sky-100 whitespace-nowrap z-20" style={{ fontSize: cageLabelPx + 'px' }}>{cageBelow.tool.toUpperCase()} {getDiscLabel(level.id, levels)} {cageBelow.data.height}H {cageBelow.data.lordosis}°{cageBelow.data.side && cageBelow.data.side !== 'bilateral' && cageBelow.data.side !== 'midline' ? ` (${cageBelow.data.side.charAt(0).toUpperCase()})` : ''}</span>
                                    </div>
                                ) : (
                                    !readOnly && <div className="h-2 w-full bg-slate-200/0 hover:bg-sky-200/50 rounded-full"></div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChartPaper = ({ title, placements, onZoneClick, onPlacementClick, tools, readOnly, levels, showForces, heightScale, cages, onDiscClick, connectors, onConnectorUpdate, onConnectorRemove, rodHeader }) => {
            const contentRef = useRef(null);
            const [draggingId, setDraggingId] = useState(null);
            const dragStartRef = useRef(null);
            const scaledWidth = 160 * heightScale;
            const iconScale = Math.max(0.65, Math.min(1.3, heightScale));
            const connW = Math.round(80 * iconScale);
            const connH = Math.round(24 * iconScale);

            useEffect(() => {
                if (!draggingId || readOnly) return;
                const handleMouseMove = (e) => {
                    if (!contentRef.current) return;
                    const rect = contentRef.current.getBoundingClientRect();
                    const localY = e.clientY - rect.top;
                    const newYNorm = renderedYToYNorm(localY, levels, heightScale);
                    onConnectorUpdate(draggingId, newYNorm);
                };
                const handleMouseUp = () => setDraggingId(null);
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
                return () => { document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); };
            }, [draggingId, levels, heightScale, readOnly, onConnectorUpdate]);

            return (
            <div className="flex-1 flex flex-col h-full border-l border-slate-200 bg-white relative"><div className="p-2 bg-slate-50 border-b border-slate-200 text-center font-bold text-sm text-slate-800 uppercase tracking-wider">{title}</div><div className="flex-1 relative flex flex-col pt-8 px-2 justify-center">
                <div className="flex w-full absolute top-1 left-0 right-0 px-2 text-[9px] font-bold uppercase tracking-tighter text-center pointer-events-none z-10">
                    {showForces && <div className="w-10 text-emerald-600/50">Force</div>}
                    <div className="flex-1 text-right pr-4 text-slate-400">Left</div>
                    <div style={{ width: `${scaledWidth}px` }}></div>
                    <div className="flex-1 text-left pl-4 text-slate-400">Right</div>
                    {showForces && <div className="w-10 text-emerald-600/50">Force</div>}
                </div>
                {rodHeader && <div className="flex w-full absolute top-4 left-0 right-0 px-2 z-10">
                    {showForces && <div className="w-10"></div>}
                    <div className="flex-1 flex justify-end pr-1">{React.Children.toArray(rodHeader.props.children)[0]}</div>
                    <div style={{ width: `${scaledWidth * 0.5}px` }}></div>
                    <div className="flex-1 flex justify-start pl-0">{React.Children.toArray(rodHeader.props.children)[1]}</div>
                    {showForces && <div className="w-10"></div>}
                </div>}
                <div ref={contentRef} className="flex flex-col w-full relative">
                    {levels.map(lvl => <LevelRow key={lvl.id} level={lvl} placements={placements} onZoneClick={onZoneClick} onPlacementClick={onPlacementClick} tools={tools} readOnly={readOnly} showForces={showForces} heightScale={heightScale} cages={cages} onDiscClick={onDiscClick} levels={levels} />)}
                    {/* Connector overlay */}
                    {connectors && connectors.length > 0 && (
                        <div className="absolute inset-0 pointer-events-none z-30">
                            {connectors.map(conn => {
                                const y = yNormToRenderedY(conn.yNorm, levels, heightScale);
                                if (y === null) return null;
                                return (
                                    <div key={conn.id}
                                        className={`absolute pointer-events-auto group ${!readOnly ? 'cursor-grab' : ''} ${draggingId === conn.id ? 'cursor-grabbing z-40' : ''}`}
                                        style={{ top: `${y - connH / 2}px`, left: '50%', transform: 'translateX(-50%)', width: `${scaledWidth}px`, height: `${connH}px` }}
                                        onMouseDown={(e) => { if (!readOnly) { e.preventDefault(); dragStartRef.current = { y: e.clientY }; setDraggingId(conn.id); } }}>
                                        <InstrumentIcon type="connector" className="w-full h-full drop-shadow-md text-slate-900" />
                                        {!readOnly && <button
                                            className="hidden group-hover:flex absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 items-center justify-center text-[8px] font-bold shadow hover:bg-red-600 z-50"
                                            onClick={(e) => { e.stopPropagation(); onConnectorRemove(conn.id); }}
                                            onMouseDown={(e) => e.stopPropagation()}>x</button>}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div></div></div>
            );
        };

        // ==========================================
        // SECTION 4: MAIN APP CONTROLLER
        // ==========================================
        const App = () => {
            const [selectedTool, setSelectedTool] = useState('connector');
            const [lastUsedScrewType, setLastUsedScrewType] = useState('polyaxial');
            const [activeChart, setActiveChart] = useState('planned'); 
            const [plannedPlacements, setPlannedPlacements] = useState([]);
            const [completedPlacements, setCompletedPlacements] = useState([]);
            const [plannedCages, setPlannedCages] = useState([]);
            const [completedCages, setCompletedCages] = useState([]);
            const [plannedConnectors, setPlannedConnectors] = useState([]);
            const [completedConnectors, setCompletedConnectors] = useState([]);
            const [colourScheme, setColourScheme] = useState('default');
            const [themeOpen, setThemeOpen] = useState(false);
            const [patientData, setPatientData] = useState({ name: '', id: '', surgeon: '', location: '', date: new Date().toISOString().split('T')[0], company: '', screwSystem: '', leftRod: '', rightRod: '' });
            const [viewMode, setViewMode] = useState('thoracolumbar'); 
            const [scale, setScale] = useState(1);
            const [incognitoMode, setIncognitoMode] = useState(false);
            const [isEditingDate, setIsEditingDate] = useState(false);
            const [hasLoaded, setHasLoaded] = useState(false);
            
            // MODALS
            const [screwModalOpen, setScrewModalOpen] = useState(false);
            const [osteoModalOpen, setOsteoModalOpen] = useState(false);
            const [cageModalOpen, setCageModalOpen] = useState(false);
            const [forceModalOpen, setForceModalOpen] = useState(false);
            const [helpModalOpen, setHelpModalOpen] = useState(false);
            const [changeLogOpen, setChangeLogOpen] = useState(false);
            
            // EDITING STATE
            const [pendingPlacement, setPendingPlacement] = useState(null);
            const [editingPlacementId, setEditingPlacementId] = useState(null);
            const [editingData, setEditingData] = useState(null);
            const [editingTool, setEditingTool] = useState(null);
            const [editingCageLevel, setEditingCageLevel] = useState(null); 

            const [defaultDiameter, setDefaultDiameter] = useState('6.5');
            const [defaultLength, setDefaultLength] = useState('45');
            const [defaultScrewMode, setDefaultScrewMode] = useState('standard');
            const [defaultCustomText, setDefaultCustomText] = useState('');
            const [defaultOsteoType, setDefaultOsteoType] = useState('PSO');
            const [defaultOsteoAngle, setDefaultOsteoAngle] = useState('25');
            const [pendingForceZone, setPendingForceZone] = useState(null);
            
            const exportRef = useRef(null);
            const containerWrapperRef = useRef(null);
            const fileInputRef = useRef(null);

            const levels = useMemo(() => {
                const lvls = [];
                // VIEW LOGIC
                if (viewMode === 'whole' || viewMode === 'cervical') { lvls.push({ id: 'Oc', type: 'Oc' }); ['C1','C2','C3','C4','C5','C6','C7'].forEach(l => lvls.push({ id:l, type:'C' })); }
                
                if (viewMode === 'cervical') { ['T1','T2','T3','T4'].forEach(l => lvls.push({ id:l, type:'T' })); }
                else if (viewMode === 't10_pelvis') { ['T10','T11','T12'].forEach(l => lvls.push({ id:l, type:'T' })); }
                else { ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'].forEach(l => lvls.push({ id:l, type:'T' })); }

                if (viewMode !== 'cervical') { ['L1','L2','L3','L4','L5'].forEach(l => lvls.push({ id:l, type:'L' })); lvls.push({ id:'S1', type:'S' }); lvls.push({ id:'Pelvis', type:'Pelvis' }); }
                return lvls;
            }, [viewMode]);

            const scheme = COLOUR_SCHEMES.find(s => s.id === colourScheme) || COLOUR_SCHEMES[0];

            // AUTO-LOAD
            useEffect(() => {
                const saved = localStorage.getItem('spine_planner_v2');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.plan) {
                            if (parsed.plan.implants) setPlannedPlacements(parsed.plan.implants);
                            if (parsed.plan.cages) setPlannedCages(parsed.plan.cages);
                            if (parsed.plan.connectors) setPlannedConnectors(parsed.plan.connectors);
                        }
                        if (parsed.construct) {
                            if (parsed.construct.implants) setCompletedPlacements(parsed.construct.implants);
                            if (parsed.construct.cages) setCompletedCages(parsed.construct.cages);
                            if (parsed.construct.connectors) setCompletedConnectors(parsed.construct.connectors);
                        }
                        if (parsed.patient) setPatientData(parsed.patient);
                        if (parsed.preferences?.viewMode) setViewMode(parsed.preferences.viewMode);
                        if (parsed.preferences?.colourScheme) setColourScheme(parsed.preferences.colourScheme);
                    } catch (e) { console.error("Data load error"); }
                }
                setHasLoaded(true);
            }, []);

            // AUTO-SAVE
            useEffect(() => {
                if (hasLoaded && !incognitoMode) {
                    localStorage.setItem('spine_planner_v2', JSON.stringify({
                        formatVersion: 2,
                        appVersion: CURRENT_VERSION,
                        patient: patientData,
                        preferences: { viewMode, colourScheme },
                        plan: { implants: plannedPlacements, cages: plannedCages, connectors: plannedConnectors },
                        construct: { implants: completedPlacements, cages: completedCages, connectors: completedConnectors },
                    }));
                }
                if (incognitoMode) localStorage.removeItem('spine_planner_v2');
            }, [plannedPlacements, completedPlacements, plannedCages, completedCages, plannedConnectors, completedConnectors, patientData, viewMode, colourScheme, hasLoaded, incognitoMode]);

            // RESIZE OBSERVER
            useEffect(() => {
                if (!containerWrapperRef.current) return;
                const observer = new ResizeObserver(() => {
                    if (containerWrapperRef.current && exportRef.current) {
                        const wrapperH = containerWrapperRef.current.clientHeight;
                        const wrapperW = containerWrapperRef.current.clientWidth;
                        setScale(Math.min((wrapperW - 40) / 1485, (wrapperH - 40) / 1050));
                    }
                });
                observer.observe(containerWrapperRef.current);
                return () => observer.disconnect();
            }, []);

            // ALL TOOL DEFINITIONS (for rendering and lookup)
            const allTools = [
                { id: 'monoaxial', label: 'Monoaxial', icon: 'monoaxial', needsSize: true, type: 'implant' },
                { id: 'polyaxial', label: 'Polyaxial', icon: 'polyaxial', needsSize: true, type: 'implant' },
                { id: 'uniplanar', label: 'Uniplanar', icon: 'uniplanar', needsSize: true, type: 'implant' },
                { id: 'pedicle_hook', label: 'Pedicle', icon: 'pedicle_hook', type: 'implant' },
                { id: 'tp_hook', label: 'TP Hook', icon: 'tp_hook', type: 'implant' },
                { id: 'sl_hook', label: 'Supra-laminar', icon: 'sl_hook', type: 'implant' },
                { id: 'il_hook', label: 'Infra-laminar', icon: 'il_hook', type: 'implant' },
                { id: 'connector', label: 'Crosslink', icon: 'connector', type: 'mid' },
                { id: 'unstable', label: 'Unstable', icon: 'unstable', type: 'mid' },
                { id: 'osteotomy', label: 'Osteotomy', icon: 'osteotomy', isOsteotomy: true, type: 'mid' },
                { id: 'Corpectomy', label: 'Corpectomy', icon: 'cage', isOsteotomy: true, type: 'mid' },
                { id: 'translate_left', label: 'Trans Left', icon: 'translate_left', type: 'force' },
                { id: 'translate_right', label: 'Trans Right', icon: 'translate_right', type: 'force' },
                { id: 'compression', label: 'Compress', icon: 'compression', type: 'force' },
                { id: 'distraction', label: 'Distract', icon: 'distraction', type: 'force' },
                { id: 'derotate_cw', label: 'Derotate', icon: 'derotate_cw', type: 'force' },
                { id: 'derotate_ccw', label: 'Derotate', icon: 'derotate_ccw', type: 'force' },
            ];

            // SIDEBAR PALETTE
            const tools = [
                { category: 'Midline', items: allTools.filter(t => ['connector','unstable','osteotomy','Corpectomy'].includes(t.id)) },
            ];

            // LOGIC HANDLERS — zone determines behaviour
            const handleZoneClick = (levelId, zone) => {
                const isForceZone = zone.startsWith('force');

                // Force zones → always open ForceModal
                if (isForceZone) {
                    setPendingForceZone({ levelId, zone });
                    setForceModalOpen(true);
                    return;
                }

                // Left/right zones → always open ScrewModal with last-used type
                if (zone === 'left' || zone === 'right') {
                    setPendingPlacement({ levelId, zone, tool: lastUsedScrewType });
                    setEditingPlacementId(null);
                    setEditingData(undefined);
                    setEditingTool(lastUsedScrewType);
                    setScrewModalOpen(true);
                    return;
                }

                // Mid zone → use currently selected palette tool
                const tool = allTools.find(t => t.id === selectedTool);
                if (!tool) return;
                if (tool.isOsteotomy) {
                    setPendingPlacement({ levelId, zone, tool: selectedTool });
                    setEditingPlacementId(null);
                    setEditingData(undefined);
                    setOsteoModalOpen(true);
                } else if (selectedTool === 'connector') {
                    addConnector(levelId);
                } else {
                    addPlacement(levelId, zone, selectedTool, null);
                }
            };

            const handleForceConfirm = (forceType) => {
                if (pendingForceZone) {
                    addPlacement(pendingForceZone.levelId, pendingForceZone.zone, forceType, null);
                    setPendingForceZone(null);
                }
            };

            const handleDiscClick = (levelId) => {
                if (levelId === 'Oc' || levelId === 'C1' || levelId === 'S1' || levelId === 'Pelvis') return alert("No disc space below this level.");

                // Check if ANY cage type is permitted here
                const anyPermitted = Object.values(CAGE_PERMISSIBILITY).some(arr => arr.includes(levelId));
                if (!anyPermitted) return alert(`No interbody cage types are available at ${getDiscLabel(levelId, levels)}.`);

                const currentCages = activeChart === 'planned' ? plannedCages : completedCages;
                const existing = currentCages.find(c => c.levelId === levelId);
                setEditingCageLevel(levelId);
                setEditingData(existing);
                setCageModalOpen(true);
            };

            const handleCageConfirm = (data) => {
                const lvl = editingCageLevel;
                const permitted = CAGE_PERMISSIBILITY[data.type] || [];
                if (!permitted.includes(lvl)) {
                    const cageType = CAGE_TYPES.find(t => t.id === data.type);
                    return alert(`${cageType?.label || data.type.toUpperCase()} is not permitted at ${getDiscLabel(lvl, levels)}.`);
                }

                const newCage = { levelId: editingCageLevel, tool: data.type, data: { height: data.height, width: data.width, length: data.length, lordosis: data.lordosis, side: data.side } };
                const setter = activeChart === 'planned' ? setPlannedCages : setCompletedCages;
                setter(prev => {
                    const filtered = prev.filter(c => c.levelId !== editingCageLevel);
                    return [...filtered, newCage];
                });
            };

            const handleDeleteCage = () => {
                const setter = activeChart === 'planned' ? setPlannedCages : setCompletedCages;
                setter(prev => prev.filter(c => c.levelId !== editingCageLevel));
                setCageModalOpen(false);
            };

            const handlePlacementClick = (p) => {
                const tool = allTools.find(t => t.id === p.tool);
                const isHookType = ['pedicle_hook','tp_hook','sl_hook','il_hook'].includes(p.tool);
                if (tool.needsSize || isHookType) { setEditingPlacementId(p.id); setEditingData(p.data); setEditingTool(p.tool); setScrewModalOpen(true); }
                else if (tool.isOsteotomy) { setEditingPlacementId(p.id); setEditingData(p.data); setOsteoModalOpen(true); }
                else { removePlacement(p.id); }
            };

            const handleScrewConfirm = (sizeData, components, finalType) => {
                if (components) { setDefaultDiameter(components.diameter); setDefaultLength(components.length); setDefaultScrewMode(components.mode); setDefaultCustomText(components.customText || ''); }
                setLastUsedScrewType(finalType);
                if (editingPlacementId) { updatePlacement(editingPlacementId, finalType, sizeData); setEditingPlacementId(null); }
                else if (pendingPlacement) { addPlacement(pendingPlacement.levelId, pendingPlacement.zone, finalType, sizeData); setPendingPlacement(null); }
            };

            const handleOsteoConfirm = (data) => {
                setDefaultOsteoType(data.type); setDefaultOsteoAngle(data.angle);
                if (editingPlacementId) { updatePlacement(editingPlacementId, 'osteotomy', data); setEditingPlacementId(null); } 
                else if (pendingPlacement) { addPlacement(pendingPlacement.levelId, pendingPlacement.zone, 'osteotomy', data); setPendingPlacement(null); }
            };
