            const addPlacement = (levelId, zone, tool, data) => { const newP = { id: Date.now(), levelId, zone, tool, data }; const setter = activeChart === 'planned' ? setPlannedPlacements : setCompletedPlacements; setter(prev => [...prev, newP]); };
            const updatePlacement = (id, tool, data) => { const updater = (prev) => prev.map(p => p.id === id ? { ...p, tool, data } : p); if (activeChart === 'planned') setPlannedPlacements(updater); else setCompletedPlacements(updater); };
            const removePlacement = (id) => { const filter = prev => prev.filter(p => p.id !== id); if (activeChart === 'planned') setPlannedPlacements(filter); else setCompletedPlacements(filter); setScrewModalOpen(false); setOsteoModalOpen(false); };

            // CONNECTOR HANDLERS
            const addConnector = (levelId) => {
                const yNorm = levelToYNorm(levelId);
                const newConn = { id: Date.now(), yNorm, tool: 'connector' };
                const setter = activeChart === 'planned' ? setPlannedConnectors : setCompletedConnectors;
                setter(prev => [...prev, newConn]);
            };
            const updateConnectorYNorm = (connId, yNorm) => {
                const updater = prev => prev.map(c => c.id === connId ? { ...c, yNorm } : c);
                if (activeChart === 'planned') setPlannedConnectors(updater); else setCompletedConnectors(updater);
            };
            const removeConnector = (connId) => {
                const filter = prev => prev.filter(c => c.id !== connId);
                if (activeChart === 'planned') setPlannedConnectors(filter); else setCompletedConnectors(filter);
            };

            // EXPORT
            const prepareExportCanvas = async () => { const element = exportRef.current; const cloneContainer = document.createElement('div'); cloneContainer.style.position = 'absolute'; cloneContainer.style.top = '0'; cloneContainer.style.left = '0'; cloneContainer.style.zIndex = '-9999'; document.body.appendChild(cloneContainer); const clone = element.cloneNode(true); clone.style.transform = 'none'; clone.style.margin = '0'; cloneContainer.appendChild(clone); const canvas = await html2canvas(clone, { scale: 2, useCORS: true, backgroundColor: '#ffffff', width: 1485, height: 1050, logging: false }); document.body.removeChild(cloneContainer); return canvas; };
            const runExportJPG = async () => { const canvas = await prepareExportCanvas(); const link = document.createElement('a'); link.download = `SpinePlan_${patientData.name || 'Patient'}.jpg`; link.href = canvas.toDataURL('image/jpeg', 0.9); link.click(); if (incognitoMode) localStorage.removeItem('spine_planner_v2'); };
            const runExportPDF = async () => { const canvas = await prepareExportCanvas(); const imgData = canvas.toDataURL('image/jpeg', 1.0); const { jsPDF } = window.jspdf; const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [1485, 1050] }); pdf.addImage(imgData, 'JPEG', 0, 0, 1485, 1050); pdf.save(`SpinePlan_${patientData.name || 'Patient'}.pdf`); if (incognitoMode) localStorage.removeItem('spine_planner_v2'); };
            const saveProjectJSON = () => {
                const data = {
                    formatVersion: 2,
                    appVersion: CURRENT_VERSION,
                    timestamp: new Date().toISOString(),
                    patient: patientData,
                    preferences: { viewMode, colourScheme },
                    plan: { implants: plannedPlacements, cages: plannedCages, connectors: plannedConnectors },
                    construct: { implants: completedPlacements, cages: completedCages, connectors: completedConnectors },
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `SpineProject_${patientData.name || 'Unnamed'}.json`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
                if (incognitoMode) localStorage.removeItem('spine_planner_v2');
            };
            const loadProjectJSON = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const json = JSON.parse(ev.target.result);
                        if (json.formatVersion === 2) {
                            if (json.patient) setPatientData(json.patient);
                            if (json.plan) {
                                if (json.plan.implants) setPlannedPlacements(json.plan.implants);
                                if (json.plan.cages) setPlannedCages(json.plan.cages);
                                if (json.plan.connectors) setPlannedConnectors(json.plan.connectors);
                            }
                            if (json.construct) {
                                if (json.construct.implants) setCompletedPlacements(json.construct.implants);
                                if (json.construct.cages) setCompletedCages(json.construct.cages);
                                if (json.construct.connectors) setCompletedConnectors(json.construct.connectors);
                            }
                            if (json.preferences?.viewMode) setViewMode(json.preferences.viewMode);
                            if (json.preferences?.colourScheme) setColourScheme(json.preferences.colourScheme);
                        }
                        alert("Project Loaded Successfully.");
                    } catch(err) { alert("Invalid File"); }
                };
                reader.readAsText(file); e.target.value = null;
            };

            const copyPlanToCompleted = () => {
                if (plannedPlacements.length === 0 && plannedConnectors.length === 0) return alert("No plan to copy.");
                if ((completedPlacements.length > 0 || completedConnectors.length > 0) && !confirm("Overwrite existing construct?")) return;
                setCompletedPlacements(plannedPlacements.map((p,i) => ({...p, id: Date.now()+i})));
                setCompletedCages(plannedCages.map((c) => ({...c})));
                setCompletedConnectors(plannedConnectors.map((c,i) => ({...c, id: Date.now()+1000+i})));
                setActiveChart('completed');
            };

            return (
                <div className="h-full flex flex-col overflow-hidden">
                    <ScrewModal isOpen={screwModalOpen} onClose={() => setScrewModalOpen(false)} onConfirm={handleScrewConfirm} onDelete={() => removePlacement(editingPlacementId)} initialData={editingData} initialTool={editingTool} defaultDiameter={defaultDiameter} defaultLength={defaultLength} defaultMode={defaultScrewMode} defaultCustomText={defaultCustomText} />
                    <OsteotomyModal isOpen={osteoModalOpen} onClose={() => setOsteoModalOpen(false)} onConfirm={handleOsteoConfirm} onDelete={() => removePlacement(editingPlacementId)} initialData={editingData} defaultType={defaultOsteoType} defaultAngle={defaultOsteoAngle} />
                    <CageModal isOpen={cageModalOpen} onClose={() => setCageModalOpen(false)} onConfirm={handleCageConfirm} onDelete={handleDeleteCage} initialData={editingData} levelId={editingCageLevel} levels={levels} />
                    <ForceModal isOpen={forceModalOpen} onClose={() => setForceModalOpen(false)} onConfirm={handleForceConfirm} />
                    <HelpModal isOpen={helpModalOpen} onClose={() => setHelpModalOpen(false)} />
                    <ChangeLogModal isOpen={changeLogOpen} onClose={() => setChangeLogOpen(false)} />

                    <div className="flex-1 overflow-hidden bg-slate-200 flex relative">
                        <aside className="w-64 text-white flex flex-col z-20 overflow-y-auto no-print shadow-xl" style={{ backgroundColor: scheme.sidebarBg, borderRight: `1px solid ${scheme.sidebarBorder}` }}>
                            {/* App Title */}
                            <div className="p-4" style={{ backgroundColor: scheme.sidebarTitleBg, borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                <h1 className="font-bold text-lg text-white leading-tight">Spinal Instrumentation Planner</h1>
                                <button onClick={() => setChangeLogOpen(true)} className="text-[10px] text-white/40 font-mono hover:text-white">{CURRENT_VERSION}</button>
                            </div>

                            {/* Region View */}
                            <div className="p-3" style={{ borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                <h3 className="text-[10px] uppercase font-bold text-white/40 mb-2 tracking-widest">Region View</h3>
                                <div className="grid grid-cols-2 gap-1">
                                    {['cervical','thoracolumbar','t10_pelvis','whole'].map(vm => {
                                        const labels = { cervical: 'Cervical (Occ-T4)', thoracolumbar: 'Thoracic (T1-Pelvis)', t10_pelvis: 'Lumbar (T10-Pelvis)', whole: 'Whole Spine' };
                                        const active = viewMode === vm;
                                        return <button key={vm} onClick={() => setViewMode(vm)} className={`py-2 px-1 text-[10px] rounded border font-bold transition-all ${active ? 'border-transparent' : 'text-white/70 hover:text-white'}`} style={active ? { backgroundColor: scheme.activeBg, color: scheme.activeText, borderColor: scheme.activeBorder } : { backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}>{labels[vm]}</button>;
                                    })}
                                </div>
                            </div>

                            {/* Theme */}
                            <div className="p-3" style={{ borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                <div className="relative">
                                    <button onClick={() => setThemeOpen(!themeOpen)} className="w-full flex items-center gap-2 text-xs text-white/70 hover:text-white py-1 rounded transition-colors">
                                        <div className="w-4 h-4 rounded-full border border-white/30 shrink-0" style={{ backgroundColor: scheme.swatch }}></div>
                                        <span className="font-bold text-[10px] uppercase tracking-widest text-white/40">Theme</span>
                                        <span className="text-white/30 ml-auto text-[10px]">{scheme.label}</span>
                                    </button>
                                    {themeOpen && (
                                        <div className="absolute left-0 right-0 top-full mt-1 rounded-lg shadow-xl border p-1.5 z-50" style={{ backgroundColor: scheme.sidebarTitleBg, borderColor: scheme.sidebarBorder }}>
                                            {COLOUR_SCHEMES.map(s => (
                                                <button key={s.id} onClick={() => { setColourScheme(s.id); setThemeOpen(false); }}
                                                    className={`w-full flex items-center gap-2 px-2 py-1.5 rounded text-xs transition-all ${colourScheme === s.id ? 'text-white font-bold' : 'text-white/60 hover:text-white'}`}
                                                    style={colourScheme === s.id ? { backgroundColor: s.activeBg, color: s.activeText } : undefined}>
                                                    <div className="w-4 h-4 rounded-full border border-white/20 shrink-0" style={{ backgroundColor: s.swatch }}></div>
                                                    {s.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Plan / Construct Toggle */}
                            <div className="p-3" style={{ borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                <div className="flex rounded p-1 border" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}>
                                    <button onClick={() => setActiveChart('planned')} className={`flex-1 px-3 py-1.5 rounded transition-all text-xs ${activeChart==='planned'?'font-bold':'text-white/50 hover:text-white'}`} style={activeChart==='planned' ? { backgroundColor: scheme.activeBg, color: scheme.activeText } : undefined}>Plan</button>
                                    <button onClick={() => setActiveChart('completed')} className={`flex-1 px-3 py-1.5 rounded transition-all text-xs ${activeChart==='completed'?'font-bold':'text-white/50 hover:text-white'}`} style={activeChart==='completed' ? { backgroundColor: scheme.activeBg, color: scheme.activeText } : undefined}>Construct</button>
                                </div>
                            </div>

                            {/* Tool Palette */}
                            <div className="p-3 space-y-4" style={{ borderBottom: `1px solid ${scheme.sidebarBorder}` }}>
                                {tools.map((g,i) => (
                                    <div key={i}>
                                        <h3 className="text-[10px] uppercase font-bold text-white/40 mb-2 tracking-widest">{g.category}</h3>
                                        <div className="grid grid-cols-2 gap-1">
                                            {g.items.map(t => {
                                                const active = selectedTool === t.id;
                                                return <button key={t.id} onClick={() => setSelectedTool(t.id)} className={`p-1.5 h-14 rounded border flex flex-col items-center justify-center gap-0.5 transition-all text-xs ${active ? 'font-bold' : 'text-white/80 hover:text-white'}`} style={active ? { backgroundColor: scheme.activeBg, color: scheme.activeText, borderColor: scheme.activeBorder } : { backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}>
                                                    <InstrumentIcon type={t.icon} className="w-4 h-4 mb-0.5" color={active ? scheme.activeText : 'white'} />
                                                    <span className="text-center text-[9px] leading-tight">{t.label}</span>
                                                </button>;
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Actions */}
                            <div className="p-3 space-y-2">
                                <h3 className="text-[10px] uppercase font-bold text-white/40 mb-2 tracking-widest">Actions</h3>
                                <button onClick={copyPlanToCompleted} className="w-full flex items-center justify-center gap-2 text-white px-3 py-2 rounded text-xs font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconCopy /> Copy Plan to Construct</button>
                                <div className="pt-2 mt-2" style={{ borderTop: `1px solid ${scheme.sidebarBorder}` }}>
                                    <input type="file" ref={fileInputRef} onChange={loadProjectJSON} className="hidden" accept=".json" />
                                    <div className="grid grid-cols-2 gap-1">
                                        <button onClick={() => fileInputRef.current.click()} className="flex items-center justify-center gap-1 text-white/70 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconUpload /> Load</button>
                                        <button onClick={saveProjectJSON} className="flex items-center justify-center gap-1 text-white/70 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconSave /> Save</button>
                                        <button onClick={runExportJPG} className="flex items-center justify-center gap-1 text-white/70 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconImage /> JPG</button>
                                        <button onClick={runExportPDF} className="flex items-center justify-center gap-1 text-white/70 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border transition-colors hover:brightness-125" style={{ backgroundColor: 'rgba(255,255,255,0.08)', borderColor: 'rgba(255,255,255,0.12)' }}><IconPDF /> PDF</button>
                                    </div>
                                </div>
                                <div className="pt-2 mt-2" style={{ borderTop: `1px solid ${scheme.sidebarBorder}` }}>
                                    <div className={`flex items-center gap-2 px-2 py-2 rounded border cursor-pointer transition-colors ${incognitoMode ? 'bg-red-900/30 border-red-500/50' : 'bg-transparent border-transparent hover:bg-white/5'}`} onClick={() => setIncognitoMode(!incognitoMode)}>
                                        <div className="relative inline-block w-10 h-5 align-middle select-none shrink-0"><input type="checkbox" className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300" style={{ top: 0, left: 0 }} checked={incognitoMode} onChange={(e) => setIncognitoMode(e.target.checked)}/><label className={`toggle-label block overflow-hidden h-5 rounded-full cursor-pointer border ${incognitoMode ? 'bg-red-600 border-red-600' : 'bg-slate-600 border-slate-600'}`}></label></div>
                                        <span className={`text-[10px] font-bold uppercase tracking-wider ${incognitoMode ? 'text-red-400' : 'text-white/40'}`}>Session Mode</span>
                                    </div>
                                </div>
                                <div className="pt-2 mt-2 flex gap-1" style={{ borderTop: `1px solid ${scheme.sidebarBorder}` }}>
                                    <button onClick={() => setHelpModalOpen(true)} className="flex-1 flex items-center justify-center gap-1 text-white/50 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold hover:bg-white/10"><IconHelp /> Help</button>
                                    <button onClick={() => { if(confirm("Start New Patient? This will clear the current plan.")) { setPlannedPlacements([]); setCompletedPlacements([]); setPlannedCages([]); setCompletedCages([]); setPlannedConnectors([]); setCompletedConnectors([]); setPatientData({ name: '', id: '', surgeon: '', location: '', date: new Date().toISOString().split('T')[0], company: '', screwSystem: '', leftRod: '', rightRod: '' }); setActiveChart('planned'); } }} className="flex-1 flex items-center justify-center gap-1 text-red-400 hover:text-red-200 px-2 py-1.5 rounded text-[10px] font-bold hover:bg-white/10"><IconTrash /> New Patient</button>
                                </div>
                            </div>

                            <CreditsFooter />
                        </aside>

                        <div ref={containerWrapperRef} id="print-wrapper" className="flex-1 flex items-center justify-center p-8 bg-slate-300 overflow-hidden relative">
                            <div style={{ transform: `scale(${scale})` }}>
                                <div id="export-container" ref={exportRef}>
                                    <div className="w-[340px] bg-white border-r border-slate-300 flex flex-col p-8">
                                        <h2 className="font-bold text-2xl text-slate-900 mb-4 border-b-4 border-slate-900 pb-2">Spinal Instrumentation</h2>
                                        <div className="flex-1 flex flex-col overflow-y-auto min-h-0">
                                            <div className="space-y-1.5 text-sm shrink-0">
                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-0.5">Patient Name</label><div className="editable-field w-full text-base font-semibold" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, name: e.target.innerText})} placeholder="Click to enter...">{patientData.name}</div></div>
                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-0.5">Patient ID</label><div className="editable-field w-full text-base font-mono" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, id: e.target.innerText})} placeholder="Click to enter...">{patientData.id}</div></div>
                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-0.5">Surgeon</label><div className="editable-field w-full text-base" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, surgeon: e.target.innerText})} placeholder="Click to enter...">{patientData.surgeon}</div></div>
                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-0.5">Date</label><div className="editable-field w-full text-base cursor-pointer" onClick={() => setIsEditingDate(true)}>{isEditingDate ? <input type="date" className="w-full text-sm border-b border-slate-800 bg-transparent outline-none py-0" value={patientData.date} autoFocus onBlur={()=>setIsEditingDate(false)} onChange={e=>setPatientData({...patientData, date:e.target.value})} /> : formatDate(patientData.date)}</div></div>
                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-0.5">Company</label><select className="editable-field w-full text-sm bg-white cursor-pointer" value={patientData.company} onChange={e => { const v = e.target.value; setPatientData({...patientData, company: v}); if (AUTO_THEME_FROM_COMPANY && COMPANY_THEME_MAP[v]) { setColourScheme(COMPANY_THEME_MAP[v]); } }}><option value="">Select company...</option>{IMPLANT_COMPANIES.map(c => <option key={c} value={c}>{c}</option>)}<option value="__other">Other</option></select>{patientData.company === '__other' && <div className="editable-field w-full text-sm mt-0.5" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, company: e.target.innerText})} placeholder="Enter company name..."></div>}</div>
                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-0.5">Screw System</label><ScrewSystemCombo value={patientData.screwSystem} onChange={v => setPatientData({...patientData, screwSystem: v})} company={patientData.company} placeholder="e.g. Expedium, Solera, Xia" /></div>
                                            </div>
                                            <ImplantInventory placements={[...(activeChart === 'planned' ? plannedPlacements : completedPlacements), ...(activeChart === 'planned' ? plannedCages : completedCages).map(c => ({...c, tool: c.tool})), ...(activeChart === 'planned' ? plannedConnectors : completedConnectors).map(c => ({...c, levelId: levels[0]?.id || 'T1', zone: 'mid'}))]} tools={[...allTools, {id: 'tlif', label: 'TLIF Cage'}, {id: 'plif', label: 'PLIF Cage'}, {id: 'acdf', label: 'ACDF Cage'}, {id: 'xlif', label: 'XLIF/LLIF Cage'}, {id: 'olif', label: 'OLIF Cage'}, {id: 'alif', label: 'ALIF Cage'}]} title={activeChart === 'planned' ? 'Plan' : 'Construct'} visibleLevelIds={levels.map(l => l.id)} levels={levels} />
                                        </div>
                                        <CreditsFooter />
                                    </div>
                                    <div className="flex-[4] flex flex-col h-full"><ChartPaper title="Plan" placements={plannedPlacements} onZoneClick={handleZoneClick} onPlacementClick={handlePlacementClick} tools={allTools} readOnly={activeChart !== 'planned'} levels={levels} showForces={true} heightScale={calculateAutoScale(levels)} cages={plannedCages} onDiscClick={handleDiscClick} connectors={plannedConnectors} onConnectorUpdate={updateConnectorYNorm} onConnectorRemove={removeConnector} /></div>
                                    <div className="flex-[3] flex flex-col h-full"><ChartPaper title="Final Surgical Construct" placements={completedPlacements} onZoneClick={handleZoneClick} onPlacementClick={handlePlacementClick} tools={allTools} readOnly={activeChart !== 'completed'} levels={levels} showForces={false} heightScale={calculateAutoScale(levels)} cages={completedCages} onDiscClick={handleDiscClick} connectors={completedConnectors} onConnectorUpdate={updateConnectorYNorm} onConnectorRemove={removeConnector} rodHeader={<React.Fragment><div className="flex items-center justify-end gap-1"><span className="text-[8px] font-bold text-slate-400 uppercase shrink-0">Rod:</span><div className="editable-field text-[9px] py-0.5 px-1 text-right" style={{ minWidth: '60px' }} contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, leftRod: e.target.innerText})} placeholder="e.g. 5.5mm CoCr Rod">{patientData.leftRod}</div></div><div className="flex items-center justify-start gap-1"><span className="text-[8px] font-bold text-slate-400 uppercase shrink-0">Rod:</span><div className="editable-field text-[9px] py-0.5 px-1 text-left" style={{ minWidth: '60px' }} contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, rightRod: e.target.innerText})} placeholder="e.g. 5.5mm TiAlV Rail">{patientData.rightRod}</div></div></React.Fragment>} /></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
