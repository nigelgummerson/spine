<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinal Surgical Planner V22 - Leeds Teaching Hospitals</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Serif:wght@700&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        body { font-family: 'Noto Sans', sans-serif; overflow: hidden; background-color: #f1f5f9; }
        .serif { font-family: 'Noto Serif', serif; }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        /* EXPORT CONTAINER */
        /* Fixed Aspect Ratio A4 Landscape: 1485px x 1050px (High Res) */
        #export-container {
            width: 1485px; 
            height: 1050px; 
            background: white;
            margin: 0 auto;
            display: flex;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            flex-shrink: 0;
            transform-origin: top center; 
        }

        /* EDITABLE FIELDS */
        .editable-field {
            border-bottom: 1px dashed #cbd5e1;
            min-width: 100px;
            display: inline-block;
            color: #334155;
            padding: 4px 0;
            outline: none;
            cursor: text;
            line-height: 1.2;
        }
        .editable-field:focus {
            border-bottom: 1px solid #0f172a;
            background-color: #f8fafc;
        }
        .editable-field:empty:before {
            content: attr(placeholder);
            color: #94a3b8;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Incognito Toggle Animation */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #ef4444;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #ef4444;
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useLayoutEffect, useMemo } = React;

        // ==========================================
        // SECTION 1: ICONS
        // ==========================================
        const IconTrash = () => (<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>);
        const IconDownload = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
        const IconCopy = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>);
        const IconUpload = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>);
        const IconSave = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>);
        const IconShield = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>);
        const IconCC = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M10.8 9.5a2.5 2.5 0 0 0-1.3-.8"/><path d="M9.5 9.5c-.8.5-1.5 1.5-1.5 2.5s.7 2 1.5 2.5"/><path d="M14.2 9.5a2.5 2.5 0 0 0-1.3-.8"/><path d="M12.9 9.5c-.8.5-1.5 1.5-1.5 2.5s.7 2 1.5 2.5"/></svg>);

        // ==========================================
        // SECTION 2: UI COMPONENTS
        // ==========================================
        
        // Renders the Leeds Trust Logo with the "Clinic Location:" label above it
        const LeedsTrustLogo = () => (
            <div className="flex flex-col items-center justify-center mt-12 opacity-90">
                {/* CLINIC LOCATION LABEL */}
                <span className="text-xs font-bold text-slate-500 uppercase mb-2">Clinic Location:</span>
                
                {/* LOGO */}
                <div className="flex flex-col text-center">
                    <span className="font-sans font-bold text-slate-800 text-lg leading-none tracking-tight">Leeds Teaching Hospitals</span>
                    <span className="font-sans text-slate-500 text-sm leading-none mt-1">NHS Trust</span>
                </div>
            </div>
        );

        // Renders the Credits and License Footer
        const CreditsFooter = () => (
            <div className="mt-auto pt-6 border-t border-slate-200">
                <div className="flex flex-col gap-2">
                    <p className="text-[10px] text-slate-500 leading-tight">
                        Developed by:<br/>
                        <span className="font-bold text-slate-700">Nigel Gummerson FRCS (Tr & Orth)</span><br/>
                        and <span className="font-bold text-slate-700">Google Gemini</span>,<br/>
                        December 2025
                    </p>
                    <div className="flex items-start gap-1 text-[9px] text-slate-400 leading-tight">
                        <div className="mt-0.5"><IconCC /></div>
                        <span>
                            Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" className="underline hover:text-slate-600">CC BY-NC-SA 4.0</a>.<br/>
                            Free for non-commercial clinical & educational use.
                        </span>
                    </div>
                </div>
            </div>
        );

        // ==========================================
        // SECTION 3: UTILITIES & CONFIG
        // ==========================================
        
        const formatDate = (isoString) => {
            if (!isoString) return '';
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return isoString;
            const day = String(date.getDate()).padStart(2, '0');
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const month = monthNames[date.getMonth()];
            const year = date.getFullYear();
            return `${day}-${month}-${year}`;
        };

        const REGIONS = {
            C: { height: 28, color: '#f1f5f9' }, 
            T: { height: 36, color: '#e2e8f0' }, 
            L: { height: 46, color: '#cbd5e1' }, 
            S: { height: 52, color: '#94a3b8' }, 
            Pelvis: { height: 54, color: '#94a3b8' } 
        };

        // ==========================================
        // SECTION 4: INSTRUMENT VISUALIZATION
        // ==========================================
        const InstrumentIcon = ({ type, className = "w-5 h-5", color = "black" }) => {
            const strokeWidth = 2.5;
            
            const HookBase = ({ direction, label }) => (
                <svg viewBox="0 0 40 24" className="w-full h-full">
                    {direction === 'up' ? (
                        <path d="M12 18V6m0 0l-4 4m4-4l4 4m-8 12h8" stroke={color} fill="none" strokeWidth={strokeWidth} />
                    ) : (
                        <path d="M12 6v12m0 0l-4-4m4 4l4-4m-8-12h8" stroke={color} fill="none" strokeWidth={strokeWidth} />
                    )}
                    <text x="22" y="17" fontSize="14" fontWeight="bold" fontFamily="serif" fill={color}>{label}</text>
                </svg>
            );

            switch (type) {
                case 'monoaxial': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /></svg>;
                case 'polyaxial': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /><path d="M7 7l10 10M17 7l-10 10" /></svg>;
                case 'uniplanar': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /><path d="M12 3v18" /></svg>;
                
                case 'pedicle_hook': return <div className={className}><HookBase direction="up" label="P" /></div>;
                case 'tp_hook': return <div className={className}><HookBase direction="down" label="TP" /></div>;
                case 'sl_hook': return <div className={className}><HookBase direction="down" label="SL" /></div>;
                case 'il_hook': return <div className={className}><HookBase direction="up" label="IL" /></div>;

                case 'connector': return (
                     <svg viewBox="0 0 40 10" className={className} stroke={color} fill="none" strokeWidth="2">
                        <line x1="2" y1="5" x2="38" y2="5" strokeWidth="3" />
                        <circle cx="2" cy="5" r="2" fill={color} />
                        <circle cx="38" cy="5" r="2" fill={color} />
                     </svg>
                );

                case 'unstable': return (
                    <svg viewBox="0 0 24 24" className={`${className} bg-white rounded border border-red-100 shadow-sm`} fill="none" stroke="#dc2626" strokeWidth="2.5">
                        <path d="M2 12 L6 8 L10 16 L14 8 L18 16 L22 12" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                );
                case 'osteotomy': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><path d="M2 12h20M12 2l10 10-10 10L2 12z" fill="#dc2626" opacity="0.8" /></svg>;
                
                case 'force_right': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
                case 'force_left': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M19 12H5M11 19l-7-7 7-7"/></svg>;
                case 'force_cranial': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M12 19V5M5 11l7-7 7 7"/></svg>;
                case 'force_caudal': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M12 5v14M19 13l-7 7-7-7"/></svg>;
                
                case 'compression': return (
                    <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3">
                        <path d="M2 12h9m-3-3l3 3-3 3" /> 
                        <path d="M22 12h-9m3-3l-3 3 3 3" />
                    </svg>
                );
                case 'distraction': return (
                    <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3">
                        <path d="M11 12H2m3-3l-3 3 3 3" />
                        <path d="M13 12h9m-3-3l3 3-3 3" />
                    </svg>
                );

                default: return null;
            }
        };

        // ==========================================
        // SECTION 5: CHART COMPONENTS
        // ==========================================
        const SpineVertebra = ({ label, type, height }) => {
            const renderBody = () => {
                const common = { fill: REGIONS[type].color, stroke: "#475569", strokeWidth: "1.5" };
                switch (type) {
                    case 'C': return <path d="M65,6 Q80,2 95,6 L95,22 Q80,26 65,22 Z" transform={`translate(0, 0) scale(1, ${height/24})`} {...common} />;
                    case 'T': 
                        return (
                            <g>
                                <path d="M60,10 Q80,4 100,10 L105,27 Q80,33 55,27 Z" transform={`scale(1, ${height/32})`} {...common} />
                                <path d="M55,13 L45,11" stroke="#64748b" strokeWidth="2" />
                                <path d="M105,13 L115,11" stroke="#64748b" strokeWidth="2" />
                            </g>
                        );
                    case 'L': 
                        return (
                            <g>
                                <path d="M55,8 Q80,2 105,8 L110,33 Q80,38 50,33 Z" transform={`scale(1, ${height/38})`} {...common} />
                                <path d="M50,16 L35,20" stroke="#64748b" strokeWidth="3" />
                                <path d="M110,16 L125,20" stroke="#64748b" strokeWidth="3" />
                            </g>
                        );
                    case 'S': return <path d="M40,8 Q80,2 120,8 L100,43 Q80,53 60,43 Z" transform={`scale(1, ${height/48})`} {...common} />;
                    case 'Pelvis': return <path d="M20,5 Q80,20 140,5 L130,40 Q80,50 30,40 Z" transform={`scale(1, ${height/45})`} {...common} opacity="0.6" />;
                    default: return null;
                }
            };

            const centerY = height / 2;

            return (
                <svg viewBox={`0 0 160 ${height}`} className="w-[160px] block" style={{height: `${height}px`}} overflow="visible">
                    <line x1="80" y1="-2" x2="80" y2={height + 2} stroke="#cbd5e1" strokeDasharray="3 3" />
                    <g>{renderBody()}</g>
                    <text x="80" y={centerY} dominantBaseline="middle" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#334155" className="font-sans pointer-events-none select-none">
                        {label}
                    </text>
                </svg>
            );
        };

        const LevelRow = ({ level, placements, onZoneClick, tools, onRemove, readOnly, showForces }) => {
            const forceLeftItems = showForces ? placements.filter(p => p.levelId === level.id && p.zone === 'force_left') : [];
            const leftItems = placements.filter(p => p.levelId === level.id && p.zone === 'left');
            const midItems = placements.filter(p => p.levelId === level.id && p.zone === 'mid');
            const rightItems = placements.filter(p => p.levelId === level.id && p.zone === 'right');
            const forceRightItems = showForces ? placements.filter(p => p.levelId === level.id && p.zone === 'force_right') : [];

            const ZoneContent = ({ items, align }) => (
                <div className={`flex items-center gap-1 h-full ${align === 'right' ? 'justify-start pl-1' : (align === 'center' ? 'justify-center' : 'justify-end pr-1')} relative`}>
                    {items.map(p => {
                        const tool = tools.find(t => t.id === p.tool);
                        const isOsteotomy = p.tool === 'osteotomy';
                        
                        return (
                            <div key={p.id} className="relative group flex items-center gap-1">
                                {align === 'left' && p.data && (
                                    <span className="text-[18px] font-mono font-bold text-slate-700 bg-white/80 px-1 rounded whitespace-nowrap">
                                        {isOsteotomy ? `${p.data.type} ${p.data.angle}°` : p.data}
                                    </span>
                                )}
                                <div 
                                    className={`${isOsteotomy ? 'w-8 h-8' : 'w-6 h-6'} ${!readOnly ? 'cursor-pointer hover:scale-110 transition-transform' : ''}`}
                                    onClick={(e) => { e.stopPropagation(); !readOnly && onRemove(p.id); }}
                                >
                                    <InstrumentIcon type={tool?.icon} className="w-full h-full drop-shadow-sm text-slate-900" />
                                    {!readOnly && <div className="hidden group-hover:block absolute -top-1 -right-1 bg-red-500 rounded-full w-2 h-2" />}
                                </div>
                                {align === 'right' && p.data && (
                                    <span className="text-[18px] font-mono font-bold text-slate-700 bg-white/80 px-1 rounded whitespace-nowrap">
                                        {isOsteotomy ? `${p.data.type} ${p.data.angle}°` : p.data}
                                    </span>
                                )}
                            </div>
                        );
                    })}
                </div>
            );

            const MidOverlay = ({ items }) => (
                <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                    {items.map(p => {
                        const tool = tools.find(t => t.id === p.tool);
                        const isOsteotomy = p.tool === 'osteotomy';
                        const isCrosslink = p.tool === 'connector';
                        const isUnstable = p.tool === 'unstable';
                        
                        return (
                            <div key={p.id} className="pointer-events-auto" onClick={(e) => { e.stopPropagation(); !readOnly && onRemove(p.id); }}>
                                <div className="relative group">
                                    <InstrumentIcon 
                                        type={tool?.icon} 
                                        className={`${isOsteotomy ? 'w-10 h-10' : (isCrosslink ? 'w-24 h-6' : (isUnstable ? 'w-8 h-8' : 'w-6 h-6'))} drop-shadow-md text-slate-900`} 
                                    />
                                    {isOsteotomy && p.data && (
                                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white/90 border border-red-200 text-red-800 text-[18px] px-1 rounded shadow-sm whitespace-nowrap z-20">
                                            {p.data.type} {p.data.angle}°
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );

            return (
                <div className="flex w-full relative" style={{ height: `${REGIONS[level.type].height}px` }}>
                    <div className="absolute bottom-0 left-0 right-0 border-b border-slate-100 w-full z-0 pointer-events-none"></div>
                    
                    <div className={`w-10 border-r border-slate-100/50 ${!readOnly ? 'hover:bg-amber-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'force_left')}>
                        <ZoneContent items={forceLeftItems} align="center" />
                    </div>

                    <div className={`flex-1 ${!readOnly ? 'hover:bg-blue-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'left')}>
                        <ZoneContent items={leftItems} align="left" />
                    </div>

                    <div className={`w-[160px] relative flex justify-center shrink-0 z-10 ${!readOnly ? 'hover:brightness-95 cursor-pointer' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'mid')}>
                        <SpineVertebra label={level.id} type={level.type} height={REGIONS[level.type].height} />
                        <MidOverlay items={midItems} />
                    </div>

                    <div className={`flex-1 ${!readOnly ? 'hover:bg-blue-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'right')}>
                        <ZoneContent items={rightItems} align="right" />
                    </div>

                    <div className={`w-10 border-l border-slate-100/50 ${!readOnly ? 'hover:bg-amber-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'force_right')}>
                        <ZoneContent items={forceRightItems} align="center" />
                    </div>
                </div>
            );
        };

        const ChartPaper = ({ title, placements, onZoneClick, onRemovePlacement, tools, readOnly, levels, showForces }) => {
            return (
                <div className="flex-1 flex flex-col h-full border-l border-slate-200 bg-white relative">
                    <div className="p-2 bg-slate-50 border-b border-slate-200 text-center font-bold text-sm text-slate-800 font-serif uppercase tracking-wider">
                        {title}
                    </div>
                    <div className="flex-1 relative flex flex-col pt-8 px-2">
                        <div className="flex w-full absolute top-1 left-0 right-0 px-2 text-[9px] font-bold text-slate-400 uppercase tracking-tighter text-center pointer-events-none z-10">
                            <div className="w-10 text-emerald-600/50">{showForces ? 'Force' : ''}</div>
                            <div className="flex-1 text-right pr-4">Left</div>
                            <div className="w-[160px]"></div>
                            <div className="flex-1 text-left pl-4">Right</div>
                            <div className="w-10 text-emerald-600/50">{showForces ? 'Force' : ''}</div>
                        </div>

                        <div className="flex flex-col w-full relative">
                            {levels.map(lvl => (
                                <LevelRow 
                                    key={lvl.id}
                                    level={lvl}
                                    placements={placements}
                                    onZoneClick={onZoneClick}
                                    onRemove={onRemovePlacement}
                                    tools={tools}
                                    readOnly={readOnly}
                                    showForces={showForces}
                                />
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // SECTION 6: MAIN APP LOGIC
        // ==========================================
        const App = () => {
            const [selectedTool, setSelectedTool] = useState('polyaxial');
            const [activeChart, setActiveChart] = useState('planned'); 
            const [plannedPlacements, setPlannedPlacements] = useState([]);
            const [completedPlacements, setCompletedPlacements] = useState([]);
            
            // Patient Info (Removed 'location')
            const [patientData, setPatientData] = useState({ 
                name: '', 
                id: '', 
                surgeon: '', 
                date: new Date().toISOString().split('T')[0] 
            });
            
            const [showCervical, setShowCervical] = useState(false); 
            const [scale, setScale] = useState(1);
            const [isEditingDate, setIsEditingDate] = useState(false);
            const [hasLoaded, setHasLoaded] = useState(false);
            const [incognitoMode, setIncognitoMode] = useState(false);
            
            const exportRef = useRef(null);
            const containerWrapperRef = useRef(null);
            const fileInputRef = useRef(null);

            // AUTO-LOAD
            useEffect(() => {
                const saved = localStorage.getItem('leeds_spine_planner_data_v18');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.planned) setPlannedPlacements(parsed.planned);
                        if (parsed.completed) setCompletedPlacements(parsed.completed);
                        if (parsed.patient) setPatientData(parsed.patient);
                        if (parsed.showCervical !== undefined) setShowCervical(parsed.showCervical);
                    } catch (e) {
                        console.error("Failed to load saved data");
                    }
                }
                setHasLoaded(true);
            }, []);

            // AUTO-SAVE
            useEffect(() => {
                if (!hasLoaded) return;
                
                if (incognitoMode) {
                    localStorage.removeItem('leeds_spine_planner_data_v18');
                } else {
                    const dataToSave = {
                        planned: plannedPlacements,
                        completed: completedPlacements,
                        patient: patientData,
                        showCervical
                    };
                    localStorage.setItem('leeds_spine_planner_data_v18', JSON.stringify(dataToSave));
                }
            }, [plannedPlacements, completedPlacements, patientData, showCervical, hasLoaded, incognitoMode]);

            // RESET
            const clearAllData = () => {
                if(confirm("Start New Patient? This will clear the current plan.")) {
                    setPlannedPlacements([]);
                    setCompletedPlacements([]);
                    setPatientData({ name: '', id: '', surgeon: '', date: new Date().toISOString().split('T')[0] });
                    setActiveChart('planned');
                }
            };

            // COPY
            const copyPlanToCompleted = () => {
                if (plannedPlacements.length === 0) {
                    alert("No Pre-Op plan to copy.");
                    return;
                }
                if (completedPlacements.length > 0) {
                    if (!confirm("Overwrite existing Post-Op construct?")) return;
                }
                const copied = plannedPlacements.map((p, index) => ({
                    ...p,
                    id: Date.now() + index + Math.random() // Ensure unique ID
                }));
                setCompletedPlacements(copied);
                setActiveChart('completed');
            };

            const levels = useMemo(() => {
                const lvls = [];
                if (showCervical) ['C1','C2','C3','C4','C5','C6','C7'].forEach(l => lvls.push({ id:l, type:'C' }));
                ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'].forEach(l => lvls.push({ id:l, type:'T' }));
                ['L1','L2','L3','L4','L5'].forEach(l => lvls.push({ id:l, type:'L' }));
                lvls.push({ id:'S1', type:'S' });
                lvls.push({ id:'Pelvis', type:'Pelvis' });
                return lvls;
            }, [showCervical]);

            useLayoutEffect(() => {
                const handleResize = () => {
                    if (containerWrapperRef.current && exportRef.current) {
                        const wrapperH = containerWrapperRef.current.clientHeight;
                        const wrapperW = containerWrapperRef.current.clientWidth;
                        const scaleW = (wrapperW - 40) / 1485; 
                        const scaleH = (wrapperH - 40) / 1050;
                        setScale(Math.min(scaleW, scaleH));
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize(); 
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const tools = [
                { category: 'Screws', items: [
                    { id: 'monoaxial', label: 'Monoaxial', icon: 'monoaxial', needsSize: true, type: 'implant' },
                    { id: 'polyaxial', label: 'Polyaxial', icon: 'polyaxial', needsSize: true, type: 'implant' },
                    { id: 'uniplanar', label: 'Uniplanar', icon: 'uniplanar', needsSize: true, type: 'implant' },
                ]},
                { category: 'Hooks', items: [
                    { id: 'pedicle_hook', label: 'Pedicle', icon: 'pedicle_hook', type: 'implant' },
                    { id: 'tp_hook', label: 'TP Hook', icon: 'tp_hook', type: 'implant' },
                    { id: 'sl_hook', label: 'Supra-laminar', icon: 'sl_hook', type: 'implant' },
                    { id: 'il_hook', label: 'Infra-laminar', icon: 'il_hook', type: 'implant' },
                ]},
                { category: 'Midline', items: [
                    { id: 'connector', label: 'Crosslink', icon: 'connector', type: 'mid' },
                    { id: 'unstable', label: 'Unstable', icon: 'unstable', type: 'mid' },
                    { id: 'osteotomy', label: 'Osteotomy', icon: 'osteotomy', isOsteotomy: true, type: 'mid' },
                ]},
                { category: 'Forces', items: [
                    { id: 'force_cranial', label: 'Cranial', icon: 'force_cranial', type: 'force' },
                    { id: 'force_caudal', label: 'Caudal', icon: 'force_caudal', type: 'force' },
                    { id: 'compression', label: 'Compress', icon: 'compression', type: 'force' },
                    { id: 'distraction', label: 'Distract', icon: 'distraction', type: 'force' },
                    { id: 'force_left', label: 'Left', icon: 'force_left', type: 'force' },
                    { id: 'force_right', label: 'Right', icon: 'force_right', type: 'force' },
                ]}
            ];
            const allTools = tools.flatMap(g => g.items);

            const handleZoneClick = (levelId, zoneClicked) => {
                const tool = allTools.find(t => t.id === selectedTool);
                
                if (tool.type === 'force') {
                    if (zoneClicked !== 'force_left' && zoneClicked !== 'force_right') {
                        alert("Forces must be placed in the far outer columns.");
                        return;
                    }
                }
                else if (tool.type === 'implant') {
                    if (zoneClicked !== 'left' && zoneClicked !== 'right') return; 
                }
                else if (tool.type === 'mid') {
                    if (zoneClicked !== 'mid') return;
                }

                let data = null;
                if (tool.isOsteotomy) {
                    const type = prompt("Osteotomy Type (e.g. PSO):", "PSO");
                    if (!type) return;
                    const angle = prompt("Angle:", "30");
                    if (!angle) return;
                    data = { type, angle };
                } else if (tool.needsSize) {
                    const size = prompt("Size (e.g. 6.5x45):");
                    if (size === null) return;
                    data = size;
                }

                const newP = { id: Date.now(), levelId, zone: zoneClicked, tool: selectedTool, data };
                if (activeChart === 'planned') setPlannedPlacements(prev => [...prev, newP]);
                else setCompletedPlacements(prev => [...prev, newP]);
            };

            const removePlacement = (id) => {
                if (activeChart === 'planned') setPlannedPlacements(prev => prev.filter(p => p.id !== id));
                else setCompletedPlacements(prev => prev.filter(p => p.id !== id));
            };

            // EXPORT TO JPEG
            const runExport = () => {
                const element = exportRef.current;
                const cloneContainer = document.createElement('div');
                cloneContainer.style.position = 'absolute';
                cloneContainer.style.top = '0';
                cloneContainer.style.left = '0';
                cloneContainer.style.zIndex = '-9999';
                document.body.appendChild(cloneContainer);

                const clone = element.cloneNode(true);
                clone.style.transform = 'none'; 
                clone.style.margin = '0';
                cloneContainer.appendChild(clone);

                html2canvas(clone, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    width: 1485,
                    height: 1050,
                    logging: false,
                    windowWidth: 1485,
                    windowHeight: 1050
                }).then(canvas => {
                    document.body.removeChild(cloneContainer);
                    const link = document.createElement('a');
                    link.download = `SpinePlan_${patientData.name || 'Patient'}_${patientData.date}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();

                    if (incognitoMode) {
                        localStorage.removeItem('leeds_spine_planner_data_v18');
                    }
                });
            };

            // JSON EXPORT
            const saveProjectJSON = () => {
                const data = {
                    version: 22,
                    patient: patientData,
                    planned: plannedPlacements,
                    completed: completedPlacements,
                    showCervical: showCervical,
                    timestamp: new Date().toISOString()
                };
                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `SpineProject_${patientData.name || 'Unnamed'}_${patientData.date}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                if (incognitoMode) {
                    localStorage.removeItem('leeds_spine_planner_data_v18');
                }
            };

            // JSON IMPORT
            const loadProjectJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (json.patient) setPatientData(json.patient);
                        if (json.planned) setPlannedPlacements(json.planned);
                        if (json.completed) setCompletedPlacements(json.completed);
                        if (json.showCervical !== undefined) setShowCervical(json.showCervical);
                        alert("Project Loaded Successfully.");
                    } catch (err) {
                        alert("Error loading file. Is this a valid Leeds Spine Planner JSON file?");
                        console.error(err);
                    }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            return (
                <div className="h-full flex flex-col overflow-hidden">
                    {/* TOP BAR */}
                    <header className="bg-slate-900 text-white p-2 flex justify-between items-center shadow-md z-30 shrink-0 no-print h-14">
                        <div className="flex items-center gap-4">
                            <h1 className="font-bold text-lg px-2">Leeds Spinal Planner V22</h1>
                            
                            <div className="flex bg-slate-800 rounded p-1 text-sm border border-slate-700">
                                <button onClick={() => setActiveChart('planned')} className={`px-4 py-1 rounded transition-all ${activeChart === 'planned' ? 'bg-amber-500 text-slate-900 font-bold' : 'text-slate-400 hover:text-white'}`}>Pre-Op</button>
                                <button onClick={() => setActiveChart('completed')} className={`px-4 py-1 rounded transition-all ${activeChart === 'completed' ? 'bg-amber-500 text-slate-900 font-bold' : 'text-slate-400 hover:text-white'}`}>Post-Op</button>
                            </div>

                            <button onClick={copyPlanToCompleted} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded text-xs font-bold border border-slate-600 transition-colors" title="Copy Pre-Op Plan to Post-Op View">
                                <IconCopy /> Copy Plan
                            </button>
                        </div>

                        <div className="flex gap-4 items-center">
                            {/* SESSION MODE */}
                            <div className={`flex items-center gap-2 px-3 py-1 rounded border transition-colors ${incognitoMode ? 'bg-red-900/30 border-red-500/50' : 'bg-transparent border-transparent'}`}>
                                <div className="relative inline-block w-8 h-4 align-middle select-none transition duration-200 ease-in">
                                    <input 
                                        type="checkbox" 
                                        name="toggle" 
                                        id="incognito-toggle" 
                                        className="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300" 
                                        style={{ top: 0, left: 0 }}
                                        checked={incognitoMode}
                                        onChange={(e) => setIncognitoMode(e.target.checked)}
                                    />
                                    <label htmlFor="incognito-toggle" className={`toggle-label block overflow-hidden h-4 rounded-full cursor-pointer border ${incognitoMode ? 'bg-red-600 border-red-600' : 'bg-slate-600 border-slate-600'}`}></label>
                                </div>
                                <div className="flex flex-col leading-none">
                                    <span className={`text-[10px] font-bold uppercase tracking-wider ${incognitoMode ? 'text-red-400' : 'text-slate-500'}`}>Session Mode</span>
                                    {incognitoMode && <span className="text-[9px] text-red-300">Data not saved</span>}
                                </div>
                            </div>

                            <div className="h-8 w-px bg-slate-700 mx-1"></div>

                            {/* CONTROLS */}
                            <input type="file" ref={fileInputRef} onChange={loadProjectJSON} className="hidden" accept=".json" />
                            
                            <button onClick={() => fileInputRef.current.click()} className="text-slate-300 hover:text-white px-2 py-1.5 rounded flex gap-2 items-center text-xs font-bold transition-colors" title="Load saved .json project">
                                <IconUpload /> Load
                            </button>

                            <button onClick={saveProjectJSON} className="text-slate-300 hover:text-white px-2 py-1.5 rounded flex gap-2 items-center text-xs font-bold transition-colors" title="Save editable .json project">
                                <IconSave /> Save
                            </button>

                            <button onClick={runExport} className="bg-white text-slate-900 px-4 py-1.5 rounded font-bold flex gap-2 items-center hover:bg-slate-200 text-sm ml-2">
                                <IconDownload /> Export JPEG
                            </button>
                            
                            <button onClick={clearAllData} className="ml-2 text-red-400 hover:text-red-200 p-2" title="Clear all data for new patient">
                                <IconTrash />
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 overflow-hidden bg-slate-200 flex relative">
                        {/* LEFT SIDEBAR */}
                        <aside className="w-64 bg-slate-800 text-white flex flex-col border-r border-slate-700 z-20 overflow-y-auto no-print shadow-xl">
                            <div className="p-4 border-b border-slate-700 bg-slate-900">
                                <label className="flex items-center gap-2 cursor-pointer select-none text-sm text-slate-300 hover:text-white">
                                    <input type="checkbox" checked={showCervical} onChange={e => setShowCervical(e.target.checked)} className="w-4 h-4 rounded text-amber-500 focus:ring-amber-500"/>
                                    Show Cervical (C1-C7)
                                </label>
                            </div>
                            <div className="p-4 space-y-6">
                                {tools.map((group, idx) => (
                                    <div key={idx}>
                                        <h3 className="text-[10px] uppercase font-bold text-slate-500 mb-2 tracking-widest">{group.category}</h3>
                                        <div className="grid grid-cols-2 gap-2">
                                            {group.items.map(tool => (
                                                <button
                                                    key={tool.id}
                                                    onClick={() => setSelectedTool(tool.id)}
                                                    className={`p-2 rounded border flex flex-col items-center justify-center gap-1 transition-all text-xs ${selectedTool === tool.id ? 'bg-amber-500 border-amber-600 text-slate-900 font-bold' : 'bg-slate-700 border-slate-600 hover:bg-slate-600 text-slate-200'}`}
                                                >
                                                    <InstrumentIcon type={tool.icon} className="w-6 h-6 mb-1" color={selectedTool === tool.id ? 'black' : 'white'} />
                                                    <span className="text-center text-[10px]">{tool.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        {/* MAIN CANVAS WRAPPER */}
                        <div ref={containerWrapperRef} id="print-wrapper" className="flex-1 flex items-center justify-center p-8 bg-slate-300 overflow-hidden relative">
                            <div style={{ transform: `scale(${scale})` }}>
                                {/* THE WHITE PAPER AREA */}
                                <div id="export-container" ref={exportRef}>
                                    
                                    {/* INFO SIDEBAR */}
                                    <div className="w-[300px] bg-white border-r border-slate-300 flex flex-col p-8">
                                        <h2 className="font-serif font-bold text-3xl text-slate-900 mb-8 border-b-4 border-slate-900 pb-2">Spinal Surgery</h2>
                                        <div className="space-y-6 text-base flex-1">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Patient Name</label>
                                                <div className="editable-field w-full text-lg font-serif" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, name: e.target.innerText})} placeholder="Click to enter...">{patientData.name}</div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Patient ID</label>
                                                <div className="editable-field w-full text-lg font-mono" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, id: e.target.innerText})} placeholder="Click to enter...">{patientData.id}</div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Surgeon</label>
                                                <div className="editable-field w-full text-lg" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, surgeon: e.target.innerText})} placeholder="Click to enter...">{patientData.surgeon}</div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Date</label>
                                                {isEditingDate ? (
                                                    <input type="date" className="w-full text-lg border-b border-slate-800 bg-transparent outline-none py-1" value={patientData.date} autoFocus onBlur={() => setIsEditingDate(false)} onChange={e => { setPatientData({...patientData, date: e.target.value}); setIsEditingDate(false); }} />
                                                ) : (
                                                    <div className="editable-field w-full text-lg cursor-pointer" onClick={() => setIsEditingDate(true)}>{formatDate(patientData.date)}</div>
                                                )}
                                            </div>
                                        </div>
                                        
                                        {/* LEGENDS */}
                                        <div className="mb-4">
                                            <h3 className="font-bold text-slate-900 border-b border-slate-300 mb-1 text-xs">Screws</h3>
                                            <div className="space-y-1 pt-1 text-[10px]">
                                                <div className="flex items-center gap-2"><InstrumentIcon type="monoaxial" className="w-4 h-4"/> Monoaxial</div>
                                                <div className="flex items-center gap-2"><InstrumentIcon type="polyaxial" className="w-4 h-4"/> Polyaxial</div>
                                                <div className="flex items-center gap-2"><InstrumentIcon type="uniplanar" className="w-4 h-4"/> Uniplanar</div>
                                            </div>
                                        </div>
                                        <div className="mb-4">
                                            <h3 className="font-bold text-slate-900 border-b border-slate-300 mb-1 text-xs">Hooks</h3>
                                            <div className="space-y-1 pt-1 text-[10px]">
                                                <div className="flex items-center gap-2"><InstrumentIcon type="pedicle_hook" className="w-6 h-4"/> Pedicle</div>
                                                <div className="flex items-center gap-2"><InstrumentIcon type="tp_hook" className="w-6 h-4"/> Transverse Process</div>
                                                <div className="flex items-center gap-2"><InstrumentIcon type="sl_hook" className="w-6 h-4"/> Supra-laminar</div>
                                                <div className="flex items-center gap-2"><InstrumentIcon type="il_hook" className="w-6 h-4"/> Infra-laminar</div>
                                            </div>
                                        </div>
                                        
                                        <LeedsTrustLogo />
                                        <CreditsFooter />
                                    </div>

                                    {/* PRE-OP CHART */}
                                    <ChartPaper 
                                        title="Pre-Operative Plan" 
                                        placements={plannedPlacements} 
                                        onZoneClick={handleZoneClick}
                                        onRemovePlacement={removePlacement} 
                                        tools={allTools}
                                        readOnly={activeChart !== 'planned'}
                                        levels={levels}
                                        showForces={true}
                                    />
                                    {/* POST-OP CHART */}
                                    <ChartPaper 
                                        title="Surgical Construct" 
                                        placements={completedPlacements} 
                                        onZoneClick={handleZoneClick}
                                        onRemovePlacement={removePlacement} 
                                        tools={allTools}
                                        readOnly={activeChart !== 'completed'}
                                        levels={levels}
                                        showForces={false}
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
