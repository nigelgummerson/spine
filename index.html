<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinal Surgical Planner V25 - Leeds Teaching Hospitals</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Serif:wght@700&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        body { font-family: 'Noto Sans', sans-serif; overflow: hidden; background-color: #f1f5f9; }
        .serif { font-family: 'Noto Serif', serif; }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        /* EXPORT CONTAINER */
        #export-container {
            width: 1485px; 
            height: 1050px; 
            background: white;
            margin: 0 auto;
            display: flex;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            flex-shrink: 0;
            transform-origin: top center; 
        }

        /* EDITABLE FIELDS */
        .editable-field {
            border-bottom: 1px dashed #cbd5e1;
            min-width: 100px;
            display: inline-block;
            color: #334155;
            padding: 4px 0;
            outline: none;
            cursor: text;
            line-height: 1.2;
        }
        .editable-field:focus {
            border-bottom: 1px solid #0f172a;
            background-color: #f8fafc;
        }
        .editable-field:empty:before {
            content: attr(placeholder);
            color: #94a3b8;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Incognito Toggle Animation */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #ef4444;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #ef4444;
        }

        /* Modal Overlay */
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useLayoutEffect, useMemo } = React;

        // ==========================================
        // SECTION 0: CONFIGURATION & DATA
        // ==========================================
        
        // Screw Sizes
        const DIAMETER_OPTIONS = [];
        for (let i = 3.5; i <= 10.5; i += 0.5) DIAMETER_OPTIONS.push(i.toFixed(1));

        const LENGTH_OPTIONS = [];
        for (let i = 10; i <= 35; i++) LENGTH_OPTIONS.push(i);
        for (let i = 40; i <= 100; i += 5) LENGTH_OPTIONS.push(i);

        // Osteotomy Definitions (Derived from user CSV)
        const OSTEOTOMY_TYPES = [
            { id: 'SPO', label: 'Smith-Petersen (SPO)', schwab: 'Schwab Grade 1', desc: 'Partial facet joint resection', defaultAngle: '10' },
            { id: 'Ponte', label: 'Ponte Osteotomy', schwab: 'Schwab Grade 2', desc: 'Complete facet joint resection', defaultAngle: '15' },
            { id: 'PSO', label: 'Pedicle Subtraction (PSO)', schwab: 'Schwab Grade 3', desc: 'Pedicle and partial body resection', defaultAngle: '30' },
            { id: 'Bdr-Wdg', label: 'Bone-Disc-Bone (BDB)', schwab: 'Schwab Grade 4', desc: 'Resection of disc and endplates', defaultAngle: '35' },
            { id: 'VCR', label: 'Vertebral Column Resection', schwab: 'Schwab Grade 5', desc: 'Complete vertebra and discs', defaultAngle: '45' },
            { id: 'VCR-Ext', label: 'VCR (Extended)', schwab: 'Schwab Grade 6', desc: 'Multiple vertebrae resection', defaultAngle: '50' }
        ];

        // ==========================================
        // SECTION 1: ICONS
        // ==========================================
        const IconTrash = () => (<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>);
        const IconDownload = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
        const IconCopy = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>);
        const IconUpload = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>);
        const IconSave = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>);
        const IconCC = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M10.8 9.5a2.5 2.5 0 0 0-1.3-.8"/><path d="M9.5 9.5c-.8.5-1.5 1.5-1.5 2.5s.7 2 1.5 2.5"/><path d="M14.2 9.5a2.5 2.5 0 0 0-1.3-.8"/><path d="M12.9 9.5c-.8.5-1.5 1.5-1.5 2.5s.7 2 1.5 2.5"/></svg>);
        const IconX = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);

        // ==========================================
        // SECTION 2: UI COMPONENTS
        // ==========================================
        
        const LeedsTrustLogo = () => (
            <div className="flex flex-col items-center justify-center mt-6 mb-12 opacity-90">
                <span className="text-xs font-bold text-slate-500 uppercase mb-2">Clinic Location:</span>
                <div className="flex flex-col text-center">
                    <span className="font-sans font-bold text-slate-800 text-lg leading-none tracking-tight">Leeds Teaching Hospitals</span>
                    <span className="font-sans text-slate-500 text-sm leading-none mt-1">NHS Trust</span>
                </div>
            </div>
        );

        const CreditsFooter = () => (
            <div className="mt-auto pt-6 border-t border-slate-200">
                <div className="flex flex-col gap-2">
                    <p className="text-[10px] text-slate-500 leading-tight">
                        <span className="font-bold text-slate-800 block mb-1 text-[11px]">Leeds Spinal Surgery Planner</span>
                        Developed by:<br/>
                        <span className="font-bold text-slate-700">Nigel Gummerson FRCS (Tr & Orth)</span><br/>
                        and <span className="font-bold text-slate-700">Google Gemini</span>,<br/>
                        December 2025
                    </p>
                    <div className="flex items-start gap-1 text-[9px] text-slate-400 leading-tight">
                        <div className="mt-0.5"><IconCC /></div>
                        <span>
                            Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" className="underline hover:text-slate-600">CC BY-NC-SA 4.0</a>.<br/>
                            Free for non-commercial clinical & educational use.
                        </span>
                    </div>
                </div>
            </div>
        );

        // --- MODAL 1: SCREW SIZE & TYPE ---
        const ScrewModal = ({ isOpen, onClose, onConfirm, onDelete, initialData, initialTool, defaultDiameter, defaultLength }) => {
            if (!isOpen) return null;

            const [mode, setMode] = useState('standard');
            const [diameter, setDiameter] = useState(defaultDiameter);
            const [length, setLength] = useState(defaultLength);
            const [customText, setCustomText] = useState('');
            const [selectedType, setSelectedType] = useState(initialTool || 'polyaxial');

            useEffect(() => {
                if (isOpen) {
                    if (initialTool) setSelectedType(initialTool);
                    
                    if (initialData && typeof initialData === 'string') {
                         if (initialData === "Custom") {
                             setMode('custom');
                         } else if (initialData.includes('x')) {
                             const parts = initialData.split(' x ');
                             if (parts.length === 2) {
                                 setMode('standard');
                                 setDiameter(parts[0]);
                                 setLength(parts[1]);
                             } else {
                                 setMode('custom');
                                 setCustomText(initialData);
                             }
                         } else {
                             setMode('standard');
                         }
                    } else if (initialData === null && initialData !== undefined) {
                         setMode('none');
                    } else {
                        // Defaults for new placement
                        setMode('standard');
                        setDiameter(defaultDiameter);
                        setLength(defaultLength);
                        setCustomText('');
                    }
                }
            }, [isOpen, initialData, initialTool, defaultDiameter, defaultLength]);

            const handleSubmit = () => {
                let finalSize = null;
                if (mode === 'custom') finalSize = customText || "Custom";
                else if (mode === 'standard') finalSize = `${diameter} x ${length}`;
                
                onConfirm(finalSize, { diameter, length }, selectedType);
                onClose();
            };

            const isEditing = initialData !== undefined;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
                    <div className="bg-white rounded-lg shadow-2xl w-full max-w-sm overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                        <div className="bg-slate-900 text-white px-4 py-3 flex justify-between items-center">
                            <h3 className="font-bold text-sm">{isEditing ? 'Edit Screw' : 'Select Screw'}</h3>
                            <button onClick={onClose} className="hover:text-red-400"><IconX /></button>
                        </div>
                        
                        <div className="p-6">
                            {/* Type Switcher */}
                            <div className="flex bg-slate-100 p-1 rounded mb-6">
                                {['monoaxial', 'polyaxial', 'uniplanar'].map(t => (
                                    <button 
                                        key={t}
                                        onClick={() => setSelectedType(t)}
                                        className={`flex-1 py-1 text-[10px] font-bold uppercase rounded transition-all ${selectedType === t ? 'bg-white shadow text-slate-900' : 'text-slate-400 hover:text-slate-600'}`}
                                    >
                                        {t.replace('axial','')}
                                    </button>
                                ))}
                            </div>

                            <div className="flex gap-2 mb-4">
                                <button onClick={() => setMode('standard')} className={`flex-1 py-1 text-xs font-bold rounded border ${mode === 'standard' ? 'bg-amber-500 text-slate-900 border-amber-600' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>Standard</button>
                                <button onClick={() => setMode('custom')} className={`flex-1 py-1 text-xs font-bold rounded border ${mode === 'custom' ? 'bg-amber-500 text-slate-900 border-amber-600' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>Custom</button>
                                <button onClick={() => setMode('none')} className={`flex-1 py-1 text-xs font-bold rounded border ${mode === 'none' ? 'bg-amber-500 text-slate-900 border-amber-600' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>No Size</button>
                            </div>

                            {mode === 'standard' && (
                                <div className="space-y-4">
                                    <div className="grid grid-cols-4 gap-2">
                                        <select value={diameter} onChange={(e) => setDiameter(e.target.value)} className="col-span-4 w-full p-2 border border-slate-300 rounded bg-slate-50 text-lg font-mono focus:border-amber-500 outline-none">
                                            {DIAMETER_OPTIONS.map(d => <option key={d} value={d}>{d} mm</option>)}
                                        </select>
                                    </div>
                                    <select value={length} onChange={(e) => setLength(e.target.value)} className="w-full p-2 border border-slate-300 rounded bg-slate-50 text-lg font-mono focus:border-amber-500 outline-none">
                                        {LENGTH_OPTIONS.map(l => <option key={l} value={l}>{l} mm</option>)}
                                    </select>
                                </div>
                            )}

                            {mode === 'custom' && (
                                <input type="text" value={customText} onChange={(e) => setCustomText(e.target.value)} placeholder="e.g. 8.0 x 110" className="w-full p-2 border border-slate-300 rounded bg-slate-50 text-lg focus:border-amber-500 outline-none" autoFocus />
                            )}

                            {mode === 'none' && <div className="text-center py-6 text-slate-400 text-sm italic">Icon only. No label.</div>}
                        </div>

                        <div className="bg-slate-50 px-4 py-3 flex justify-between border-t border-slate-100">
                            {isEditing ? <button onClick={onDelete} className="text-red-500 hover:bg-red-50 px-3 py-1 rounded text-sm font-bold flex gap-1 items-center"><IconTrash/> Remove</button> : <div></div>}
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-4 py-2 rounded text-slate-500 hover:bg-slate-200 text-sm font-bold">Cancel</button>
                                <button onClick={handleSubmit} className="px-6 py-2 rounded bg-slate-800 text-white hover:bg-slate-700 text-sm font-bold shadow-lg">Confirm</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MODAL 2: OSTEOTOMY CONFIG ---
        const OsteotomyModal = ({ isOpen, onClose, onConfirm, onDelete, initialData, defaultType, defaultAngle }) => {
            if (!isOpen) return null;

            const [type, setType] = useState(defaultType || 'PSO');
            const [angle, setAngle] = useState(defaultAngle || '30');

            useEffect(() => {
                if (isOpen) {
                    if (initialData) {
                        setType(initialData.type);
                        setAngle(initialData.angle);
                    } else {
                        setType(defaultType || 'PSO');
                        setAngle(defaultAngle || '30');
                    }
                }
            }, [isOpen, initialData, defaultType, defaultAngle]);

            const selectedDef = OSTEOTOMY_TYPES.find(t => t.id === type) || OSTEOTOMY_TYPES[0];

            const handleSubmit = () => {
                onConfirm({ type, angle });
                onClose();
            };

            const isEditing = !!initialData;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
                    <div className="bg-white rounded-lg shadow-2xl w-full max-w-sm overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                        <div className="bg-red-800 text-white px-4 py-3 flex justify-between items-center">
                            <h3 className="font-bold text-sm">{isEditing ? 'Edit Osteotomy' : 'Plan Osteotomy'}</h3>
                            <button onClick={onClose} className="hover:text-red-200"><IconX /></button>
                        </div>
                        
                        <div className="p-6 space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Osteotomy Type</label>
                                <select value={type} onChange={(e) => setType(e.target.value)} className="w-full p-2 border border-slate-300 rounded bg-slate-50 text-sm font-bold text-slate-800 focus:border-red-500 outline-none">
                                    {OSTEOTOMY_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                                </select>
                            </div>

                            {/* Schwab Display */}
                            <div className="bg-red-50 border border-red-100 rounded p-3 text-xs">
                                <div className="font-bold text-red-800 uppercase tracking-wider mb-1">{selectedDef.schwab}</div>
                                <div className="text-red-600">{selectedDef.desc}</div>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Correction Angle (°)</label>
                                <div className="flex items-center gap-2">
                                    <input type="number" value={angle} onChange={(e) => setAngle(e.target.value)} className="w-24 p-2 border border-slate-300 rounded bg-slate-50 text-lg font-mono focus:border-red-500 outline-none text-center" />
                                    <span className="font-serif italic text-slate-400 text-sm">degrees</span>
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-50 px-4 py-3 flex justify-between border-t border-slate-100">
                            {isEditing ? <button onClick={onDelete} className="text-red-500 hover:bg-red-50 px-3 py-1 rounded text-sm font-bold flex gap-1 items-center"><IconTrash/> Remove</button> : <div></div>}
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-4 py-2 rounded text-slate-500 hover:bg-slate-200 text-sm font-bold">Cancel</button>
                                <button onClick={handleSubmit} className="px-6 py-2 rounded bg-red-800 text-white hover:bg-red-700 text-sm font-bold shadow-lg">Confirm</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // SECTION 3: UTILITIES & GRAPHICS
        // ==========================================
        const formatDate = (isoString) => {
            if (!isoString) return '';
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return isoString;
            return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        };

        const REGIONS = {
            C: { height: 28, color: '#f1f5f9' }, 
            T: { height: 36, color: '#e2e8f0' }, 
            L: { height: 46, color: '#cbd5e1' }, 
            S: { height: 52, color: '#94a3b8' }, 
            Pelvis: { height: 54, color: '#94a3b8' } 
        };

        const InstrumentIcon = ({ type, className = "w-5 h-5", color = "black" }) => {
            const strokeWidth = 2.5;
            const HookBase = ({ direction, label }) => (
                <svg viewBox="0 0 40 24" className="w-full h-full">
                    {direction === 'up' ? <path d="M12 18V6m0 0l-4 4m4-4l4 4m-8 12h8" stroke={color} fill="none" strokeWidth={strokeWidth} /> : <path d="M12 6v12m0 0l-4-4m4 4l4-4m-8-12h8" stroke={color} fill="none" strokeWidth={strokeWidth} />}
                    <text x="22" y="17" fontSize="14" fontWeight="bold" fontFamily="serif" fill={color}>{label}</text>
                </svg>
            );

            switch (type) {
                case 'monoaxial': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /></svg>;
                case 'polyaxial': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /><path d="M7 7l10 10M17 7l-10 10" /></svg>;
                case 'uniplanar': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><circle cx="12" cy="12" r="9" /><path d="M12 3v18" /></svg>;
                case 'pedicle_hook': return <div className={className}><HookBase direction="up" label="P" /></div>;
                case 'tp_hook': return <div className={className}><HookBase direction="down" label="TP" /></div>;
                case 'sl_hook': return <div className={className}><HookBase direction="down" label="SL" /></div>;
                case 'il_hook': return <div className={className}><HookBase direction="up" label="IL" /></div>;
                case 'connector': return <svg viewBox="0 0 40 10" className={className} stroke={color} fill="none" strokeWidth="2"><line x1="2" y1="5" x2="38" y2="5" strokeWidth="3" /><circle cx="2" cy="5" r="2" fill={color} /><circle cx="38" cy="5" r="2" fill={color} /></svg>;
                case 'unstable': return <svg viewBox="0 0 24 24" className={`${className} bg-white rounded border border-red-100 shadow-sm`} fill="none" stroke="#dc2626" strokeWidth="2.5"><path d="M2 12 L6 8 L10 16 L14 8 L18 16 L22 12" strokeLinecap="round" strokeLinejoin="round" /></svg>;
                case 'osteotomy': return <svg viewBox="0 0 24 24" className={className} stroke={color} fill="none" strokeWidth={strokeWidth}><path d="M2 12h20M12 2l10 10-10 10L2 12z" fill="#dc2626" opacity="0.8" /></svg>;
                case 'force_right': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
                case 'force_left': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M19 12H5M11 19l-7-7 7-7"/></svg>;
                case 'force_cranial': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M12 19V5M5 11l7-7 7 7"/></svg>;
                case 'force_caudal': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M12 5v14M19 13l-7 7-7-7"/></svg>;
                case 'compression': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M2 12h9m-3-3l3 3-3 3" /><path d="M22 12h-9m3-3l-3 3 3 3" /></svg>;
                case 'distraction': return <svg viewBox="0 0 24 24" className={className} stroke="#059669" fill="none" strokeWidth="3"><path d="M11 12H2m3-3l-3 3 3 3" /><path d="M13 12h9m-3-3l3 3-3 3" /></svg>;
                default: return null;
            }
        };

        const SpineVertebra = ({ label, type, height }) => {
            const common = { fill: REGIONS[type].color, stroke: "#475569", strokeWidth: "1.5" };
            return (
                <svg viewBox={`0 0 160 ${height}`} className="w-[160px] block" style={{height: `${height}px`}} overflow="visible">
                    <line x1="80" y1="-2" x2="80" y2={height + 2} stroke="#cbd5e1" strokeDasharray="3 3" />
                    <g>
                        {type === 'C' && <path d="M65,6 Q80,2 95,6 L95,22 Q80,26 65,22 Z" transform={`translate(0, 0) scale(1, ${height/24})`} {...common} />}
                        {type === 'T' && <g><path d="M60,10 Q80,4 100,10 L105,27 Q80,33 55,27 Z" transform={`scale(1, ${height/32})`} {...common} /><path d="M55,13 L45,11" stroke="#64748b" strokeWidth="2" /><path d="M105,13 L115,11" stroke="#64748b" strokeWidth="2" /></g>}
                        {type === 'L' && <g><path d="M55,8 Q80,2 105,8 L110,33 Q80,38 50,33 Z" transform={`scale(1, ${height/38})`} {...common} /><path d="M50,16 L35,20" stroke="#64748b" strokeWidth="3" /><path d="M110,16 L125,20" stroke="#64748b" strokeWidth="3" /></g>}
                        {type === 'S' && <path d="M40,8 Q80,2 120,8 L100,43 Q80,53 60,43 Z" transform={`scale(1, ${height/48})`} {...common} />}
                        {type === 'Pelvis' && <path d="M20,5 Q80,20 140,5 L130,40 Q80,50 30,40 Z" transform={`scale(1, ${height/45})`} {...common} opacity="0.6" />}
                    </g>
                    <text x="80" y={height/2} dominantBaseline="middle" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#334155" className="font-sans pointer-events-none select-none">{label}</text>
                </svg>
            );
        };

        const LevelRow = ({ level, placements, onZoneClick, tools, onPlacementClick, readOnly, showForces }) => {
            const getItems = (z) => placements.filter(p => p.levelId === level.id && p.zone === z);
            
            const ZoneContent = ({ zone, align }) => (
                <div className={`flex items-center gap-1 h-full ${align === 'right' ? 'justify-start pl-1' : (align === 'center' ? 'justify-center' : 'justify-end pr-1')} relative`}>
                    {getItems(zone).map(p => {
                        const tool = tools.find(t => t.id === p.tool);
                        const isOsteo = p.tool === 'osteotomy';
                        return (
                            <div key={p.id} className="relative group flex items-center gap-1">
                                {align === 'left' && p.data && <span className="text-[18px] font-mono font-bold text-slate-700 bg-white/80 px-1 rounded whitespace-nowrap">{isOsteo ? `${p.data.type} ${p.data.angle}°` : p.data}</span>}
                                <div className={`${isOsteo ? 'w-8 h-8' : 'w-6 h-6'} ${!readOnly ? 'cursor-pointer hover:scale-110 transition-transform' : ''}`} onClick={(e) => { e.stopPropagation(); !readOnly && onPlacementClick(p); }}>
                                    <InstrumentIcon type={tool?.icon} className="w-full h-full drop-shadow-sm text-slate-900" />
                                    {!readOnly && <div className="hidden group-hover:block absolute -top-1 -right-1 bg-amber-500 rounded-full w-2 h-2" />}
                                </div>
                                {align === 'right' && p.data && <span className="text-[18px] font-mono font-bold text-slate-700 bg-white/80 px-1 rounded whitespace-nowrap">{isOsteo ? `${p.data.type} ${p.data.angle}°` : p.data}</span>}
                            </div>
                        );
                    })}
                </div>
            );

            return (
                <div className="flex w-full relative" style={{ height: `${REGIONS[level.type].height}px` }}>
                    <div className="absolute bottom-0 left-0 right-0 border-b border-slate-100 w-full z-0 pointer-events-none"></div>
                    <div className={`w-10 border-r border-slate-100/50 ${!readOnly ? 'hover:bg-amber-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'force_left')}><ZoneContent zone="force_left" align="center"/></div>
                    <div className={`flex-1 ${!readOnly ? 'hover:bg-blue-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'left')}><ZoneContent zone="left" align="left"/></div>
                    <div className={`w-[160px] relative flex justify-center shrink-0 z-10 ${!readOnly ? 'hover:brightness-95 cursor-pointer' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'mid')}>
                        <SpineVertebra label={level.id} type={level.type} height={REGIONS[level.type].height} />
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                            {getItems('mid').map(p => {
                                const tool = tools.find(t => t.id === p.tool);
                                return (
                                    <div key={p.id} className="pointer-events-auto relative group" onClick={(e) => { e.stopPropagation(); !readOnly && onPlacementClick(p); }}>
                                        <InstrumentIcon type={tool?.icon} className={`${p.tool==='connector'?'w-24 h-6':'w-10 h-10'} drop-shadow-md text-slate-900`} />
                                        {p.tool === 'osteotomy' && p.data && (
                                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white/90 border border-red-200 text-red-800 text-[18px] px-1 rounded shadow-sm whitespace-nowrap z-20">
                                                {p.data.type} {p.data.angle}°
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    <div className={`flex-1 ${!readOnly ? 'hover:bg-blue-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'right')}><ZoneContent zone="right" align="right"/></div>
                    <div className={`w-10 border-l border-slate-100/50 ${!readOnly ? 'hover:bg-amber-50/50 cursor-crosshair' : ''}`} onClick={() => !readOnly && onZoneClick(level.id, 'force_right')}><ZoneContent zone="force_right" align="center"/></div>
                </div>
            );
        };

        const ChartPaper = ({ title, placements, onZoneClick, onPlacementClick, tools, readOnly, levels, showForces }) => (
            <div className="flex-1 flex flex-col h-full border-l border-slate-200 bg-white relative">
                <div className="p-2 bg-slate-50 border-b border-slate-200 text-center font-bold text-sm text-slate-800 font-serif uppercase tracking-wider">{title}</div>
                <div className="flex-1 relative flex flex-col pt-8 px-2">
                    <div className="flex w-full absolute top-1 left-0 right-0 px-2 text-[9px] font-bold text-slate-400 uppercase tracking-tighter text-center pointer-events-none z-10">
                        <div className="w-10 text-emerald-600/50">{showForces ? 'Force' : ''}</div>
                        <div className="flex-1 text-right pr-4">Left</div>
                        <div className="w-[160px]"></div>
                        <div className="flex-1 text-left pl-4">Right</div>
                        <div className="w-10 text-emerald-600/50">{showForces ? 'Force' : ''}</div>
                    </div>
                    <div className="flex flex-col w-full relative">{levels.map(lvl => <LevelRow key={lvl.id} level={lvl} placements={placements} onZoneClick={onZoneClick} onPlacementClick={onPlacementClick} tools={tools} readOnly={readOnly} showForces={showForces} />)}</div>
                </div>
            </div>
        );

        // ==========================================
        // SECTION 4: MAIN APP
        // ==========================================
        const App = () => {
            const [selectedTool, setSelectedTool] = useState('polyaxial');
            const [activeChart, setActiveChart] = useState('planned'); 
            const [plannedPlacements, setPlannedPlacements] = useState([]);
            const [completedPlacements, setCompletedPlacements] = useState([]);
            const [patientData, setPatientData] = useState({ name: '', id: '', surgeon: '', date: new Date().toISOString().split('T')[0] });
            const [showCervical, setShowCervical] = useState(false); 
            const [scale, setScale] = useState(1);
            const [incognitoMode, setIncognitoMode] = useState(false);
            const [isEditingDate, setIsEditingDate] = useState(false);
            const [hasLoaded, setHasLoaded] = useState(false);

            // Modals
            const [screwModalOpen, setScrewModalOpen] = useState(false);
            const [osteoModalOpen, setOsteoModalOpen] = useState(false);
            
            const [pendingPlacement, setPendingPlacement] = useState(null);
            const [editingPlacementId, setEditingPlacementId] = useState(null);
            const [editingData, setEditingData] = useState(null);
            const [editingTool, setEditingTool] = useState(null);

            // Persisted Defaults
            const [defaultDiameter, setDefaultDiameter] = useState('6.5');
            const [defaultLength, setDefaultLength] = useState('45');
            const [defaultOsteoType, setDefaultOsteoType] = useState('PSO');
            const [defaultOsteoAngle, setDefaultOsteoAngle] = useState('30');

            const exportRef = useRef(null);
            const containerWrapperRef = useRef(null);
            const fileInputRef = useRef(null);

            // Storage & Resize Effects
            useEffect(() => {
                const saved = localStorage.getItem('leeds_spine_planner_data_v25');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.planned) setPlannedPlacements(parsed.planned);
                        if (parsed.completed) setCompletedPlacements(parsed.completed);
                        if (parsed.patient) setPatientData(parsed.patient);
                        if (parsed.showCervical !== undefined) setShowCervical(parsed.showCervical);
                    } catch (e) {}
                }
                setHasLoaded(true);
            }, []);

            useEffect(() => {
                if (hasLoaded && !incognitoMode) {
                    localStorage.setItem('leeds_spine_planner_data_v25', JSON.stringify({
                        planned: plannedPlacements, completed: completedPlacements, patient: patientData, showCervical
                    }));
                }
                if (incognitoMode) localStorage.removeItem('leeds_spine_planner_data_v25');
            }, [plannedPlacements, completedPlacements, patientData, showCervical, hasLoaded, incognitoMode]);

            useLayoutEffect(() => {
                const handleResize = () => {
                    if (containerWrapperRef.current && exportRef.current) {
                        const wrapperH = containerWrapperRef.current.clientHeight;
                        const wrapperW = containerWrapperRef.current.clientWidth;
                        setScale(Math.min((wrapperW - 40) / 1485, (wrapperH - 40) / 1050));
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize(); 
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Tools Definitions
            const tools = [
                { category: 'Screws', items: [
                    { id: 'monoaxial', label: 'Monoaxial', icon: 'monoaxial', needsSize: true, type: 'implant' },
                    { id: 'polyaxial', label: 'Polyaxial', icon: 'polyaxial', needsSize: true, type: 'implant' },
                    { id: 'uniplanar', label: 'Uniplanar', icon: 'uniplanar', needsSize: true, type: 'implant' },
                ]},
                { category: 'Hooks', items: [
                    { id: 'pedicle_hook', label: 'Pedicle', icon: 'pedicle_hook', type: 'implant' },
                    { id: 'tp_hook', label: 'TP Hook', icon: 'tp_hook', type: 'implant' },
                    { id: 'sl_hook', label: 'Supra-laminar', icon: 'sl_hook', type: 'implant' },
                    { id: 'il_hook', label: 'Infra-laminar', icon: 'il_hook', type: 'implant' },
                ]},
                { category: 'Midline', items: [
                    { id: 'connector', label: 'Crosslink', icon: 'connector', type: 'mid' },
                    { id: 'unstable', label: 'Unstable', icon: 'unstable', type: 'mid' },
                    { id: 'osteotomy', label: 'Osteotomy', icon: 'osteotomy', isOsteotomy: true, type: 'mid' },
                ]},
                { category: 'Forces', items: [
                    { id: 'force_cranial', label: 'Cranial', icon: 'force_cranial', type: 'force' },
                    { id: 'force_caudal', label: 'Caudal', icon: 'force_caudal', type: 'force' },
                    { id: 'compression', label: 'Compress', icon: 'compression', type: 'force' },
                    { id: 'distraction', label: 'Distract', icon: 'distraction', type: 'force' },
                    { id: 'force_left', label: 'Left', icon: 'force_left', type: 'force' },
                    { id: 'force_right', label: 'Right', icon: 'force_right', type: 'force' },
                ]}
            ];
            const allTools = tools.flatMap(g => g.items);

            // Handlers
            const handleZoneClick = (levelId, zone) => {
                const tool = allTools.find(t => t.id === selectedTool);
                
                // Constraints
                if (tool.type === 'force' && !zone.startsWith('force')) return alert("Forces must be outer.");
                if (tool.type === 'implant' && zone === 'mid') return;
                if (tool.type === 'mid' && zone !== 'mid') return;

                if (tool.needsSize) {
                    setPendingPlacement({ levelId, zone, tool: selectedTool });
                    setEditingPlacementId(null);
                    setEditingData(undefined);
                    setEditingTool(selectedTool);
                    setScrewModalOpen(true);
                } else if (tool.isOsteotomy) {
                    setPendingPlacement({ levelId, zone, tool: selectedTool });
                    setEditingPlacementId(null);
                    setEditingData(undefined);
                    setOsteoModalOpen(true);
                } else {
                    addPlacement(levelId, zone, selectedTool, null);
                }
            };

            const handlePlacementClick = (p) => {
                const tool = allTools.find(t => t.id === p.tool);
                if (tool.needsSize) {
                    setEditingPlacementId(p.id);
                    setEditingData(p.data);
                    setEditingTool(p.tool);
                    setScrewModalOpen(true);
                } else if (tool.isOsteotomy) {
                    setEditingPlacementId(p.id);
                    setEditingData(p.data);
                    setOsteoModalOpen(true);
                } else {
                    removePlacement(p.id);
                }
            };

            const handleScrewConfirm = (sizeData, components, finalType) => {
                if(components) { setDefaultDiameter(components.diameter); setDefaultLength(components.length); }
                
                if (editingPlacementId) {
                    updatePlacement(editingPlacementId, finalType, sizeData);
                    setEditingPlacementId(null);
                } else if (pendingPlacement) {
                    addPlacement(pendingPlacement.levelId, pendingPlacement.zone, finalType, sizeData);
                    setPendingPlacement(null);
                }
            };

            const handleOsteoConfirm = (data) => {
                setDefaultOsteoType(data.type);
                setDefaultOsteoAngle(data.angle);

                if (editingPlacementId) {
                    updatePlacement(editingPlacementId, 'osteotomy', data);
                    setEditingPlacementId(null);
                } else if (pendingPlacement) {
                    addPlacement(pendingPlacement.levelId, pendingPlacement.zone, 'osteotomy', data);
                    setPendingPlacement(null);
                }
            };

            const addPlacement = (levelId, zone, tool, data) => {
                const newP = { id: Date.now(), levelId, zone, tool, data };
                const setter = activeChart === 'planned' ? setPlannedPlacements : setCompletedPlacements;
                setter(prev => [...prev, newP]);
            };

            const updatePlacement = (id, tool, data) => {
                const updater = (prev) => prev.map(p => p.id === id ? { ...p, tool, data } : p);
                if (activeChart === 'planned') setPlannedPlacements(updater);
                else setCompletedPlacements(updater);
            };

            const removePlacement = (id) => {
                const filter = prev => prev.filter(p => p.id !== id);
                if (activeChart === 'planned') setPlannedPlacements(filter);
                else setCompletedPlacements(filter);
                setScrewModalOpen(false);
                setOsteoModalOpen(false);
            };

            const levels = useMemo(() => {
                const lvls = [];
                if (showCervical) ['C1','C2','C3','C4','C5','C6','C7'].forEach(l => lvls.push({ id:l, type:'C' }));
                ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'].forEach(l => lvls.push({ id:l, type:'T' }));
                ['L1','L2','L3','L4','L5'].forEach(l => lvls.push({ id:l, type:'L' }));
                lvls.push({ id:'S1', type:'S' });
                lvls.push({ id:'Pelvis', type:'Pelvis' });
                return lvls;
            }, [showCervical]);

            // EXPORT (Simplified for brevity)
            const runExport = () => {
                const clone = exportRef.current.cloneNode(true);
                clone.style.transform = 'none'; clone.style.margin = '0';
                const div = document.createElement('div');
                div.style.cssText = "position:absolute;top:0;left:0;z-index:-9999;";
                div.appendChild(clone); document.body.appendChild(div);
                html2canvas(clone, { scale: 2, width: 1485, height: 1050 }).then(cvs => {
                    const link = document.createElement('a');
                    link.download = `SpinePlan_${patientData.name}.jpg`;
                    link.href = cvs.toDataURL('image/jpeg', 0.9);
                    link.click();
                    document.body.removeChild(div);
                });
            };

            return (
                <div className="h-full flex flex-col overflow-hidden">
                    <ScrewModal 
                        isOpen={screwModalOpen} onClose={() => setScrewModalOpen(false)} onConfirm={handleScrewConfirm} onDelete={() => removePlacement(editingPlacementId)}
                        initialData={editingData} initialTool={editingTool} defaultDiameter={defaultDiameter} defaultLength={defaultLength}
                    />
                    <OsteotomyModal
                        isOpen={osteoModalOpen} onClose={() => setOsteoModalOpen(false)} onConfirm={handleOsteoConfirm} onDelete={() => removePlacement(editingPlacementId)}
                        initialData={editingData} defaultType={defaultOsteoType} defaultAngle={defaultOsteoAngle}
                    />

                    <header className="bg-slate-900 text-white p-2 flex justify-between items-center shadow-md z-30 shrink-0 no-print h-14">
                        <div className="flex items-center gap-4">
                            <h1 className="font-bold text-lg px-2">Leeds Spinal Planner V25</h1>
                            <div className="flex bg-slate-800 rounded p-1 text-sm border border-slate-700">
                                <button onClick={() => setActiveChart('planned')} className={`px-4 py-1 rounded ${activeChart==='planned'?'bg-amber-500 text-slate-900 font-bold':'text-slate-400'}`}>Pre-Op</button>
                                <button onClick={() => setActiveChart('completed')} className={`px-4 py-1 rounded ${activeChart==='completed'?'bg-amber-500 text-slate-900 font-bold':'text-slate-400'}`}>Post-Op</button>
                            </div>
                        </div>
                        <div className="flex gap-2 items-center">
                            <button onClick={runExport} className="bg-white text-slate-900 px-4 py-1.5 rounded font-bold flex gap-2 items-center hover:bg-slate-200 text-sm"><IconDownload /> Export</button>
                            <button onClick={() => { if(confirm("Clear?")) { setPlannedPlacements([]); setCompletedPlacements([]); } }} className="text-red-400 p-2"><IconTrash /></button>
                        </div>
                    </header>

                    <div className="flex-1 overflow-hidden bg-slate-200 flex relative">
                        <aside className="w-64 bg-slate-800 text-white flex flex-col border-r border-slate-700 z-20 overflow-y-auto no-print shadow-xl">
                            <div className="p-4 border-b border-slate-700"><label className="flex gap-2 text-sm text-slate-300"><input type="checkbox" checked={showCervical} onChange={e=>setShowCervical(e.target.checked)}/> Show Cervical</label></div>
                            <div className="p-4 space-y-6">
                                {tools.map((g,i) => (
                                    <div key={i}><h3 className="text-[10px] uppercase font-bold text-slate-500 mb-2 tracking-widest">{g.category}</h3>
                                    <div className="grid grid-cols-2 gap-2">
                                        {g.items.map(t => (
                                            <button key={t.id} onClick={() => setSelectedTool(t.id)} className={`p-2 rounded border flex flex-col items-center justify-center gap-1 transition-all text-xs ${selectedTool === t.id ? 'bg-amber-500 border-amber-600 text-slate-900 font-bold' : 'bg-slate-700 border-slate-600 text-slate-200'}`}>
                                                <InstrumentIcon type={t.icon} className="w-6 h-6 mb-1" color={selectedTool === t.id ? 'black' : 'white'} /><span className="text-center text-[10px]">{t.label}</span>
                                            </button>
                                        ))}
                                    </div></div>
                                ))}
                            </div>
                        </aside>

                        <div ref={containerWrapperRef} className="flex-1 flex items-center justify-center p-8 bg-slate-300 overflow-hidden relative">
                            <div style={{ transform: `scale(${scale})` }}>
                                <div id="export-container" ref={exportRef}>
                                    <div className="w-[300px] bg-white border-r border-slate-300 flex flex-col p-8">
                                        <h2 className="font-serif font-bold text-3xl text-slate-900 mb-8 border-b-4 border-slate-900 pb-2">Spinal Surgery</h2>
                                        <div className="space-y-6 text-base flex-1">
                                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Patient Name</label><div className="editable-field w-full text-lg font-serif" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, name: e.target.innerText})}>{patientData.name}</div></div>
                                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Patient ID</label><div className="editable-field w-full text-lg font-mono" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, id: e.target.innerText})}>{patientData.id}</div></div>
                                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Surgeon</label><div className="editable-field w-full text-lg" contentEditable suppressContentEditableWarning onBlur={e => setPatientData({...patientData, surgeon: e.target.innerText})}>{patientData.surgeon}</div></div>
                                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Date</label><div className="editable-field w-full text-lg cursor-pointer" onClick={() => setIsEditingDate(true)}>{isEditingDate ? <input type="date" value={patientData.date} autoFocus onBlur={()=>setIsEditingDate(false)} onChange={e=>setPatientData({...patientData, date:e.target.value})} /> : formatDate(patientData.date)}</div></div>
                                        </div>
                                        <LeedsTrustLogo />
                                        <CreditsFooter />
                                    </div>
                                    <ChartPaper title="Pre-Operative Plan" placements={plannedPlacements} onZoneClick={handleZoneClick} onPlacementClick={handlePlacementClick} tools={allTools} readOnly={activeChart !== 'planned'} levels={levels} showForces={true} />
                                    <ChartPaper title="Surgical Construct" placements={completedPlacements} onZoneClick={handleZoneClick} onPlacementClick={handlePlacementClick} tools={allTools} readOnly={activeChart !== 'completed'} levels={levels} showForces={false} />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
